name: alpha-e2e

on:
  workflow_dispatch:
    inputs:
      target:
        description: Make target to run
        required: true
        default: kind-alpha-e2e
        type: choice
        options:
        - kind-alpha-e2e
        - kind-e2e-rollout
        - kind-e2e-config-drift
        - kind-e2e-tls
        - kind-e2e-hibernate
  schedule:
  - cron: '17 2 * * *'

jobs:
  alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/alpha-e2e
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22.1'
    - uses: azure/setup-helm@v4
      with:
        version: v3.20.0
    - uses: azure/setup-kubectl@v4
      with:
        version: v1.31.0
    - uses: engineerd/setup-kind@v0.6.2
      with:
        version: v0.24.0
    - name: Select alpha target
      id: target
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "value=kind-alpha-e2e" >>"${GITHUB_OUTPUT}"
        else
          echo "value=${{ github.event.inputs.target }}" >>"${GITHUB_OUTPUT}"
        fi
    - name: Run alpha workflow
      shell: bash
      run: make "${{ steps.target.outputs.value }}"
    - name: Upload alpha diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: alpha-e2e-diagnostics-${{ github.run_id }}
        path: artifacts/alpha-e2e
        if-no-files-found: warn
