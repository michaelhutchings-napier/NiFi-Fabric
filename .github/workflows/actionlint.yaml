name: Workflow Lint

on:
  pull_request:
    paths:
    - '.github/workflows/**'
    - '.github/dependabot.yml'
  push:
    branches:
    - main
    - master
    paths:
    - '.github/workflows/**'
    - '.github/dependabot.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Run actionlint
      run: go run github.com/rhysd/actionlint/cmd/actionlint@latest
