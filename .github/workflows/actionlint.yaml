name: Workflow Lint

on:
  pull_request:
    paths:
    - '.github/workflows/**'
    - '.github/dependabot.yml'
  push:
    branches:
    - main
    - master
    paths:
    - '.github/workflows/**'
    - '.github/dependabot.yml'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: rhysd/actionlint@v1
