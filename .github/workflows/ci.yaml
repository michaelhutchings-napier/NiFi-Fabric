name: ci

on:
  push:
    branches:
    - main
    - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: maven
    - uses: azure/setup-helm@v5
      with:
        version: v3.20.0
    - name: Build platform chart dependency
      run: helm dependency build --skip-refresh charts/nifi-platform
    - name: Go test
      run: go test ./...
    - name: Flow-action audit reporter unit tests
      run: make test-flow-action-audit-reporter
    - name: Build flow-action audit reporter NAR
      run: make build-flow-action-audit-reporter-dist
    - name: Build flow-action audit reporter image
      run: IMAGE_TAG=nifi-flow-action-audit-reporter:ci make build-flow-action-audit-reporter-image
    - name: Helm lint
      run: helm lint charts/nifi
    - name: Authz tool generated overlays are fresh
      run: make authz-render-check
    - name: Authz tool validation
      run: make authz-validate
    - name: Helm template examples
      run: |
        helm template nifi charts/nifi -f examples/standalone/values.yaml >/tmp/nifi-standalone.yaml
        helm template nifi charts/nifi -f examples/managed/values.yaml >/tmp/nifi-managed.yaml
        helm template nifi charts/nifi -f examples/managed/values.yaml -f examples/cert-manager-values.yaml >/tmp/nifi-managed-cert-manager.yaml
        helm template nifi charts/nifi-platform -f examples/platform-managed-values.yaml -f examples/platform-managed-audit-flow-actions-local-only-values.yaml >/tmp/nifi-platform-audit-local-only.yaml
        helm template nifi charts/nifi-platform -f examples/platform-managed-values.yaml -f examples/platform-managed-audit-flow-actions-ghcr-values.yaml >/tmp/nifi-platform-audit-ghcr.yaml
        helm template nifi charts/nifi-platform -f examples/platform-managed-values.yaml -f examples/platform-managed-audit-flow-actions-private-registry-values.yaml >/tmp/nifi-platform-audit-private.yaml
