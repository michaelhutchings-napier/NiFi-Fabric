name: ci

on:
  push:
    branches:
    - main
    - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22.1'
    - uses: azure/setup-helm@v4
      with:
        version: v3.20.0
    - name: Go test
      run: go test ./...
    - name: Helm lint
      run: helm lint charts/nifi

