name: Dependabot Policy

on:
  pull_request_target:
    types:
    - opened
    - reopened
    - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  classify:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
    - name: Fetch Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2

    - name: Classify update
      id: policy
      uses: actions/github-script@v7
      env:
        DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const pull_number = context.payload.pull_request.number;
          const files = await github.paginate(github.rest.pulls.listFiles, {
            owner,
            repo,
            pull_number,
            per_page: 100,
          });

          const goModPatch = files.find((file) => file.filename === "go.mod")?.patch || "";
          const toolchainChanged = /^[-+]go\s+\d/m.test(goModPatch);
          const ecosystem = process.env.PACKAGE_ECOSYSTEM || "";
          const updateType = process.env.UPDATE_TYPE || "";
          const dependencies = (process.env.DEPENDENCY_NAMES || "")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);

          const isGitHubActions = ecosystem === "github-actions";
          const isAutoMergeUpdateType =
            updateType === "version-update:semver-patch" ||
            updateType === "version-update:semver-minor";
          const touchesKubernetesStack = dependencies.some((name) =>
            name.startsWith("k8s.io/") || name === "sigs.k8s.io/controller-runtime"
          );

          const manualReviewReasons = [];
          if (ecosystem === "gomod") {
            manualReviewReasons.push("Go module update");
          }
          if (touchesKubernetesStack) {
            manualReviewReasons.push("Kubernetes/controller-runtime dependency");
          }
          if (updateType === "version-update:semver-major") {
            manualReviewReasons.push("major version update");
          }
          if (toolchainChanged) {
            manualReviewReasons.push("Go toolchain change in go.mod");
          }

          const reviewProfile =
            isGitHubActions && isAutoMergeUpdateType && manualReviewReasons.length === 0
              ? "routine"
              : "manual";

          core.setOutput("review-profile", reviewProfile);
          core.setOutput("manual-review", manualReviewReasons.length > 0 ? "true" : "false");
          core.setOutput("manual-review-reasons", manualReviewReasons.join("; ") || "None");

          await core.summary
            .addHeading("Dependabot policy")
            .addRaw(`- Package ecosystem: \`${ecosystem || "unknown"}\`\n`)
            .addRaw(`- Update type: \`${updateType || "unknown"}\`\n`)
            .addRaw(`- Dependencies: \`${dependencies.join(", ") || "unknown"}\`\n`)
            .addRaw(`- Go toolchain changed: \`${toolchainChanged}\`\n`)
            .addRaw(`- Suggested review profile: \`${reviewProfile}\`\n`)
            .addRaw(`- Approval required: \`true\`\n`)
            .addRaw(`- Manual review reasons: ${manualReviewReasons.join(", ") || "None"}\n`)
            .write();
