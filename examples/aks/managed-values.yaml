# Prepared AKS managed-mode overlay.
# This file is a starting point for future AKS evaluation, not an AKS-validated configuration.

replicaCount: 3

controllerManaged:
  enabled: true

image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

auth:
  singleUser:
    existingSecret: nifi-auth

tls:
  mode: externalSecret
  existingSecret: nifi-tls
  autoReload:
    enabled: true

service:
  type: ClusterIP
  annotations: {}

persistence:
  storageClassName: managed-csi

serviceMonitor:
  enabled: false

nifi:
  jvmHeapInit: 512m
  jvmHeapMax: 512m
