# AKS standalone overlay.
# Use this as an AKS starting point for standalone installs.

replicaCount: 3

image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

controllerManaged:
  enabled: false

auth:
  singleUser:
    existingSecret: nifi-auth

tls:
  mode: externalSecret
  existingSecret: nifi-tls

service:
  type: ClusterIP
  annotations: {}

persistence:
  storageClassName: managed-csi

serviceMonitor:
  enabled: false

nifi:
  jvmHeapInit: 512m
  jvmHeapMax: 512m

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
