# Optional managed-platform overlay for the typed site-to-site status export path.
# This enables the bounded SiteToSiteStatusReportingTask integration. The platform
# owns only the reporting task and its SSL Context Service when secure transport is
# used. The destination receiver topology, input port, receiver-authorized identity,
# and destination-side policies remain operator-owned.
nifi:
  observability:
    siteToSiteStatus:
      enabled: true
      destination:
        url: https://status-receiver.example.com/nifi
        inputPortName: nifi-status
      auth:
        type: workloadTLS
        authorizedIdentity: O=Example, CN=nifi-status-sender
      source:
        instanceUrl: https://nifi.example.com/nifi
      transport:
        protocol: HTTP
        communicationsTimeout: 30 secs
        compressEvents: true
