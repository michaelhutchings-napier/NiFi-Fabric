# OpenShift standalone overlay for `charts/nifi`.
# Compose with `examples/standalone/values.yaml`.
# Use this when you want the lower-level standalone shape on OpenShift.

image:
  repository: docker.io/apache/nifi

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile: null

service:
  type: ClusterIP

persistence:
  # Set this explicitly if your OpenShift cluster does not have a suitable default RWO StorageClass.
  storageClassName: ""

openshift:
  route:
    enabled: false
