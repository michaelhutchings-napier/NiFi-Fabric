# Optional OpenShift Route and proxy-host overlay for auth-enabled deployments.
# Compose with the OpenShift managed or standalone overlays when you need external HTTPS access.
# This is not part of the first runtime-proven OpenShift baseline.

openshift:
  route:
    enabled: true
    host: nifi.apps.example.com
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

web:
  proxyHosts:
  - nifi.apps.example.com

nifi:
  openshift:
    route:
      enabled: true
      host: nifi.apps.example.com
      tls:
        termination: passthrough
        insecureEdgeTerminationPolicy: None
  web:
    proxyHosts:
    - nifi.apps.example.com
