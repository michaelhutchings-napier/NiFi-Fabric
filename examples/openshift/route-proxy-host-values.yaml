# Focused OpenShift Route and proxy-host overlay for bounded external HTTPS access.
# Compose with the OpenShift managed or standalone overlays when you want the native OpenShift Route surface.
# The supported runtime-proven shape is:
# - explicit Route host
# - matching `web.proxyHosts` entry
# - passthrough TLS termination
# This overlay does not imply path-based passthrough support.

openshift:
  route:
    enabled: true
    host: nifi.apps.example.com
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

web:
  proxyHosts:
  - nifi.apps.example.com

nifi:
  openshift:
    route:
      enabled: true
      host: nifi.apps.example.com
      tls:
        termination: passthrough
        insecureEdgeTerminationPolicy: None
  web:
    proxyHosts:
    - nifi.apps.example.com
