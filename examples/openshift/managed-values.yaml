# OpenShift managed overlay for `charts/nifi-platform`.
# Compose with `examples/platform-managed-values.yaml`.
#
# This is the focused runtime-proven baseline for the internal managed install path:
# - one Helm release through `charts/nifi-platform`
# - controller-managed `NiFiCluster`
# - internal `ClusterIP` Service first
# - no Route requirement in this baseline

controller:
  podSecurityContext:
    fsGroup: null
  securityContext:
    runAsUser: null
    runAsGroup: null
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault

nifi:
  replicaCount: 2
  image:
    repository: docker.io/apache/nifi
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile: null
  service:
    type: ClusterIP
  persistence:
    # Set this explicitly if your OpenShift cluster does not have a suitable default RWO StorageClass.
    storageClassName: ""
  openshift:
    route:
      enabled: false
