# Prepared OpenShift managed overlay.
# This file is a starting point for future OpenShift evaluation, not an OpenShift-validated configuration.

replicaCount: 3

controllerManaged:
  enabled: true

image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

auth:
  singleUser:
    existingSecret: nifi-auth

tls:
  mode: externalSecret
  existingSecret: nifi-tls
  autoReload:
    enabled: true

service:
  # Keep the internal Service first. Route readiness is a second step.
  type: ClusterIP

podSecurityContext: {}

securityContext:
  # OpenShift commonly assigns a non-root UID through SCCs, so do not pin runAsUser here.
  runAsNonRoot: true

persistence:
  # Set this explicitly if your OpenShift cluster does not have a suitable default RWO StorageClass.
  storageClassName: ""

openshift:
  route:
    # Render a passthrough Route as the first OpenShift exposure option.
    enabled: true
    host: ""
    annotations: {}
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

serviceMonitor:
  enabled: false

nifi:
  jvmHeapInit: 512m
  jvmHeapMax: 512m
