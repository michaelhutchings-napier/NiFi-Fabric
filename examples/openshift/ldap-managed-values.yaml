# Focused OpenShift managed LDAP overlay for `charts/nifi-platform`.
# Compose with:
# - examples/platform-managed-values.yaml
# - examples/openshift/managed-values.yaml
# - examples/openshift/route-proxy-host-values.yaml
#
# This follows the current bounded LDAP contract:
# - managed install through `charts/nifi-platform`
# - native OpenShift Route for external NiFi HTTPS access
# - LDAP stays chart-first
# - `ldap + ldapSync` keeps authorization on the documented bootstrap-admin identity path

nifi:
  replicaCount: 1

  auth:
    mode: ldap
    ldap:
      url: ldap://ldap.nifi.svc.cluster.local:389
      authenticationStrategy: SIMPLE
      identityStrategy: USE_USERNAME
      syncInterval: 10 secs
      managerSecret:
        name: nifi-ldap-bind
        dnKey: managerDn
        passwordKey: managerPassword
      userSearch:
        base: ou=People,dc=example,dc=com
        filter: (uid={0})
        scope: SUBTREE
        objectClass: inetOrgPerson
        identityAttribute: uid
      groupSearch:
        base: ou=Groups,dc=example,dc=com
        scope: SUBTREE
        objectClass: groupOfNames
        nameAttribute: cn
        memberAttribute: member
        memberReferencedUserAttribute: uid

  authz:
    mode: ldapSync
    bootstrap:
      initialAdminGroup: ""
      initialAdminIdentity: alice
