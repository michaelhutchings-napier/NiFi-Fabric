# Secondary managed quickstart example.
# One-click single-user path with chart-generated auth and self-signed TLS Secrets.
# The generated quickstart secrets are reused on upgrade.
mode: managed

controller:
  namespace:
    name: nifi-system
    create: true
  image:
    repository: nifi-fabric-controller
    tag: dev
    pullPolicy: IfNotPresent

cluster:
  desiredState: Running

quickstart:
  enabled: true

nifi:
  replicaCount: 3

  controllerManaged:
    enabled: true

  auth:
    mode: singleUser

  authz:
    mode: fileManaged

  tls:
    mode: externalSecret
    autoReload:
      enabled: true

  nifi:
    jvmHeapInit: 512m
    jvmHeapMax: 512m
