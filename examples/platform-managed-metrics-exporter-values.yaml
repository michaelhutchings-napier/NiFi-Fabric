# Optional managed-platform overlay for the experimental exporter metrics mode.
# Supply a machine-auth Secret and CA Secret out of band; this slice does not
# provision or rotate machine principals or tokens for you.
nifi:
  observability:
    metrics:
      mode: exporter
      exporter:
        machineAuth:
          type: authorizationHeader
          secretRef:
            name: nifi-metrics-auth
          authorization:
            type: Bearer
            credentialsKey: token
        source:
          path: /nifi-api/flow/metrics/prometheus
          tlsConfig:
            ca:
              secretRef:
                name: nifi-metrics-ca
                key: ca.crt
