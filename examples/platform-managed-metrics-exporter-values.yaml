# Optional managed-platform overlay for the supported exporter metrics mode.
# Use it when you want a clean Prometheus `/metrics` endpoint instead of direct
# secured API scraping. Operators still provide machine-auth and CA material.
nifi:
  observability:
    metrics:
      mode: exporter
      exporter:
        machineAuth:
          type: authorizationHeader
          secretRef:
            name: nifi-metrics-auth
          authorization:
            type: Bearer
            credentialsKey: token
        source:
          path: /nifi-api/flow/metrics/prometheus
          tlsConfig:
            ca:
              secretRef:
                name: nifi-metrics-ca
                key: ca.crt
        supplemental:
          flowStatus:
            enabled: true
