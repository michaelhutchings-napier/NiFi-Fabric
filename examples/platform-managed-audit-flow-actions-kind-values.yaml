# Focused local kind overlay for the flow-action audit proof.
#
# This keeps the proof bounded to the audit slice by:
# - using a single NiFi node
# - keeping startup on the normal path, then letting the proof script grant one
#   temporary root-canvas policy through the NiFi API before it creates the
#   audit-triggering child process group
#
# Compose it with:
# - examples/platform-managed-values.yaml
# - examples/platform-managed-audit-flow-actions-values.yaml
# - examples/platform-fast-values.yaml
nifi:
  replicaCount: 1
