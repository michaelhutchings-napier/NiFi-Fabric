# Optional managed-platform overlay for secured native NiFi metrics scraping.
# Supply a bearer token Secret and CA Secret out of band; this slice does not
# provision or rotate machine principals or tokens for you.
nifi:
  observability:
    metrics:
      mode: nativeApi
      nativeApi:
        machineAuth:
          type: authorizationHeader
          secretRef:
            name: nifi-metrics-auth
          authorization:
            type: Bearer
            credentialsKey: token
        tlsConfig:
          ca:
            secretRef:
              name: nifi-metrics-ca
              key: ca.crt
        endpoints:
        - name: flow
          enabled: true
          path: /nifi-api/flow/metrics/prometheus
          interval: 30s
        - name: flow-fast
          enabled: true
          path: /nifi-api/flow/metrics/prometheus
          interval: 15s
          scrapeTimeout: 10s
