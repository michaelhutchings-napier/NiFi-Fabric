# Example custom component loading overlay for charts/nifi-platform.
# Compose with examples/platform-managed-values.yaml.
# This example mounts JDBC driver JARs into the nested NiFi pod through the
# existing pod-extension hooks. Create the referenced ConfigMap before install.

nifi:
  extraVolumes:
  - name: jdbc-drivers
    configMap:
      name: jdbc-drivers

  extraVolumeMounts:
  - name: jdbc-drivers
    mountPath: /opt/nifi/fabric/extensions/jdbc
    readOnly: true
