# Prepared OIDC external URL overlay.
# Compose with:
# - examples/managed/values.yaml
# - examples/oidc-values.yaml
# - examples/oidc-group-claims-values.yaml
# - optionally examples/ingress-proxy-host-values.yaml
# Replace the public hostname with the real HTTPS URL your IdP redirects back to.

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    # NiFi's managed TLS cert covers internal service/pod DNS, not the public ingress host.
    # For ingress-backed OIDC browser flow, keep the browser host public while dialing the
    # NiFi backend over HTTPS with internal service DNS as upstream TLS SNI.
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-name: "nifi.nifi.svc.cluster.local"
    # NiFi also expects the HTTPS backend Host header to match that internal TLS identity.
    # ingress-nginx keeps the external browser host in forwarded headers used for redirects.
    nginx.ingress.kubernetes.io/upstream-vhost: "nifi.nifi.svc.cluster.local"
    # OIDC browser-flow callbacks must stay on the same NiFi pod that started the login flow.
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "nifi-route"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
  hosts:
  - host: nifi.example.com
    paths:
    - path: /
      pathType: Prefix

web:
  # This must match the public HTTPS host[:port] used during the OIDC login redirect.
  proxyHosts:
  - nifi.example.com
