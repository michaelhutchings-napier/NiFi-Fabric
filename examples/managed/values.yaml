# Minimal managed-mode example for kind and the private-alpha controller flow.
replicaCount: 3

controllerManaged:
  enabled: true

auth:
  singleUser:
    existingSecret: nifi-auth

tls:
  mode: externalSecret
  existingSecret: nifi-tls
  autoReload:
    enabled: true

serviceMonitor:
  enabled: false

nifi:
  jvmHeapInit: 512m
  jvmHeapMax: 512m
