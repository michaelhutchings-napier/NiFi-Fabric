# Standard managed example for the cert-manager-first install path.
# Generates the single-user auth Secret and the stable cert-manager parameter Secret.
# The generated quickstart secrets are reused on upgrade.
mode: managed-cert-manager

controller:
  namespace:
    name: nifi-system
    create: true
  image:
    repository: nifi-fabric-controller
    tag: dev
    pullPolicy: IfNotPresent

cluster:
  desiredState: Running

quickstart:
  enabled: true

nifi:
  replicaCount: 3

  controllerManaged:
    enabled: true

  auth:
    mode: singleUser

  authz:
    mode: fileManaged

  tls:
    mode: certManager
    autoReload:
      enabled: true
    certManager:
      enabled: true
      issuerRef:
        name: nifi-ca
        kind: ClusterIssuer
        group: cert-manager.io
      secretName: nifi-tls
      pkcs12:
        passwordSecretRef:
          name: nifi-tls-params
          key: pkcs12Password
    sensitiveProps:
      secretRef:
        name: nifi-tls-params
        key: sensitivePropsKey

  observability:
    metrics:
      mode: disabled

  nifi:
    jvmHeapInit: 512m
    jvmHeapMax: 512m
