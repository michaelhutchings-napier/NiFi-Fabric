# Prepared LDAP authentication and authorization overlay.
# Compose with examples/managed/values.yaml.
# This path needs a real LDAP server and bind credentials before it can be validated.

auth:
  mode: ldap
  ldap:
    url: ldaps://ldap.example.com:636
    authenticationStrategy: LDAPS
    managerSecret:
      name: nifi-ldap-bind
      dnKey: managerDn
      passwordKey: managerPassword
    userSearch:
      base: ou=People,dc=example,dc=com
      filter: (uid={0})
      scope: SUBTREE
      objectClass: inetOrgPerson
      identityAttribute: uid
    groupSearch:
      base: ou=Groups,dc=example,dc=com
      scope: SUBTREE
      objectClass: groupOfNames
      nameAttribute: cn
      memberAttribute: member

authz:
  mode: ldapSync
  bootstrap:
    # Baseline LDAP example for the default apache/nifi:2.0.0 image.
    # For group bootstrap on newer NiFi images, use
    # examples/ldap-group-bootstrap-values.yaml with examples/nifi-2.8.0-values.yaml.
    initialAdminIdentity: alice
