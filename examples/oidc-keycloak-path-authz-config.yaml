source:
  type: keycloak
  baseUrl: https://keycloak.example.com
  realm: nifi
  groupsClaim: groups
  groupValueMode: path

authz:
  initialAdminGroup: /platform/nifi-platform-admins

bindings:
- keycloakGroup: /platform/nifi-platform-admins
  bundles:
  - admin
- keycloakGroup: /platform/nifi-flow-operators
  bundles:
  - viewer
  - editor
  - flowVersionManager
- keycloakGroup: /platform/nifi-flow-observers
  bundles:
  - viewer
