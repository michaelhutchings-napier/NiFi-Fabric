# Optional strict anti-affinity baseline for charts/nifi-platform.
# Compose with examples/platform-managed-values.yaml.

nifi:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: nifi
            app.kubernetes.io/instance: RELEASE-NAME
        topologyKey: kubernetes.io/hostname
