# Optional managed-platform overlay for the typed site-to-site provenance export path.
# This enables the bounded SiteToSiteProvenanceReportingTask integration. The platform
# owns only the reporting task and its SSL Context Service when secure transport is
# used. The destination receiver topology, input port, receiver-authorized identity,
# destination-side policies, and downstream provenance processing remain operator-owned.
nifi:
  observability:
    siteToSiteProvenance:
      enabled: true
      destination:
        url: https://provenance-receiver.example.com/nifi
        inputPortName: nifi-provenance
      auth:
        type: workloadTLS
        authorizedIdentity: O=Example, CN=nifi-provenance-sender
      source:
        instanceUrl: https://nifi.example.com/nifi
      transport:
        protocol: HTTP
        communicationsTimeout: 30 secs
        compressEvents: true
      provenance:
        startPosition: endOfStream
