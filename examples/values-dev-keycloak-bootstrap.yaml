# Development OIDC overlay for `charts/nifi-platform`.
# Compose with:
# - examples/platform-managed-values.yaml
#
# This is a local/personal/demo convenience path:
# - one NiFi replica for faster startup
# - Keycloak discovery over in-cluster DNS
# - explicit bootstrap admin group
# - group-to-bundle authz scaffold ready before first login
#
# Pair this with a dev Keycloak bootstrap flow such as startup import using:
# - examples/keycloak-dev-bootstrap-realm.json
#
# Before install, create:
# - Secret/nifi-tls
# - Secret/nifi-oidc with key `clientSecret` matching the Keycloak client secret

nifi:
  replicaCount: 1

  auth:
    mode: oidc
    oidc:
      discoveryUrl: http://keycloak.nifi.svc.cluster.local:8080/realms/nifi/.well-known/openid-configuration
      clientId: nifi-fabric
      clientSecret:
        existingSecret: nifi-oidc
        key: clientSecret
      claims:
        identifyingUser: email
        groups: groups
      additionalScopes:
      - openid
      - profile
      - email

  authz:
    mode: externalClaimGroups
    bootstrap:
      initialAdminGroup: nifi-platform-admins
      initialAdminIdentity: ""
    applicationGroups:
    - nifi-platform-admins
    - nifi-flow-operators
    - nifi-flow-observers
    bundles:
      viewer:
        groups:
        - nifi-flow-observers
        - nifi-flow-operators
      editor:
        groups:
        - nifi-flow-operators
      flowVersionManager:
        groups:
        - nifi-flow-operators
      admin:
        groups:
        - nifi-platform-admins

  nifi:
    jvmHeapInit: 512m
    jvmHeapMax: 512m
