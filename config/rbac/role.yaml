apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nifi2-platform-controller-manager
rules:
- apiGroups:
  - platform.nifi.io
  resources:
  - nificlusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.nifi.io
  resources:
  - nificlusters/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch

