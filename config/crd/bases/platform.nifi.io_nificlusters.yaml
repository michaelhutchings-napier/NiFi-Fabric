apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nificlusters.platform.nifi.io
spec:
  group: platform.nifi.io
  names:
    kind: NiFiCluster
    listKind: NiFiClusterList
    plural: nificlusters
    singular: nificluster
    shortNames:
    - nifi
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - jsonPath: .spec.desiredState
      name: State
      type: string
    - jsonPath: .status.replicas.ready
      name: Ready
      type: integer
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - desiredState
            - targetRef
            properties:
              desiredState:
                type: string
                enum:
                - Running
                - Hibernated
              suspend:
                type: boolean
              targetRef:
                type: object
                required:
                - name
                properties:
                  name:
                    type: string
              restartTriggers:
                type: object
                properties:
                  configMaps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  secrets:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
              restartPolicy:
                type: object
                properties:
                  tlsDrift:
                    type: string
                    enum:
                    - AutoreloadThenRestartOnFailure
                    - AlwaysRestart
                    - ObserveOnly
              rollout:
                type: object
                properties:
                  minReadySeconds:
                    format: int32
                    type: integer
                  podReadyTimeout:
                    type: string
                  clusterHealthTimeout:
                    type: string
              hibernation:
                type: object
                properties:
                  offloadTimeout:
                    type: string
              autoscaling:
                type: object
                properties:
                  mode:
                    type: string
                    enum:
                    - Disabled
                    - Advisory
                    - Enforced
                  scaleUp:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      cooldown:
                        type: string
                  scaleDown:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      cooldown:
                        type: string
                      stabilizationWindow:
                        type: string
                  minReplicas:
                    format: int32
                    type: integer
                  maxReplicas:
                    format: int32
                    type: integer
                  signals:
                    type: array
                    items:
                      type: string
                      enum:
                      - QueuePressure
                      - CPU
              safety:
                type: object
                properties:
                  requireClusterHealthy:
                    type: boolean
          status:
            type: object
            properties:
              observedGeneration:
                format: int64
                type: integer
              observedStatefulSetRevision:
                type: string
              observedConfigHash:
                type: string
              observedCertificateHash:
                type: string
              observedTLSConfigurationHash:
                type: string
              tls:
                type: object
                properties:
                  observationStartedAt:
                    format: date-time
                    type: string
                  targetCertificateHash:
                    type: string
                  targetTLSConfigurationHash:
                    type: string
              rollout:
                type: object
                properties:
                  trigger:
                    type: string
                    enum:
                    - StatefulSetRevision
                    - ConfigDrift
                    - TLSDrift
                  startedAt:
                    format: date-time
                    type: string
                  targetRevision:
                    type: string
                  targetConfigHash:
                    type: string
                  targetCertificateHash:
                    type: string
                  targetTLSConfigurationHash:
                    type: string
                  completedPods:
                    items:
                      type: string
                    type: array
              replicas:
                type: object
                properties:
                  desired:
                    format: int32
                    type: integer
                  ready:
                    format: int32
                    type: integer
                  updated:
                    format: int32
                    type: integer
              clusterNodes:
                type: object
                properties:
                  connected:
                    format: int32
                    type: integer
                  disconnected:
                    format: int32
                    type: integer
                  offloaded:
                    format: int32
                    type: integer
              hibernation:
                type: object
                properties:
                  baselineReplicas:
                    format: int32
                    type: integer
                  lastRunningReplicas:
                    format: int32
                    type: integer
              autoscaling:
                type: object
                properties:
                  recommendedReplicas:
                    format: int32
                    type: integer
                  reason:
                    type: string
                  signals:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                          - QueuePressure
                          - CPU
                        available:
                          type: boolean
                        message:
                          type: string
                  lastEvaluationTime:
                    format: date-time
                    type: string
                  lowPressureSince:
                    format: date-time
                    type: string
                  lowPressure:
                    type: object
                    properties:
                      since:
                        format: date-time
                        type: string
                      lastObservedAt:
                        format: date-time
                        type: string
                      consecutiveSamples:
                        format: int32
                        type: integer
                      requiredConsecutiveSamples:
                        format: int32
                        type: integer
                      flowFilesQueued:
                        format: int64
                        type: integer
                      bytesQueued:
                        format: int64
                        type: integer
                      bytesQueuedObserved:
                        type: boolean
                      message:
                        type: string
                  lastScalingDecision:
                    type: string
                  lastScaleUpTime:
                    format: date-time
                    type: string
                  lastScaleDownTime:
                    format: date-time
                    type: string
                  execution:
                    type: object
                    properties:
                      phase:
                        type: string
                        enum:
                        - ScaleUpSettle
                        - ScaleDownPrepare
                        - ScaleDownSettle
                      state:
                        type: string
                        enum:
                        - Running
                        - Blocked
                        - Failed
                      startedAt:
                        format: date-time
                        type: string
                      lastTransitionTime:
                        format: date-time
                        type: string
                      targetReplicas:
                        format: int32
                        type: integer
                      message:
                        type: string
                      blockedReason:
                        type: string
                      failureReason:
                        type: string
              nodeOperation:
                type: object
                properties:
                  purpose:
                    type: string
                    enum:
                    - Restart
                    - Hibernation
                    - ScaleDown
                  podName:
                    type: string
                  podUid:
                    type: string
                  nodeId:
                    type: string
                  stage:
                    type: string
                    enum:
                    - Disconnecting
                    - Offloading
                  startedAt:
                    format: date-time
                    type: string
              lastOperation:
                type: object
                properties:
                  type:
                    type: string
                  phase:
                    type: string
                    enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                  startedAt:
                    format: date-time
                    type: string
                  completedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
              conditions:
                type: array
                items:
                  x-kubernetes-map-type: atomic
                  type: object
                  required:
                  - type
                  - status
                  - reason
                  - message
                  - lastTransitionTime
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    lastTransitionTime:
                      format: date-time
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
