# NiFi-Fabric app chart values
#
# This chart deploys the NiFi workload directly. Use it for standalone installs or
# as the workload nested under `charts/nifi-platform`.
#
# Start here:
# - Install guide: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# - App chart values reference: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md
# - NiFiCluster reference for managed mode: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/nificluster.md

# ------------------------------------------------------------------------------
# Shared Install Profile
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Shared install-profile preset.
# This is primarily set by `charts/nifi-platform` through `global.nifiFabric.installProfile`.
# Direct `charts/nifi` installs should usually leave this at `explicit`.
global:
  nifiFabric:
    installProfile: explicit

# ------------------------------------------------------------------------------
# Workload Shape and Version
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Number of NiFi pods.
# @default -- 3
replicaCount: 3

# -- NiFi container image settings.
# @default -- {"repository":"apache/nifi","tag":"2.0.0","pullPolicy":"IfNotPresent"}
image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# -- Optional image pull secrets for chart-managed pods.
# @default -- []
imagePullSecrets: []

# -- Automounts the ServiceAccount token into chart-managed pods.
# This stays enabled by default because clustered NiFi uses the Kubernetes API for leader-election coordination.
# Set it to `false` only if you fully understand the impact on clustered NiFi behavior and any pod extensions.
# @default -- true
automountServiceAccountToken: true

# -- Enables Kubernetes service environment variable injection into chart-managed pods.
# The chart uses explicit Service and pod DNS names instead of relying on service-link env vars.
# @default -- false
enableServiceLinks: false

# -- Enables the managed OnDelete workload shape expected by the controller path.
# Set this to `true` when the workload is controlled through `charts/nifi-platform`.
# @default -- {"enabled":false}
controllerManaged:
  enabled: false

# ------------------------------------------------------------------------------
# Identity, Service, and Exposure
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/authentication.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/advanced.md
# ------------------------------------------------------------------------------

# -- Workload ServiceAccount settings.
# @default -- {"create":true,"name":""}
serviceAccount:
  create: true
  name: ""

# -- Main NiFi Service settings.
# @default -- {"type":"ClusterIP","annotations":{},"sessionAffinity":"None"}
service:
  type: ClusterIP
  annotations: {}
  sessionAffinity: None

# -- Optional Linkerd compatibility settings for the NiFi workload.
# This injects only the NiFi StatefulSet pods and adds the minimum opaque-port annotations
# needed for the supported meshed NiFi profile. The controller remains mesh-agnostic.
# @default -- {"enabled":false,"inject":"enabled","opaquePorts":{"cluster":true,"loadBalance":true,"https":false,"additional":[]}}
linkerd:
  enabled: false
  inject: enabled
  opaquePorts:
    cluster: true
    loadBalance: true
    https: false
    additional: []

# -- Optional Istio sidecar-mode compatibility settings for the NiFi workload.
# This injects only the NiFi StatefulSet pods and adds the minimum pod annotations used by
# the documented supported sidecar-mode profile. The controller remains mesh-agnostic.
# @default -- {"enabled":false,"inject":true,"rewriteAppHTTPProbers":true,"holdApplicationUntilProxyStarts":true,"annotations":{}}
istio:
  enabled: false
  inject: true
  rewriteAppHTTPProbers: true
  holdApplicationUntilProxyStarts: true
  annotations: {}

# -- Optional Istio Ambient compatibility settings for the NiFi workload.
# This enrolls only the NiFi StatefulSet pods into Ambient through pod-template labels.
# The supported profile is L4-only, keeps the controller outside Ambient, and does not add
# sidecars, waypoint configuration, or mesh-specific controller behavior.
# @default -- {"enabled":false,"dataplaneMode":"ambient","labels":{}}
ambient:
  enabled: false
  dataplaneMode: ambient
  labels: {}

# -- NiFi Service ports.
# @default -- {"https":8443,"cluster":11443,"loadBalance":6342}
ports:
  https: 8443
  cluster: 11443
  loadBalance: 6342

# -- Explicit proxy hosts passed to NiFi for ingress, Route, or external proxy access.
# When `openshift.route.enabled=true`, include the public Route host or `host:443`.
# @default -- []
web:
  proxyHosts: []

# -- Standard Kubernetes Ingress settings.
# @default -- {"enabled":false,"className":"","annotations":{},"hosts":[{"host":"nifi.local","paths":[{"path":"/","pathType":"Prefix"}]}],"tls":[]}
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: nifi.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

# -- OpenShift Route settings for external HTTPS access.
# The recommended Route shape uses an explicit `host`, matching `web.proxyHosts`, and `passthrough` TLS termination.
# @default -- {"route":{"enabled":false,"host":"","annotations":{},"tls":{"termination":"passthrough","insecureEdgeTerminationPolicy":"None"}}}
openshift:
  route:
    enabled: false
    host: ""
    annotations: {}
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

# ------------------------------------------------------------------------------
# TLS and Certificates
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/tls-and-cert-manager.md
# ------------------------------------------------------------------------------

# -- TLS source, mounted Secret keys, and optional cert-manager integration.
# Use `externalSecret` when operators create the TLS Secret separately.
# Use `certManager` when cert-manager is already installed in the cluster.
tls:
  mode: externalSecret
  existingSecret: nifi-tls
  mountPath: /opt/nifi/tls
  caCertKey: ca.crt
  keystoreKey: keystore.p12
  truststoreKey: truststore.p12
  keystorePasswordKey: keystorePassword
  truststorePasswordKey: truststorePassword
  sensitivePropsKeyKey: sensitivePropsKey
  sensitiveProps:
    value: ""
    secretRef:
      name: ""
      key: ""
  autoReload:
    enabled: false
    interval: 10 secs
  certManager:
    enabled: false
    issuerRef:
      name: ""
      kind: ClusterIssuer
      group: cert-manager.io
    secretName: nifi-tls
    duration: 2160h
    renewBefore: 360h
    # -- Leave empty to default the certificate subject to the Service FQDN.
    # NiFi node identity comes from the certificate subject.
    commonName: ""
    dnsNames: []
    usages:
    - server auth
    - client auth
    privateKey:
      algorithm: RSA
      size: 2048
      rotationPolicy: Always
    pkcs12:
      create: true
      profile: Modern2023
      password: ""
      passwordSecretRef:
        name: ""
        key: ""
  additionalTrustBundle:
    # -- Optional extra PEM CA bundle imported into a writable copy of the NiFi truststore.
    # Use this for outbound trust to LDAP, OIDC, Flow Registry, or other TLS dependencies
    # when a shared trust bundle is distributed separately from the main NiFi TLS Secret.
    enabled: false
    # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the optional
    # trust-manager integration in `charts/nifi-platform`.
    useTrustManagerBundle: false
    mountPath: /opt/nifi/trust-bundle
    configMapRef:
      name: ""
      key: ca.crt
    secretRef:
      name: ""
      key: ca.crt

# -- Reference settings for the optional platform trust-manager bundle when
# `*.useTrustManagerBundle=true` is enabled in this chart. Leave `name` empty to use
# the default platform-generated `<release>-trust-bundle` name.
trustManagerBundleRef:
  type: configMap
  name: ""
  key: ca.crt

# ------------------------------------------------------------------------------
# Authentication and Authorization
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/authentication.md
# ------------------------------------------------------------------------------

# -- NiFi authentication mode and provider settings.
# Supported modes are `singleUser`, `oidc`, and `ldap`.
auth:
  mode: singleUser
  singleUser:
    existingSecret: nifi-auth
    usernameKey: username
    passwordKey: password
  oidc:
    discoveryUrl: ""
    clientId: ""
    clientSecret:
      existingSecret: ""
      key: clientSecret
    preferredJwsAlgorithm: ""
    additionalScopes:
    - openid
    - profile
    - email
    claims:
      identifyingUser: email
      groups: groups
    extraProperties: {}
  ldap:
    url: ""
    authenticationStrategy: START_TLS
    identityStrategy: USE_DN
    authenticationExpiration: 12 hours
    referralStrategy: FOLLOW
    connectTimeout: 10 secs
    readTimeout: 10 secs
    pageSize: ""
    syncInterval: 30 mins
    groupMembershipEnforceCaseSensitivity: false
    managerSecret:
      name: ""
      dnKey: managerDn
      passwordKey: managerPassword
    tls:
      clientAuth: NONE
      protocol: TLS
      shutdownGracefully: false
    userSearch:
      base: ""
      filter: "(sAMAccountName={0})"
      scope: ONE_LEVEL
      objectClass: person
      identityAttribute: ""
      groupNameAttribute: ""
      groupNameReferencedGroupAttribute: ""
    userGroupProvider: {}
    groupSearch:
      base: ""
      filter: ""
      scope: ONE_LEVEL
      objectClass: group
      nameAttribute: ""
      memberAttribute: ""
      memberReferencedUserAttribute: ""

# -- NiFi authorization mode, bootstrap, groups, and policies.
authz:
  mode: fileManaged
  bootstrap:
    initialAdminGroup: ""
    initialAdminIdentity: ""
  applicationGroups: []
  bundles:
    # -- Recommended named policy bundles for common customer roles.
    # These compile down to the same file-managed policies the chart already supports.
    # Keep `authz.policies` for exceptions rather than as the default customer path.
    viewer:
      groups: []
      includeInitialAdmin: false
    editor:
      groups: []
      includeInitialAdmin: false
    flowVersionManager:
      groups: []
      includeInitialAdmin: false
    admin:
      groups: []
      includeInitialAdmin: false
  capabilities:
    # -- Built-in capability bundles for common NiFi access patterns.
    # `mutableFlow` seeds the inherited root-canvas policies needed for child
    # process-group create/edit work and process-group-level version-control
    # actions without introducing a general policy control plane.
    # It intentionally does not seed policy management, tenant management, or
    # parameter-context administration.
    mutableFlow:
      enabled: false
      includeInitialAdmin: true
      groups: []
  policies: []

# ------------------------------------------------------------------------------
# Observability and Metrics
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/observability-metrics.md
# ------------------------------------------------------------------------------

# -- Deprecated compatibility shim for older ServiceMonitor-only values.
# Prefer `observability.metrics`.
# @default -- {"enabled":false,"interval":"30s","scrapeTimeout":"10s"}
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

# -- First-class metrics subsystem.
# `nativeApi` is the primary supported mode.
# `exporter` is a supported secondary mode for a clean `/metrics` endpoint.
# `siteToSite` is an optional typed metrics-export path.
observability:
  metrics:
    mode: disabled
    nativeApi:
      # -- Native secured NiFi API scraping with chart-managed Service and ServiceMonitors.
      # This is the recommended default metrics path for NiFi-Fabric.
      service:
        # -- Keep this enabled for the recommended dedicated metrics Service.
        enabled: true
        annotations: {}
        labels: {}
      serviceMonitor:
        enabled: true
        # -- Default Prometheus Operator settings for all named nativeApi scrape profiles.
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: https
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        # -- Provider-agnostic machine-auth contract.
        # Operators still provide the referenced Secret and rotation flow out of band.
        type: none
        secretRef:
          name: ""
        basicAuth:
          usernameKey: username
          passwordKey: password
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      tlsConfig:
        # -- When left empty, serverName defaults to the main NiFi Service FQDN.
        serverName: ""
        insecureSkipVerify: false
        ca:
          # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the
          # optional platform trust-manager integration.
          useTrustManagerBundle: false
          configMapRef:
            name: ""
            key: ca.crt
          secretRef:
            name: ""
            key: ""
      endpoints:
      # -- Named nativeApi scrape profiles.
      # Names must stay unique after sanitizing to Kubernetes object names.
      - name: flow
        enabled: true
        path: /nifi-api/flow/metrics/prometheus
        params: {}
        interval: ""
        scrapeTimeout: ""
        scheme: ""
        honorLabels: false
        labels: {}
        annotations: {}
    exporter:
      # -- Optional companion exporter for environments that want a clean `/metrics` scrape endpoint.
      # It republishes secured flow metrics and can append a bounded set of controller-status gauges from `/nifi-api/flow/status`.
      image:
        repository: python
        tag: "3.12-alpine"
        pullPolicy: IfNotPresent
      deployment:
        annotations: {}
        labels: {}
      service:
        enabled: true
        annotations: {}
        labels: {}
        port: 9090
      serviceMonitor:
        enabled: true
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: http
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        type: authorizationHeader
        secretRef:
          name: ""
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      source:
        scheme: https
        host: ""
        port: 8443
        path: /nifi-api/flow/metrics/prometheus
        timeoutSeconds: 10
        tlsConfig:
          insecureSkipVerify: false
          ca:
            # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the
            # optional platform trust-manager integration.
            useTrustManagerBundle: false
            configMapRef:
              name: ""
              key: ca.crt
            secretRef:
              name: ""
              key: ""
      supplemental:
        flowStatus:
          enabled: false
          path: /nifi-api/flow/status
      resources: {}
    siteToSite:
      # -- Optional typed SiteToSite metrics export path.
      # This creates only the NiFi runtime objects required for SiteToSite metrics export:
      # one SiteToSiteMetricsReportingTask and one SSL Context Service when secure transport is used.
      enabled: false
      destination:
        # -- Receiver base URL that accepts the site-to-site metrics feed.
        url: ""
        # -- Receiver input port name expected to accept the metrics feed.
        inputPortName: ""
      auth:
        # -- Typed destination auth shape for SiteToSite metrics export.
        # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
        # `secretRef` uses the referenced Secret's keystore/truststore material instead.
        # `none` is valid only for plain http:// destination URLs.
        type: workloadTLS
        # -- Receiver-side authorized identity for secure SiteToSite metrics export.
        # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
        # to the required `/controller` read, `/site-to-site` read, and destination
        # input-port write policies. Leave empty only when auth.type=none.
        authorizedIdentity: ""
        secretRef:
          name: ""
          keystoreKey: keystore.p12
          keystorePasswordKey: keystorePassword
          truststoreKey: truststore.p12
          truststorePasswordKey: truststorePassword
      source:
        # -- Metrics source identity hints sent by SiteToSiteMetricsReportingTask.
        # Leave hostname and instanceUrl empty to derive them from the local pod and Service.
        applicationId: nifi
        hostname: ""
        instanceUrl: ""
      transport:
        # -- Supported transport values for the typed SiteToSite metrics path.
        protocol: HTTP
        communicationsTimeout: 30 secs
        compressEvents: true
      format:
        # -- Supported output format for the typed SiteToSite metrics path.
        # Record Format is intentionally excluded because it would require broader Record Writer ownership.
        type: AmbariFormat
        includeNullValues: false
  siteToSiteStatus:
    # -- Optional typed SiteToSite status export path.
    # This creates only the NiFi runtime objects required for SiteToSite status export:
    # one SiteToSiteStatusReportingTask and one SSL Context Service when secure transport is used.
    enabled: false
    destination:
      # -- Receiver base URL that accepts the site-to-site status feed.
      url: ""
      # -- Receiver input port name expected to accept the status feed.
      inputPortName: ""
    auth:
      # -- Typed destination auth shape for SiteToSite status export.
      # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
      # `secretRef` uses the referenced Secret's keystore/truststore material instead.
      # `none` is valid only for plain http:// destination URLs.
      type: workloadTLS
      # -- Receiver-side authorized identity for secure Site-to-Site status export.
      # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
      # to the required `/controller` read, `/site-to-site` read, and destination
      # input-port write policies. Leave empty only when auth.type=none.
      authorizedIdentity: ""
      secretRef:
        name: ""
        keystoreKey: keystore.p12
        keystorePasswordKey: keystorePassword
        truststoreKey: truststore.p12
        truststorePasswordKey: truststorePassword
    source:
      # -- Optional Instance URL override used in the exported status payload.
      # Leave empty to derive it from the local Service.
      instanceUrl: ""
    transport:
      # -- Supported transport values for the typed SiteToSite status path.
      protocol: HTTP
      communicationsTimeout: 30 secs
      compressEvents: true
  siteToSiteProvenance:
    # -- Optional typed SiteToSite provenance export path.
    # This creates only the NiFi runtime objects required for SiteToSite provenance export:
    # one SiteToSiteProvenanceReportingTask and one SSL Context Service when secure transport is used.
    enabled: false
    destination:
      # -- Receiver base URL that accepts the site-to-site provenance feed.
      url: ""
      # -- Receiver input port name expected to accept the provenance feed.
      inputPortName: ""
    auth:
      # -- Typed destination auth shape for SiteToSite provenance export.
      # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
      # `secretRef` uses the referenced Secret's keystore/truststore material instead.
      # `none` is valid only for plain http:// destination URLs.
      type: workloadTLS
      # -- Receiver-side authorized identity for secure Site-to-Site provenance export.
      # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
      # to the required `/controller` read, `/site-to-site` read, and destination
      # input-port write policies. Leave empty only when auth.type=none.
      authorizedIdentity: ""
      secretRef:
        name: ""
        keystoreKey: keystore.p12
        keystorePasswordKey: keystorePassword
        truststoreKey: truststore.p12
        truststorePasswordKey: truststorePassword
    source:
      # -- Optional Instance URL override used in the exported provenance payload.
      # Leave empty to derive it from the local Service.
      instanceUrl: ""
    transport:
      # -- Supported transport values for the typed SiteToSite provenance path.
      protocol: HTTP
      communicationsTimeout: 30 secs
      compressEvents: true
    provenance:
      # -- Initial export cursor for the typed provenance path.
      # `endOfStream` avoids replaying historical provenance on first start.
      # `beginningOfStream` allows an explicit one-time historical backfill instead.
      startPosition: endOfStream
  audit:
    flowActions:
      # -- Enables the bounded flow-action audit layer.
      # This implementation slice configures durable local history support:
      # persisted database repository history, durable flow archive settings,
      # optional request-log formatting, and the bounded `export.type=log`
      # reporter path for operators who supply the reporter image.
      enabled: false
      local:
        history:
          # -- Keeps the NiFi-native flow configuration history database explicit.
          # The first supported slice requires this to stay enabled.
          enabled: true
        archive:
          # -- Keeps automatic flow archive creation enabled on durable storage.
          # The archive directory must not rely on `./conf/archive` because the chart
          # mounts `conf` from `emptyDir`.
          enabled: true
          directory: /opt/nifi/nifi-current/database_repository/flow-audit-archive
          retention:
            maxAge: 30 days
            maxStorage: 2 GB
            maxCount: 1000
        requestLog:
          # -- Optional request-log formatting retained as secondary evidence.
          enabled: true
          format: '%{client}a - %u %t "%r" %s %O "%{Referer}i" "%{User-Agent}i"'
      export:
        # -- Supported values: `disabled`, `log`.
        # `log` is the bounded advanced option: the chart wires the FlowActionReporter
        # and installs the reporter NAR from a dedicated image into a separate
        # extension directory. Durable local audit remains the default support layer.
        # `log` requires a NiFi image tag at or above `2.4.0`.
        type: disabled
        log:
          installation:
            # -- Reporter NAR image copied by a chart-managed init container when
            # `export.type=log` is enabled. The image must contain the built NAR
            # at `image.narPath`.
            image:
              repository: ""
              tag: ""
              pullPolicy: IfNotPresent
              narPath: /opt/nifi-fabric-audit/nifi-flow-action-audit-reporter.nar
      content:
        # -- Bounded enrichment and redaction settings for the reporter-based export slice.
        # The current supported implementation keeps strict redaction enabled.
        includeRequestDetails: true
        includeProcessGroupPath: true
        propertyValues:
          mode: redacted
          # -- Reserved placeholder for a future explicit allowlist-based mode.
          allowlistedProperties: []

# ------------------------------------------------------------------------------
# Flow Registry Clients
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/flow-registry-clients.md
# ------------------------------------------------------------------------------

# -- Prepared Flow Registry Client catalog entries mounted into the NiFi pod.
flowRegistryClients:
  enabled: false
  mountPath: /opt/nifi/fabric/flow-registry-clients
  clients: []

# ------------------------------------------------------------------------------
# Parameter Contexts
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/parameters.md
# ------------------------------------------------------------------------------

# -- Runtime-managed Parameter Context definitions.
# The chart creates and reconciles only the declared Parameter Contexts in NiFi:
# - declared contexts are created, updated, and deleted through the NiFi API
# - optional attachments are limited to named direct root-child process groups
# - providerRefs stay reference-only; the product does not create or reconcile
#   NiFi Parameter Providers
# - live reconciliation does not require a rollout or pod restart for values or
#   referenced Secret changes
# Enterprise auth modes use the explicit bootstrap admin identity as the
# trusted-proxy management identity for this feature.
parameterContexts:
  enabled: false
  mountPath: /opt/nifi/fabric/parameter-contexts
  contexts: []

# ------------------------------------------------------------------------------
# Versioned Flow Imports
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/flows.md
# ------------------------------------------------------------------------------

# -- Runtime-managed versioned-flow import definitions.
# The chart creates only the NiFi runtime state required for one
# selected registry-backed flow import per entry:
# - declared prepared `provider=nifiRegistry` entries can create or reconcile the
#   exact live client needed by this compatibility path
# - other selected live Flow Registry Clients must already exist in NiFi
# - the declared flow is imported under one named root child process group
# - at most one direct Parameter Context reference can be attached
# - removed imports are not deleted from NiFi in this slice
# - ongoing version synchronization and arbitrary process-group mutation remain
#   out of scope
# - live reconcile on pod `-0` applies declared version changes without relying
#   on restart-trigger wiring once the feature is enabled
# Enterprise auth modes use the explicit bootstrap admin identity as the
# trusted-proxy management identity for this feature.
versionedFlowImports:
  enabled: false
  mountPath: /opt/nifi/fabric/versioned-flow-imports
  imports: []

# ------------------------------------------------------------------------------
# Availability, Storage, and Resources
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Pod disruption budget settings.
# @default -- {"enabled":true,"minAvailable":1}
pdb:
  enabled: true
  minAvailable: 1

# -- Persistent repository storage settings.
# @default -- {"enabled":true,"storageClassName":"","accessModes":["ReadWriteOnce"],"databaseRepository":{"size":"2Gi"},"flowfileRepository":{"size":"2Gi"},"contentRepository":{"size":"4Gi"},"provenanceRepository":{"size":"4Gi"}}
persistence:
  enabled: true
  storageClassName: ""
  accessModes:
  - ReadWriteOnce
  databaseRepository:
    size: 2Gi
  flowfileRepository:
    size: 2Gi
  contentRepository:
    size: 4Gi
  provenanceRepository:
    size: 4Gi

# -- NiFi container resource requests and limits.
# @default -- {}
resources: {}

# -- Extra environment variables appended to the main NiFi container.
# @default -- []
env: []

# -- Extra environment sources appended to the main NiFi container.
# @default -- []
envFrom: []

# -- Extra volumes appended to the NiFi pod.
# These can be mounted by the main NiFi container, sidecars, or extra init containers.
# @default -- []
extraVolumes: []

# -- Extra volume mounts appended to the main NiFi container.
# @default -- []
extraVolumeMounts: []

# ------------------------------------------------------------------------------
# Scheduling and Security
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Additional labels attached to the NiFi pod template.
# @default -- {}
podLabels: {}

# -- Additional annotations attached to the NiFi pod template.
# @default -- {}
podAnnotations: {}

# -- Pod scheduling preferences.
# @default -- {}
affinity: {}

# -- Pod tolerations.
# @default -- []
tolerations: []

# -- Pod node selector.
# @default -- {}
nodeSelector: {}

# -- Pod topology spread constraints.
# @default -- []
topologySpreadConstraints: []

# -- Pod host aliases for the NiFi workload.
# @default -- []
hostAliases: []

# -- Pod priority class name for the NiFi workload.
# @default -- ""
priorityClassName: ""

# -- Pod termination grace period in seconds for NiFi pods.
# Give the JVM time to stop cleanly before kubelet force-kills the container.
# @default -- 120
terminationGracePeriodSeconds: 120

# -- Extra init containers appended after the built-in `init-conf` bootstrap container.
# Each item is a raw Kubernetes `Container` spec.
# Use an explicit per-container `securityContext` here when needed.
# @default -- []
# extraInitContainers:
# - name: trust-preflight
#   image: busybox:1.36
#   command:
#   - sh
#   - -c
#   - echo prepare shared files
#   securityContext:
#     runAsUser: 1000
#     runAsGroup: 1000
#     runAsNonRoot: true
extraInitContainers: []

# -- Default container security context merged into each `extraInitContainers[]` entry.
# Entry-level `securityContext` fields override these defaults.
# @default -- {}
extraInitContainersSecurityContext: {}

# -- Sidecar containers appended after the main `nifi` container.
# Each item is a raw Kubernetes `Container` spec.
# Use an explicit per-container `securityContext` here when needed.
# @default -- []
# sidecars:
# - name: log-shipper
#   image: busybox:1.36
#   command:
#   - sh
#   - -c
#   - tail -F /var/log/app.log
#   securityContext:
#     runAsUser: 1000
#     runAsGroup: 1000
#     runAsNonRoot: true
sidecars: []

# -- Default container security context merged into each `sidecars[]` entry.
# Entry-level `securityContext` fields override these defaults.
# @default -- {}
sidecarsSecurityContext: {}

# -- Pod security context.
# @default -- {"fsGroup":1000}
podSecurityContext:
  fsGroup: 1000

# -- Container security context.
# @default -- {"runAsUser":1000,"runAsGroup":1000,"runAsNonRoot":true,"allowPrivilegeEscalation":false,"capabilities":{"drop":["ALL"]},"seccompProfile":{"type":"RuntimeDefault"}}
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

# ------------------------------------------------------------------------------
# NiFi Runtime and Health Checks
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Core NiFi runtime settings rendered into the workload.
nifi:
  jvmHeapInit: 1g
  jvmHeapMax: 1g
  cluster:
    nodeProtocolMaxThreads: 50
    nodeConnectionTimeout: 5 sec
    nodeReadTimeout: 5 sec
    flowElectionMaxWait: 5 mins
    flowElectionMaxCandidates: ""
    loadBalanceConnectionsPerNode: 1
    loadBalanceMaxThreadCount: 8
    loadBalanceCommsTimeout: 30 sec

# -- Startup, readiness, and liveness probes.
# @default -- {"startup":{"periodSeconds":10,"failureThreshold":90,"timeoutSeconds":3},"readiness":{"periodSeconds":10,"failureThreshold":6,"timeoutSeconds":3},"liveness":{"periodSeconds":20,"failureThreshold":6,"timeoutSeconds":3}}
probes:
  startup:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 90
    timeoutSeconds: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 3
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 20
    failureThreshold: 6
    timeoutSeconds: 3

# -- Extra `nifi.properties` entries rendered by the chart.
# @default -- {"extraProperties":{}}
config:
  extraProperties: {}
