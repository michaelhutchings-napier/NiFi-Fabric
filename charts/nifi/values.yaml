# NiFi-Fabric app chart values
#
# This chart deploys the NiFi workload directly. Use it for standalone installs or
# as the workload nested under `charts/nifi-platform`.
#
# Start here:
# - Install guide: ../../docs/install/helm.md
# - App chart values reference: ../../docs/reference/app-chart-values.md
# - NiFiCluster reference for managed mode: ../../docs/reference/nificluster.md

# ------------------------------------------------------------------------------
# Workload Shape and Version
# Docs: ../../docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Number of NiFi pods.
# @default -- 3
replicaCount: 3

# -- NiFi container image settings.
# @default -- {"repository":"apache/nifi","tag":"2.0.0","pullPolicy":"IfNotPresent"}
image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

# -- Enables the managed OnDelete workload shape expected by the controller path.
# Set this to `true` when the workload is controlled through `charts/nifi-platform`.
# @default -- {"enabled":false}
controllerManaged:
  enabled: false

# ------------------------------------------------------------------------------
# Identity, Service, and Exposure
# Docs: ../../docs/manage/authentication.md
# Docs: ../../docs/install/advanced.md
# ------------------------------------------------------------------------------

# -- Workload ServiceAccount settings.
# @default -- {"create":true,"name":""}
serviceAccount:
  create: true
  name: ""

# -- Main NiFi Service settings.
# @default -- {"type":"ClusterIP","annotations":{},"sessionAffinity":"None"}
service:
  type: ClusterIP
  annotations: {}
  sessionAffinity: None

# -- NiFi Service ports.
# @default -- {"https":8443,"cluster":11443,"loadBalance":6342}
ports:
  https: 8443
  cluster: 11443
  loadBalance: 6342

# -- Explicit proxy hosts passed to NiFi for ingress, Route, or external proxy access.
# @default -- []
web:
  proxyHosts: []

# -- Standard Kubernetes Ingress settings.
# @default -- {"enabled":false,"className":"","annotations":{},"hosts":[{"host":"nifi.local","paths":[{"path":"/","pathType":"Prefix"}]}],"tls":[]}
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: nifi.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

# -- OpenShift Route settings for passthrough HTTPS access.
# @default -- {"route":{"enabled":false,"host":"","annotations":{},"tls":{"termination":"passthrough","insecureEdgeTerminationPolicy":"None"}}}
openshift:
  route:
    enabled: false
    host: ""
    annotations: {}
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

# ------------------------------------------------------------------------------
# TLS and Certificates
# Docs: ../../docs/manage/tls-and-cert-manager.md
# ------------------------------------------------------------------------------

# -- TLS source, mounted Secret keys, and optional cert-manager integration.
# Use `externalSecret` when operators create the TLS Secret separately.
# Use `certManager` when cert-manager is already installed in the cluster.
tls:
  mode: externalSecret
  existingSecret: nifi-tls
  mountPath: /opt/nifi/tls
  caCertKey: ca.crt
  keystoreKey: keystore.p12
  truststoreKey: truststore.p12
  keystorePasswordKey: keystorePassword
  truststorePasswordKey: truststorePassword
  sensitivePropsKeyKey: sensitivePropsKey
  sensitiveProps:
    value: ""
    secretRef:
      name: ""
      key: ""
  autoReload:
    enabled: false
    interval: 10 secs
  certManager:
    enabled: false
    issuerRef:
      name: ""
      kind: ClusterIssuer
      group: cert-manager.io
    secretName: nifi-tls
    duration: 2160h
    renewBefore: 360h
    # -- Leave empty to default the certificate subject to the Service FQDN.
    # NiFi node identity comes from the certificate subject.
    commonName: ""
    dnsNames: []
    usages:
    - server auth
    - client auth
    privateKey:
      algorithm: RSA
      size: 2048
      rotationPolicy: Always
    pkcs12:
      create: true
      profile: Modern2023
      password: ""
      passwordSecretRef:
        name: ""
        key: ""
  additionalTrustBundle:
    # -- Optional extra PEM CA bundle imported into a writable copy of the NiFi truststore.
    # Use this for outbound trust to LDAP, OIDC, Flow Registry, or other TLS dependencies
    # when a shared trust bundle is distributed separately from the main NiFi TLS Secret.
    enabled: false
    # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the optional
    # trust-manager integration in `charts/nifi-platform`.
    useTrustManagerBundle: false
    mountPath: /opt/nifi/trust-bundle
    configMapRef:
      name: ""
      key: ca.crt
    secretRef:
      name: ""
      key: ca.crt

# -- Reference settings for the optional platform trust-manager bundle when
# `*.useTrustManagerBundle=true` is enabled in this chart. Leave `name` empty to use
# the default platform-generated `<release>-trust-bundle` name.
trustManagerBundleRef:
  type: configMap
  name: ""
  key: ca.crt

# ------------------------------------------------------------------------------
# Authentication and Authorization
# Docs: ../../docs/manage/authentication.md
# ------------------------------------------------------------------------------

# -- NiFi authentication mode and provider settings.
# Supported modes are `singleUser`, `oidc`, and `ldap`.
auth:
  mode: singleUser
  singleUser:
    existingSecret: nifi-auth
    usernameKey: username
    passwordKey: password
  oidc:
    discoveryUrl: ""
    clientId: ""
    clientSecret:
      existingSecret: ""
      key: clientSecret
    preferredJwsAlgorithm: ""
    additionalScopes:
    - openid
    - profile
    - email
    claims:
      identifyingUser: email
      groups: groups
    extraProperties: {}
  ldap:
    url: ""
    authenticationStrategy: START_TLS
    identityStrategy: USE_DN
    authenticationExpiration: 12 hours
    referralStrategy: FOLLOW
    connectTimeout: 10 secs
    readTimeout: 10 secs
    pageSize: ""
    syncInterval: 30 mins
    groupMembershipEnforceCaseSensitivity: false
    managerSecret:
      name: ""
      dnKey: managerDn
      passwordKey: managerPassword
    tls:
      clientAuth: NONE
      protocol: TLS
      shutdownGracefully: false
    userSearch:
      base: ""
      filter: "(sAMAccountName={0})"
      scope: ONE_LEVEL
      objectClass: person
      identityAttribute: ""
      groupNameAttribute: ""
      groupNameReferencedGroupAttribute: ""
    groupSearch:
      base: ""
      filter: ""
      scope: ONE_LEVEL
      objectClass: group
      nameAttribute: ""
      memberAttribute: ""
      memberReferencedUserAttribute: ""

# -- NiFi authorization mode, bootstrap, groups, and policies.
authz:
  mode: fileManaged
  bootstrap:
    initialAdminGroup: ""
    initialAdminIdentity: ""
  applicationGroups: []
  bundles:
    # -- Recommended named policy bundles for common customer roles.
    # These compile down to the same file-managed policies the chart already supports.
    # Keep `authz.policies` for exceptions rather than as the default customer path.
    viewer:
      groups: []
      includeInitialAdmin: false
    editor:
      groups: []
      includeInitialAdmin: false
    flowVersionManager:
      groups: []
      includeInitialAdmin: false
    admin:
      groups: []
      includeInitialAdmin: false
  capabilities:
    # -- Bounded built-in capability bundles for common NiFi access patterns.
    # `mutableFlow` seeds the inherited root-canvas policies needed for child
    # process-group create/edit work and process-group-level version-control
    # actions without introducing a general policy control plane.
    # It intentionally does not seed policy management, tenant management, or
    # parameter-context administration.
    mutableFlow:
      enabled: false
      includeInitialAdmin: true
      groups: []
  policies: []

# ------------------------------------------------------------------------------
# Observability and Metrics
# Docs: ../../docs/manage/observability-metrics.md
# ------------------------------------------------------------------------------

# -- Deprecated compatibility shim for older ServiceMonitor-only values.
# Prefer `observability.metrics`.
# @default -- {"enabled":false,"interval":"30s","scrapeTimeout":"10s"}
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

# -- First-class metrics subsystem.
# `nativeApi` is the primary supported mode.
# `exporter` is a supported secondary mode for a clean `/metrics` endpoint.
# `siteToSite` is an optional experimental typed metrics-export path.
observability:
  metrics:
    mode: disabled
    nativeApi:
      # -- Native secured NiFi API scraping with chart-managed Service and ServiceMonitors.
      # This is the recommended default metrics path for NiFi-Fabric.
      service:
        # -- Keep this enabled for the recommended dedicated metrics Service.
        enabled: true
        annotations: {}
        labels: {}
      serviceMonitor:
        # -- Default Prometheus Operator settings for all named nativeApi scrape profiles.
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: https
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        # -- Provider-agnostic machine-auth contract.
        # Operators still provide the referenced Secret and rotation flow out of band.
        type: none
        secretRef:
          name: ""
        basicAuth:
          usernameKey: username
          passwordKey: password
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      tlsConfig:
        # -- When left empty, serverName defaults to the main NiFi Service FQDN.
        serverName: ""
        insecureSkipVerify: false
        ca:
          # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the
          # optional platform trust-manager integration.
          useTrustManagerBundle: false
          configMapRef:
            name: ""
            key: ca.crt
          secretRef:
            name: ""
            key: ""
      endpoints:
      # -- Named nativeApi scrape profiles.
      # Names must stay unique after sanitizing to Kubernetes object names.
      - name: flow
        enabled: true
        path: /nifi-api/flow/metrics/prometheus
        params: {}
        interval: ""
        scrapeTimeout: ""
        scheme: ""
        honorLabels: false
        labels: {}
        annotations: {}
    exporter:
      # -- Optional companion exporter for environments that want a clean `/metrics` scrape endpoint.
      # It republishes secured flow metrics and can append a small set of controller-status gauges from `/nifi-api/flow/status`.
      image:
        repository: python
        tag: "3.12-alpine"
        pullPolicy: IfNotPresent
      deployment:
        annotations: {}
        labels: {}
      service:
        enabled: true
        annotations: {}
        labels: {}
        port: 9090
      serviceMonitor:
        enabled: true
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: http
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        type: authorizationHeader
        secretRef:
          name: ""
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      source:
        scheme: https
        host: ""
        port: 8443
        path: /nifi-api/flow/metrics/prometheus
        timeoutSeconds: 10
        tlsConfig:
          insecureSkipVerify: false
          ca:
            # -- Use the default `<release>-nifi-trust-bundle` ConfigMap name expected by the
            # optional platform trust-manager integration.
            useTrustManagerBundle: false
            configMapRef:
              name: ""
              key: ca.crt
            secretRef:
              name: ""
              key: ""
      supplemental:
        flowStatus:
          enabled: false
          path: /nifi-api/flow/status
      resources: {}
    siteToSite:
      # -- Optional typed SiteToSite metrics export path.
      # This creates only the bounded NiFi runtime objects required for SiteToSite metrics export:
      # one SiteToSiteMetricsReportingTask and one SSL Context Service when secure transport is used.
      enabled: false
      destination:
        # -- Receiver base URL that accepts the site-to-site metrics feed.
        url: ""
        # -- Receiver input port name expected to accept the metrics feed.
        inputPortName: ""
      auth:
        # -- Typed destination auth shape for SiteToSite metrics export.
        # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
        # `secretRef` uses the referenced Secret's keystore/truststore material instead.
        # `none` is valid only for plain http:// destination URLs.
        type: workloadTLS
        # -- Receiver-side authorized identity for secure SiteToSite metrics export.
        # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
        # to the required `/controller` read, `/site-to-site` read, and destination
        # input-port write policies. Leave empty only when auth.type=none.
        authorizedIdentity: ""
        secretRef:
          name: ""
          keystoreKey: keystore.p12
          keystorePasswordKey: keystorePassword
          truststoreKey: truststore.p12
          truststorePasswordKey: truststorePassword
      source:
        # -- Metrics source identity hints sent by SiteToSiteMetricsReportingTask.
        # Leave hostname and instanceUrl empty to derive them from the local pod and Service.
        applicationId: nifi
        hostname: ""
        instanceUrl: ""
      transport:
        # -- Supported transport values for the typed SiteToSite metrics path.
        protocol: HTTP
        communicationsTimeout: 30 secs
        compressEvents: true
      format:
        # -- Supported output format for the typed SiteToSite metrics path.
        # Record Format is intentionally excluded because it would require broader Record Writer ownership.
        type: AmbariFormat
        includeNullValues: false
  siteToSiteStatus:
    # -- Optional typed SiteToSite status export path.
    # This creates only the bounded NiFi runtime objects required for SiteToSite status export:
    # one SiteToSiteStatusReportingTask and one SSL Context Service when secure transport is used.
    enabled: false
    destination:
      # -- Receiver base URL that accepts the site-to-site status feed.
      url: ""
      # -- Receiver input port name expected to accept the status feed.
      inputPortName: ""
    auth:
      # -- Typed destination auth shape for SiteToSite status export.
      # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
      # `secretRef` uses the referenced Secret's keystore/truststore material instead.
      # `none` is valid only for plain http:// destination URLs.
      type: workloadTLS
      # -- Receiver-side authorized identity for secure Site-to-Site status export.
      # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
      # to the required `/controller` read, `/site-to-site` read, and destination
      # input-port write policies. Leave empty only when auth.type=none.
      authorizedIdentity: ""
      secretRef:
        name: ""
        keystoreKey: keystore.p12
        keystorePasswordKey: keystorePassword
        truststoreKey: truststore.p12
        truststorePasswordKey: truststorePassword
    source:
      # -- Optional Instance URL override used in the exported status payload.
      # Leave empty to derive it from the local Service.
      instanceUrl: ""
    transport:
      # -- Supported transport values for the typed SiteToSite status path.
      protocol: HTTP
      communicationsTimeout: 30 secs
      compressEvents: true
  siteToSiteProvenance:
    # -- Optional typed SiteToSite provenance export path.
    # This creates only the bounded NiFi runtime objects required for SiteToSite provenance export:
    # one SiteToSiteProvenanceReportingTask and one SSL Context Service when secure transport is used.
    enabled: false
    destination:
      # -- Receiver base URL that accepts the site-to-site provenance feed.
      url: ""
      # -- Receiver input port name expected to accept the provenance feed.
      inputPortName: ""
    auth:
      # -- Typed destination auth shape for SiteToSite provenance export.
      # `workloadTLS` reuses the main NiFi workload keystore/truststore identity.
      # `secretRef` uses the referenced Secret's keystore/truststore material instead.
      # `none` is valid only for plain http:// destination URLs.
      type: workloadTLS
      # -- Receiver-side authorized identity for secure Site-to-Site provenance export.
      # Use the RFC2253-style X.509 subject the destination receiver must trust and bind
      # to the required `/controller` read, `/site-to-site` read, and destination
      # input-port write policies. Leave empty only when auth.type=none.
      authorizedIdentity: ""
      secretRef:
        name: ""
        keystoreKey: keystore.p12
        keystorePasswordKey: keystorePassword
        truststoreKey: truststore.p12
        truststorePasswordKey: truststorePassword
    source:
      # -- Optional Instance URL override used in the exported provenance payload.
      # Leave empty to derive it from the local Service.
      instanceUrl: ""
    transport:
      # -- Supported transport values for the typed SiteToSite provenance path.
      protocol: HTTP
      communicationsTimeout: 30 secs
      compressEvents: true
    provenance:
      # -- Initial export cursor for the typed provenance path.
      # `endOfStream` avoids replaying historical provenance on first start.
      # `beginningOfStream` allows an explicit one-time historical backfill instead.
      startPosition: endOfStream

# ------------------------------------------------------------------------------
# Flow Registry Clients
# Docs: ../../docs/manage/flow-registry-clients.md
# ------------------------------------------------------------------------------

# -- Prepared Flow Registry Client catalog entries mounted into the NiFi pod.
flowRegistryClients:
  enabled: false
  mountPath: /opt/nifi/fabric/flow-registry-clients
  clients: []

# ------------------------------------------------------------------------------
# Parameter Contexts
# Docs: ../../docs/manage/parameters.md
# ------------------------------------------------------------------------------

# -- Runtime-managed Parameter Context definitions.
# The chart creates and reconciles only the declared Parameter Contexts in NiFi:
# - declared contexts are created, updated, and deleted through the NiFi API
# - optional attachments are limited to named direct root-child process groups
# - providerRefs stay reference-only; the product does not create or reconcile
#   NiFi Parameter Providers
# - live reconciliation does not require a rollout or pod restart for values or
#   referenced Secret changes
# Enterprise auth modes use the explicit bootstrap admin identity as the bounded
# trusted-proxy management identity for this feature.
parameterContexts:
  enabled: false
  mountPath: /opt/nifi/fabric/parameter-contexts
  contexts: []

# ------------------------------------------------------------------------------
# Versioned Flow Imports
# Docs: ../../docs/manage/flows.md
# ------------------------------------------------------------------------------

# -- Runtime-managed versioned-flow import definitions.
# The chart creates only the bounded NiFi runtime state required for one
# selected registry-backed flow import per entry:
# - the selected live Flow Registry Client must already exist in NiFi
# - the declared flow is imported under one named root child process group
# - at most one direct Parameter Context reference can be attached
# - removed imports are not deleted from NiFi in this slice
# - ongoing version synchronization and arbitrary process-group mutation remain
#   out of scope
# In managed mode, changes are applied through the existing restart-trigger and
# rollout safety path.
versionedFlowImports:
  enabled: false
  mountPath: /opt/nifi/fabric/versioned-flow-imports
  imports: []

# ------------------------------------------------------------------------------
# Availability, Storage, and Resources
# Docs: ../../docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Pod disruption budget settings.
# @default -- {"enabled":true,"minAvailable":1}
pdb:
  enabled: true
  minAvailable: 1

# -- Persistent repository storage settings.
# @default -- {"enabled":true,"storageClassName":"","accessModes":["ReadWriteOnce"],"databaseRepository":{"size":"2Gi"},"flowfileRepository":{"size":"2Gi"},"contentRepository":{"size":"4Gi"},"provenanceRepository":{"size":"4Gi"}}
persistence:
  enabled: true
  storageClassName: ""
  accessModes:
  - ReadWriteOnce
  databaseRepository:
    size: 2Gi
  flowfileRepository:
    size: 2Gi
  contentRepository:
    size: 4Gi
  provenanceRepository:
    size: 4Gi

# -- NiFi container resource requests and limits.
# @default -- {}
resources: {}

# ------------------------------------------------------------------------------
# Scheduling and Security
# Docs: ../../docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Pod scheduling preferences.
# @default -- {}
affinity: {}

# -- Pod tolerations.
# @default -- []
tolerations: []

# -- Pod node selector.
# @default -- {}
nodeSelector: {}

# -- Pod topology spread constraints.
# @default -- []
topologySpreadConstraints: []

# -- Pod security context.
# @default -- {"fsGroup":1000}
podSecurityContext:
  fsGroup: 1000

# -- Container security context.
# @default -- {"runAsUser":1000,"runAsGroup":1000,"runAsNonRoot":true}
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# ------------------------------------------------------------------------------
# NiFi Runtime and Health Checks
# Docs: ../../docs/reference/app-chart-values.md
# ------------------------------------------------------------------------------

# -- Core NiFi runtime settings rendered into the workload.
nifi:
  jvmHeapInit: 1g
  jvmHeapMax: 1g
  cluster:
    nodeProtocolMaxThreads: 50
    nodeConnectionTimeout: 5 sec
    nodeReadTimeout: 5 sec
    flowElectionMaxWait: 5 mins
    flowElectionMaxCandidates: ""
    loadBalanceConnectionsPerNode: 1
    loadBalanceMaxThreadCount: 8
    loadBalanceCommsTimeout: 30 sec

# -- Startup, readiness, and liveness probes.
# @default -- {"startup":{"periodSeconds":10,"failureThreshold":90,"timeoutSeconds":3},"readiness":{"periodSeconds":10,"failureThreshold":6,"timeoutSeconds":3},"liveness":{"periodSeconds":20,"failureThreshold":6,"timeoutSeconds":3}}
probes:
  startup:
    periodSeconds: 10
    failureThreshold: 90
    timeoutSeconds: 3
  readiness:
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 3
  liveness:
    periodSeconds: 20
    failureThreshold: 6
    timeoutSeconds: 3

# -- Extra `nifi.properties` entries rendered by the chart.
# @default -- {"extraProperties":{}}
config:
  extraProperties: {}
