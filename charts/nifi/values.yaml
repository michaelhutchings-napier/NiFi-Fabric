replicaCount: 3

podAnnotations: {}

image:
  repository: apache/nifi
  # Private-alpha runtime proof currently covers 2.0.0 and a focused 2.8.0 path.
  # Use examples/nifi-2.8.0-values.yaml for the newer compatibility overlay.
  tag: "2.0.0"
  pullPolicy: IfNotPresent

controllerManaged:
  enabled: false

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  annotations: {}
  sessionAffinity: None

ports:
  https: 8443
  cluster: 11443
  loadBalance: 6342

tls:
  mode: externalSecret
  existingSecret: nifi-tls
  mountPath: /opt/nifi/tls
  caCertKey: ca.crt
  keystoreKey: keystore.p12
  truststoreKey: truststore.p12
  keystorePasswordKey: keystorePassword
  truststorePasswordKey: truststorePassword
  sensitivePropsKeyKey: sensitivePropsKey
  sensitiveProps:
    value: ""
    secretRef:
      name: ""
      key: ""
  autoReload:
    enabled: false
    interval: 10 secs
  certManager:
    enabled: false
    issuerRef:
      name: ""
      kind: ClusterIssuer
      group: cert-manager.io
    secretName: nifi-tls
    duration: 2160h
    renewBefore: 360h
    # Leave empty to default the certificate subject to the Service FQDN.
    # NiFi derives its node identity from the certificate subject, so cert-manager
    # mode must not leave the subject empty.
    commonName: ""
    dnsNames: []
    usages:
    - server auth
    - client auth
    privateKey:
      algorithm: RSA
      size: 2048
      rotationPolicy: Always
    pkcs12:
      create: true
      profile: Modern2023
      password: ""
      passwordSecretRef:
        name: ""
        key: ""

auth:
  mode: singleUser
  singleUser:
    existingSecret: nifi-auth
    usernameKey: username
    passwordKey: password
  oidc:
    discoveryUrl: ""
    clientId: ""
    clientSecret:
      existingSecret: ""
      key: clientSecret
    preferredJwsAlgorithm: ""
    additionalScopes:
    - openid
    - profile
    - email
    claims:
      identifyingUser: email
      groups: groups
    extraProperties: {}
  ldap:
    url: ""
    authenticationStrategy: START_TLS
    identityStrategy: USE_DN
    authenticationExpiration: 12 hours
    referralStrategy: FOLLOW
    connectTimeout: 10 secs
    readTimeout: 10 secs
    pageSize: ""
    syncInterval: 30 mins
    groupMembershipEnforceCaseSensitivity: false
    managerSecret:
      name: ""
      dnKey: managerDn
      passwordKey: managerPassword
    tls:
      clientAuth: NONE
      protocol: TLS
      shutdownGracefully: false
    userSearch:
      base: ""
      filter: "(sAMAccountName={0})"
      scope: ONE_LEVEL
      objectClass: person
      identityAttribute: ""
      groupNameAttribute: ""
      groupNameReferencedGroupAttribute: ""
    groupSearch:
      base: ""
      filter: ""
      scope: ONE_LEVEL
      objectClass: group
      nameAttribute: ""
      memberAttribute: ""
      memberReferencedUserAttribute: ""

authz:
  mode: fileManaged
  bootstrap:
    initialAdminGroup: ""
    initialAdminIdentity: ""
  applicationGroups: []
  policies: []

web:
  proxyHosts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: nifi.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

openshift:
  route:
    enabled: false
    host: ""
    annotations: {}
    tls:
      termination: passthrough
      insecureEdgeTerminationPolicy: None

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # Deprecated compatibility shim. Prefer observability.metrics.

observability:
  metrics:
    mode: disabled
    # Supported modes:
    # - disabled
    # - nativeApi
    # - exporter
    # Prepared-only contract in this slice:
    # - siteToSite
    nativeApi:
      service:
        enabled: true
        annotations: {}
        labels: {}
      serviceMonitor:
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: https
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        type: none
        secretRef:
          name: ""
        # Machine-auth bootstrap is provider-agnostic by contract only in this slice.
        # Supply the Secret out of band; the chart does not provision the principal.
        basicAuth:
          usernameKey: username
          passwordKey: password
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      tlsConfig:
        # When a tlsConfig block is rendered, serverName defaults to the main NiFi
        # Service FQDN so secure scraping still works even when using the dedicated
        # metrics Service.
        serverName: ""
        insecureSkipVerify: false
        ca:
          secretRef:
            name: ""
            key: ""
      endpoints:
      - name: flow
        enabled: true
        path: /nifi-api/flow/metrics/prometheus
        params: {}
        interval: ""
        scrapeTimeout: ""
        scheme: ""
        honorLabels: false
        labels: {}
        annotations: {}
    exporter:
      image:
        repository: python
        tag: "3.12-alpine"
        pullPolicy: IfNotPresent
      deployment:
        annotations: {}
        labels: {}
      service:
        enabled: true
        annotations: {}
        labels: {}
        port: 9090
      serviceMonitor:
        enabled: true
        defaults:
          interval: 30s
          scrapeTimeout: 10s
          scheme: http
          honorLabels: false
          labels: {}
          annotations: {}
      machineAuth:
        type: authorizationHeader
        secretRef:
          name: ""
        bearerToken:
          tokenKey: token
        authorization:
          type: Bearer
          credentialsKey: token
      source:
        scheme: https
        host: ""
        port: 8443
        path: /nifi-api/flow/metrics/prometheus
        timeoutSeconds: 10
        tlsConfig:
          insecureSkipVerify: false
          ca:
            secretRef:
              name: ""
              key: ""
      resources: {}
    siteToSite:
      # Prepared-only contract for a future SiteToSiteMetricsReportingTask path.
      # This slice does not yet create or manage NiFi reporting tasks or the
      # destination receiver pipeline.
      destination:
        url: ""
        inputPortName: ""
      source:
        applicationId: nifi
        hostname: ""
        instanceUrl: ""
      transport:
        protocol: RAW
        communicationsTimeout: 30 secs
        compressEvents: true
      format:
        type: AmbariFormat
        includeNullValues: false

pdb:
  enabled: true
  minAvailable: 1

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
  - ReadWriteOnce
  databaseRepository:
    size: 2Gi
  flowfileRepository:
    size: 2Gi
  contentRepository:
    size: 4Gi
  provenanceRepository:
    size: 4Gi

resources: {}

affinity: {}
tolerations: []
nodeSelector: {}
topologySpreadConstraints: []

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

nifi:
  jvmHeapInit: 1g
  jvmHeapMax: 1g
  cluster:
    nodeProtocolMaxThreads: 50
    nodeConnectionTimeout: 5 sec
    nodeReadTimeout: 5 sec
    flowElectionMaxWait: 5 mins
    flowElectionMaxCandidates: ""
    loadBalanceConnectionsPerNode: 1
    loadBalanceMaxThreadCount: 8
    loadBalanceCommsTimeout: 30 sec

probes:
  startup:
    periodSeconds: 10
    failureThreshold: 90
    timeoutSeconds: 3
  readiness:
    periodSeconds: 10
    failureThreshold: 6
    timeoutSeconds: 3
  liveness:
    periodSeconds: 20
    failureThreshold: 6
    timeoutSeconds: 3

config:
  # This chart writes a baseline nifi.properties and lets the official image patch pod-specific values at startup.
  # In certManager mode the chart renders Certificate resources and still expects stable password refs.
  extraProperties: {}

flowRegistryClients:
  enabled: false
  mountPath: /opt/nifi/fabric/flow-registry-clients
  clients: []
