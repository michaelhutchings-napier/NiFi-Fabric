replicaCount: 3

image:
  repository: apache/nifi
  tag: "2.0.0"
  pullPolicy: IfNotPresent

controllerManaged:
  enabled: false

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  annotations: {}

ports:
  https: 8443
  cluster: 11443

tls:
  existingSecret: nifi-tls
  mountPath: /opt/nifi/tls

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: nifi.local
    paths:
    - path: /
      pathType: Prefix
  tls: []

openshift:
  route:
    enabled: false
    host: ""

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

pdb:
  enabled: true
  minAvailable: 1

persistence:
  enabled: true
  size: 20Gi
  storageClassName: ""

resources: {}

affinity: {}
tolerations: []
nodeSelector: {}
topologySpreadConstraints: []

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

config:
  # This scaffold keeps a small nifi.properties template.
  # TLS and repository layout are intentionally incomplete until chart work begins in earnest.
  extraProperties: {}

