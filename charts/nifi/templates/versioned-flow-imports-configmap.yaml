    def update_imported_process_group_version(
        opener,
        base_url,
        proxied_identity,
        client_id,
        process_group_id,
        revision_version,
        registry_id,
        snapshot,
    ):
        payload = {
            "processGroupRevision": {
                "clientId": client_id,
                "version": int(revision_version),
            },
            "registryId": registry_id,
            "updateDescendantVersionedFlows": False,
            "versionedFlowSnapshot": snapshot,
        }
        response = request(
            opener,
            base_url,
            "PUT",
            f"/versions/process-groups/{process_group_id}",
            proxied_identity,
            payload=payload,
            expect=(200, 201),
        )
        version_control = response.get("versionControlInformation", {})
        revision = response.get("processGroupRevision", {}) or response.get("revision", {})
        return version_control, revision


    def bind_parameter_context(opener, base_url, proxied_identity, config, process_group_id, revision_version, parameter_context_id):
        payload = {
            "revision": {
                "clientId": config["management"]["clientId"],
                "version": int(revision_version),
            },
            "component": {
                "id": process_group_id,
                "parameterContext": {
                    "id": parameter_context_id,
                },
            },
        }
        request(
            opener,
            base_url,
            "PUT",
            f"/process-groups/{process_group_id}",
            proxied_identity,
            payload=payload,
            expect=(200, 201),
        )


    def clear_parameter_context(opener, base_url, proxied_identity, config, process_group_id, revision_version):
        payload = {
            "revision": {
                "clientId": config["management"]["clientId"],
                "version": int(revision_version),
            },
            "component": {
                "id": process_group_id,
                "parameterContext": None,
            },
        }
        request(
            opener,
            base_url,
            "PUT",
            f"/process-groups/{process_group_id}",
            proxied_identity,
            payload=payload,
            expect=(200, 201),
        )


    def update_process_group_comments(opener, base_url, proxied_identity, config, process_group_id, revision_version, name, comments):
        payload = {
            "revision": {
                "clientId": config["management"]["clientId"],
                "version": int(revision_version),
            },
            "component": {
                "id": process_group_id,
                "name": name,
                "comments": comments,
            },
        }
        request(
            opener,
            base_url,
            "PUT",
            f"/process-groups/{process_group_id}",
            proxied_identity,
            payload=payload,
            expect=(200, 201),
        )


    def version_control_information(component_payload, process_group_flow, flow_payload):
        for source in (
            component_payload.get("component", {}),
            process_group_flow.get("breadcrumb", {}),
            process_group_flow,
            flow_payload,
        ):
            if not isinstance(source, dict):
                continue
            if isinstance(source.get("versionControlInformation"), dict):
                return source["versionControlInformation"]
        return {}


    def refresh_process_group_state(opener, base_url, proxied_identity, process_group_id):
        component_payload, component, revision = get_process_group_component(opener, base_url, proxied_identity, process_group_id)
        _, process_group_flow, flow_payload = get_process_group_flow(opener, base_url, proxied_identity, process_group_id)
        version_control = version_control_information(component_payload, process_group_flow, flow_payload)
        return component_payload, component, revision, process_group_flow, flow_payload, version_control


    def wait_for_process_group_quiescent(opener, base_url, proxied_identity, process_group_id, timeout_seconds):
        deadline = time.time() + timeout_seconds
        last_running_count = None
        last_active_threads = None
        while time.time() < deadline:
            component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                opener,
                base_url,
                proxied_identity,
                process_group_id,
            )
            _, _, status_snapshot = get_process_group_status(opener, base_url, proxied_identity, process_group_id)
            last_running_count = process_group_running_count(component_payload, component, process_group_flow, flow_payload)
            last_active_threads = process_group_active_thread_count(status_snapshot)
            if last_running_count == 0 and last_active_threads == 0:
                return component_payload, component, revision, process_group_flow, flow_payload, version_control, status_snapshot
            time.sleep(2)
        raise NiFiAPIError(
            f"bounded rollout drain timed out for process group {process_group_id!r}: runningCount={last_running_count!r}, activeThreadCount={last_active_threads!r}"
        )


    def wait_for_process_group_resumed(opener, base_url, proxied_identity, process_group_id, timeout_seconds):
        deadline = time.time() + timeout_seconds
        last_running_count = None
        last_active_threads = None
        while time.time() < deadline:
            component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                opener,
                base_url,
                proxied_identity,
                process_group_id,
            )
            _, _, status_snapshot = get_process_group_status(opener, base_url, proxied_identity, process_group_id)
            last_running_count = process_group_running_count(component_payload, component, process_group_flow, flow_payload)
            last_active_threads = process_group_active_thread_count(status_snapshot)
            if last_running_count > 0:
                return component_payload, component, revision, process_group_flow, flow_payload, version_control, status_snapshot
            time.sleep(2)
        raise NiFiAPIError(
            f"bounded rollout resume timed out for process group {process_group_id!r}: runningCount={last_running_count!r}, activeThreadCount={last_active_threads!r}"
        )


    def resolved_version_for_import(opener, base_url, proxied_identity, import_entry, registry_id, bucket_id, flow_id, ownership_metadata, previous_entry, import_status):
        selected_version = str(import_entry["source"]["version"])
        flow_name = import_entry["source"]["flowName"]
        observed_hash = import_status["observedHash"]

        if selected_version != "latest":
            version_entry = resolve_version_entry(
                opener,
                base_url,
                proxied_identity,
                registry_id,
                bucket_id,
                flow_id,
                selected_version,
            )
            import_status["resolvedVersion"] = version_entry["version"]
            import_status["resolvedVersionSource"] = "declared"
            return version_entry

        latest_entry = resolve_version_entry(
            opener,
            base_url,
            proxied_identity,
            registry_id,
            bucket_id,
            flow_id,
            "latest",
        )
        import_status["latestResolvedVersion"] = latest_entry["version"]

        pinned_version = ""
        for source in (ownership_metadata, previous_entry):
            if not isinstance(source, dict):
                continue
            if source.get("selectedVersion") != "latest":
                continue
            if source.get("observedHash") != observed_hash:
                continue
            pinned_version = str(source.get("resolvedVersion") or "").strip()
            if pinned_version:
                break

        if pinned_version:
            version_entry = resolve_version_entry(
                opener,
                base_url,
                proxied_identity,
                registry_id,
                bucket_id,
                flow_id,
                pinned_version,
            )
            import_status["resolvedVersion"] = version_entry["version"]
            import_status["resolvedVersionSource"] = "ownership-marker"
            if version_entry["version"] != latest_entry["version"]:
                import_status["latestAvailableVersion"] = latest_entry["version"]
            return version_entry

        import_status["resolvedVersion"] = latest_entry["version"]
        import_status["resolvedVersionSource"] = "latest"
        return latest_entry


    def validate_owned_target(import_entry, ownership_metadata):
        if ownership_metadata.get("importName") != import_entry["name"]:
            raise NiFiAPIError(
                f"declared target {import_entry['target']['rootProcessGroupName']!r} is already owned by import {ownership_metadata.get('importName')!r}, not {import_entry['name']!r}"
            )
        for field, expected in (
            ("registryClientName", import_entry["registryClientRef"]["name"]),
            ("bucket", import_entry["source"]["bucket"]),
            ("flowName", import_entry["source"]["flowName"]),
            ("targetRootProcessGroupName", import_entry["target"]["rootProcessGroupName"]),
        ):
            actual = ownership_metadata.get(field)
            if actual and actual != expected:
                raise NiFiAPIError(
                    f"owned target {import_entry['target']['rootProcessGroupName']!r} was created for {field}={actual!r}, not {expected!r}; delete or rename the owned target before changing the declared source or target"
                )


    def ensure_import(config, previous_entry, opener, base_url, proxied_identity, import_entry):
        client_id = config["management"]["clientId"]
        import_status = {
            "name": import_entry["name"],
            "selectedVersion": str(import_entry["source"]["version"]),
            "targetRootProcessGroupName": import_entry["target"]["rootProcessGroupName"],
            "observedHash": import_observed_hash(import_entry),
            "status": "running",
        }

        target_name = import_entry["target"]["rootProcessGroupName"]
        root_children = root_child_process_groups(opener, base_url, proxied_identity)
        target_matches = [entry for entry in root_children if entry["name"] == target_name]
        if len(target_matches) > 1:
            raise NiFiAPIError(
                f"declared root child process group name {target_name!r} is ambiguous in NiFi; rename the targets so the bounded ownership scope stays unique"
            )

        process_group_id = target_matches[0]["id"] if target_matches else ""
        ownership_metadata = ownership_metadata_from_comments(config, target_matches[0]["comments"]) if target_matches else {}
        if process_group_id:
            if not ownership_metadata:
                raise NiFiAPIError(
                    f"declared target root child process group {target_name!r} already exists in NiFi without the product ownership marker; operator-owned targets are not adopted automatically"
                )
            validate_owned_target(import_entry, ownership_metadata)
            import_status["ownershipState"] = "owned"
        else:
            import_status["ownershipState"] = "creating"

        registry_name = import_entry["registryClientRef"]["name"]
        _, registry_id, registry_client_action, registry_client_ownership = resolve_registry_client(
            opener,
            base_url,
            proxied_identity,
            config,
            import_entry,
        )
        import_status["registryClientName"] = registry_name
        import_status["registryClientId"] = registry_id
        import_status["registryClientAction"] = registry_client_action
        import_status["registryClientOwnership"] = registry_client_ownership

        bucket_name = import_entry["source"]["bucket"]
        flow_name = import_entry["source"]["flowName"]
        bucket = resolve_bucket(config, opener, base_url, proxied_identity, registry_id, bucket_name)
        bucket_id = bucket["id"]
        flow_id = resolve_flow_id(opener, base_url, proxied_identity, registry_id, bucket_id, flow_name)
        import_status["bucket"] = bucket_name
        import_status["bucketId"] = bucket_id
        import_status["flowName"] = flow_name
        import_status["flowId"] = flow_id

        version_entry = resolved_version_for_import(
            opener,
            base_url,
            proxied_identity,
            import_entry,
            registry_id,
            bucket_id,
            flow_id,
            ownership_metadata,
            previous_entry,
            import_status,
        )
        snapshot = selected_snapshot(
            config,
            registry_name,
            registry_id,
            bucket_name,
            bucket_id,
            flow_name,
            flow_id,
            version_entry,
            import_entry["source"]["version"],
        )

        parameter_context_id = ""
        parameter_context_refs = import_entry.get("parameterContextRefs", [])
        if parameter_context_refs:
            parameter_context_name = parameter_context_refs[0]["name"]
            parameter_context_id = parameter_context_ids_by_name(opener, base_url, proxied_identity).get(parameter_context_name, "")
            if not parameter_context_id:
                raise NiFiAPIError(
                    f"declared Parameter Context {parameter_context_name!r} does not exist in NiFi yet; reconcile it first through parameterContexts or create it manually before this bounded import runs"
                )
            import_status["parameterContextName"] = parameter_context_name
            import_status["parameterContextId"] = parameter_context_id

        action = "unchanged"
        if not process_group_id:
            process_group_id = import_process_group(
                opener,
                base_url,
                proxied_identity,
                client_id,
                target_name,
                snapshot,
            )
            action = "created"

        component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
            opener,
            base_url,
            proxied_identity,
            process_group_id,
        )

        if component.get("name") != target_name:
            raise NiFiAPIError(
                f"target process group {process_group_id!r} has name {component.get('name')!r}; expected {target_name!r}"
            )

        actual_flow_name = version_control.get("flowName") or version_control.get("name") or ""
        actual_flow_id = version_control.get("flowId") or version_control.get("identifier") or ""
        actual_version = version_control.get("version")
        actual_version = "" if actual_version is None else str(actual_version)
        resolved_version = str(import_status["resolvedVersion"])
        skip_version_drift_reconcile = False
        rollout_strategy = import_rollout_strategy(import_entry)
        rollout_timeout_seconds = import_rollout_timeout_seconds(import_entry)
        import_status["rolloutStrategy"] = rollout_strategy
        if rollout_strategy == "DrainAndReplace":
            import_status["rolloutTimeoutSeconds"] = rollout_timeout_seconds
        import_status["drainedBeforeVersionUpdate"] = bool((previous_entry or {}).get("drainedBeforeVersionUpdate", False))
        import_status["resumedAfterVersionUpdate"] = bool((previous_entry or {}).get("resumedAfterVersionUpdate", False))

        needs_version_update = not version_control
        if version_control and actual_flow_name and actual_flow_name != flow_name:
            raise NiFiAPIError(
                f"root child process group {target_name!r} is attached to flow {actual_flow_name!r}, not declared flow {flow_name!r}"
            )
        if version_control and actual_flow_id and actual_flow_id != flow_id:
            raise NiFiAPIError(
                f"root child process group {target_name!r} is attached to flow id {actual_flow_id!r}, not declared flow id {flow_id!r}"
            )
        if version_control and actual_version != resolved_version:
            if should_skip_version_drift_reconcile(import_entry, previous_entry, ownership_metadata, import_status):
                skip_version_drift_reconcile = True
            else:
                needs_version_update = True

        desired_comments = managed_comments(
            config,
            component.get("comments", "") or "",
            import_entry,
            resolved_version,
            import_status["observedHash"],
        )
        if (component.get("comments", "") or "") != desired_comments:
            update_process_group_comments(
                opener,
                base_url,
                proxied_identity,
                config,
                process_group_id,
                revision.get("version", 0),
                component.get("name", target_name),
                desired_comments,
            )
            action = "updated" if action == "unchanged" else action
            component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                opener,
                base_url,
                proxied_identity,
                process_group_id,
            )

        _, _, process_group_status_snapshot = get_process_group_status(opener, base_url, proxied_identity, process_group_id)
        should_resume_after_version_update = False

        try:
            if needs_version_update:
                current_running_count = process_group_running_count(component_payload, component, process_group_flow, flow_payload)
                current_active_threads = process_group_active_thread_count(process_group_status_snapshot)
                if rollout_strategy == "DrainAndReplace":
                    should_resume_after_version_update = current_running_count > 0
                    if current_running_count > 0 or current_active_threads > 0:
                        schedule_process_group_components(opener, base_url, proxied_identity, process_group_id, "STOPPED")
                        component_payload, component, revision, process_group_flow, flow_payload, version_control, process_group_status_snapshot = wait_for_process_group_quiescent(
                            opener,
                            base_url,
                            proxied_identity,
                            process_group_id,
                            rollout_timeout_seconds,
                        )
                        import_status["drainedBeforeVersionUpdate"] = True

                update_imported_process_group_version(
                    opener,
                    base_url,
                    proxied_identity,
                    client_id,
                    process_group_id,
                    revision.get("version", 0),
                    registry_id,
                    snapshot,
                )
                action = "updated" if action == "unchanged" else action
                component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                    opener,
                    base_url,
                    proxied_identity,
                    process_group_id,
                )

            if not version_control:
                raise NiFiAPIError(
                    f"root child process group {target_name!r} does not expose version-control information after bounded import reconcile"
                )

            actual_flow_name = version_control.get("flowName") or version_control.get("name") or ""
            actual_flow_id = version_control.get("flowId") or version_control.get("identifier") or ""
            actual_version = version_control.get("version")
            actual_version = "" if actual_version is None else str(actual_version)
            import_status["actualVersion"] = actual_version
            import_status["versionControlState"] = version_control.get("state", "")

            if actual_flow_name and actual_flow_name != flow_name:
                raise NiFiAPIError(
                    f"root child process group {target_name!r} is attached to flow {actual_flow_name!r}, not declared flow {flow_name!r}"
                )
            if actual_flow_id and actual_flow_id != flow_id:
                raise NiFiAPIError(
                    f"root child process group {target_name!r} is attached to flow id {actual_flow_id!r}, not declared flow id {flow_id!r}"
                )
            if actual_version and actual_version != resolved_version and not skip_version_drift_reconcile:
                raise NiFiAPIError(
                    f"root child process group {target_name!r} is on version {actual_version!r}, not resolved version {resolved_version!r}"
                )
            if skip_version_drift_reconcile:
                import_status["syncPolicyMode"] = "Once"
                import_status["versionDriftReconcileSkipped"] = True

            actual_parameter_context_id = component.get("parameterContext", {}).get("id", "")
            if parameter_context_id:
                if actual_parameter_context_id != parameter_context_id:
                    bind_parameter_context(
                        opener,
                        base_url,
                        proxied_identity,
                        config,
                        process_group_id,
                        revision.get("version", 0),
                        parameter_context_id,
                    )
                    action = "updated" if action == "unchanged" else action
                    component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                        opener,
                        base_url,
                        proxied_identity,
                        process_group_id,
                    )
                    actual_parameter_context_id = component.get("parameterContext", {}).get("id", "")
                if actual_parameter_context_id != parameter_context_id:
                    raise NiFiAPIError(
                        f"root child process group {target_name!r} did not retain declared Parameter Context {parameter_context_id!r}"
                    )
            elif actual_parameter_context_id:
                clear_parameter_context(
                    opener,
                    base_url,
                    proxied_identity,
                    config,
                    process_group_id,
                    revision.get("version", 0),
                )
                action = "updated" if action == "unchanged" else action
                component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                    opener,
                    base_url,
                    proxied_identity,
                    process_group_id,
                )
                actual_parameter_context_id = component.get("parameterContext", {}).get("id", "")
                if actual_parameter_context_id:
                    raise NiFiAPIError(
                        f"root child process group {target_name!r} retained Parameter Context {actual_parameter_context_id!r} after the declared direct attachment was removed"
                    )

            desired_comments = managed_comments(
                config,
                component.get("comments", "") or "",
                import_entry,
                resolved_version,
                import_status["observedHash"],
            )
            if (component.get("comments", "") or "") != desired_comments:
                update_process_group_comments(
                    opener,
                    base_url,
                    proxied_identity,
                    config,
                    process_group_id,
                    revision.get("version", 0),
                    component.get("name", target_name),
                    desired_comments,
                )
                action = "updated" if action == "unchanged" else action
                component_payload, component, revision, process_group_flow, flow_payload, version_control = refresh_process_group_state(
                    opener,
                    base_url,
                    proxied_identity,
                    process_group_id,
                )

            if should_resume_after_version_update:
                schedule_process_group_components(opener, base_url, proxied_identity, process_group_id, "RUNNING")
                component_payload, component, revision, process_group_flow, flow_payload, version_control, process_group_status_snapshot = wait_for_process_group_resumed(
                    opener,
                    base_url,
                    proxied_identity,
                    process_group_id,
                    rollout_timeout_seconds,
                )
                import_status["resumedAfterVersionUpdate"] = True
                should_resume_after_version_update = False
        except Exception as exc:
            if should_resume_after_version_update:
                try:
                    schedule_process_group_components(opener, base_url, proxied_identity, process_group_id, "RUNNING")
                    wait_for_process_group_resumed(
                        opener,
                        base_url,
                        proxied_identity,
                        process_group_id,
                        rollout_timeout_seconds,
                    )
                except Exception as resume_exc:
                    raise NiFiAPIError(
                        f"{exc}; additionally failed to resume previously running descendants for process group {target_name!r}: {resume_exc}"
                    ) from exc
            raise

        import_status["processGroupId"] = process_group_id
        import_status["action"] = action
        import_status["status"] = "ok"
        return import_status


    def observe_retained_owned_imports(config, opener, base_url, proxied_identity, status):
        desired_names = {entry["name"] for entry in config.get("imports", [])}
        for entry in root_child_process_groups(opener, base_url, proxied_identity):
            metadata = ownership_metadata_from_comments(config, entry.get("comments", ""))
            if not metadata:
                continue
            import_name = metadata.get("importName", "")
            if not import_name or import_name in desired_names:
                continue
            status["retainedOwnedImports"].append(
                {
                    "name": import_name,
                    "targetRootProcessGroupName": entry.get("name", ""),
                    "processGroupId": entry.get("id", ""),
                    "action": "retained",
                    "status": "ok",
                    "reason": "removed imports are retained in NiFi and no longer reconciled in this slice",
                }
            )


    def reconcile_once(config):
        status = base_status(config)
        base_url = f"https://{os.environ['NIFI_POD_FQDN']}:8443/nifi-api"
        proxied_identity = resolve_proxied_identity(config)
        opener = build_http_client(config)
        wait_for_cluster_summary(opener, base_url, proxied_identity)

        previous_status = load_previous_status(config)
        previous_by_name = {
            entry.get("name"): entry
            for entry in previous_status.get("imports", [])
            if entry.get("name")
        }

        blocked = False
        for import_entry in config.get("imports", []):
            if import_entry.get("suspend") is True:
                status["imports"].append(
                    {
                        "name": import_entry["name"],
                        "selectedVersion": str(import_entry["source"]["version"]),
                        "targetRootProcessGroupName": import_entry["target"]["rootProcessGroupName"],
                        "status": "suspended",
                        "action": "suspended",
                        "reason": "reconciliation is suspended by NiFiDataflow spec.suspend=true",
                    }
                )
                continue
            try:
                import_status = ensure_import(
                    config,
                    previous_by_name.get(import_entry["name"], {}),
                    opener,
                    base_url,
                    proxied_identity,
                    import_entry,
                )
            except Exception as exc:
                import_status = {
                    "name": import_entry["name"],
                    "selectedVersion": str(import_entry["source"]["version"]),
                    "targetRootProcessGroupName": import_entry["target"]["rootProcessGroupName"],
                    "status": "blocked",
                    "reason": str(exc),
                }
                blocked = True
            status["imports"].append(import_status)

        observe_retained_owned_imports(config, opener, base_url, proxied_identity, status)
        status["status"] = "blocked" if blocked else "ok"
        return status


    def main():
        once = "--once" in sys.argv[1:]

        while True:
            with open(LOCK_PATH, "w", encoding="utf-8") as lock_handle:
                fcntl.flock(lock_handle.fileno(), fcntl.LOCK_EX)
                try:
                    config = load_config()
                    status = base_status(config)
                    if not should_manage(config, status):
                        status["status"] = "skipped"
                        status["reason"] = f"only pod ordinal {config['management']['reconcilePodOrdinal']} reconciles declared versioned flow imports"
                        write_status(config, status)
                        print(status["reason"])
                        if once:
                            return 0
                        time.sleep(int(config["management"].get("pollIntervalSeconds", 10)))
                        continue
                    status = reconcile_once(config)
                except Exception as exc:
                    config = load_config()
                    status = base_status(config)
                    status["status"] = "failed"
                    status["reason"] = str(exc)
                write_status(config, status)
                if once:
                    print(json.dumps(status, indent=2, sort_keys=True))
                    return 0
            time.sleep(int(config["management"].get("pollIntervalSeconds", 10)))


    if __name__ == "__main__":
        sys.exit(main())
  README.txt: |
    This ConfigMap defines a bounded runtime-managed versioned-flow import feature.
    Product-owned scope:
    - create declared root-child imported process groups in NiFi
    - reconcile declared version selection live on pod `-0`
    - attach one declared direct Parameter Context reference to each owned import
    - retain, but do not delete, removed imports from NiFi
    - create and reconcile only the declared `provider=nifiRegistry` Flow Registry Clients needed by this bounded path
    - reuse already-live operator-owned Flow Registry Clients for the other supported prepared providers
    Product does not:
    - adopt same-name operator-owned root-child process groups automatically
    - perform arbitrary process-group mutation beyond bounded version selection and one direct Parameter Context attachment
    - perform ongoing automatic synchronization to newer registry versions
    Enterprise auth modes use the explicit bootstrap admin identity as the
    bounded trusted-proxy management identity for this feature.
{{- end }}
