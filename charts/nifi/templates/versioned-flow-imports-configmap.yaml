        return comments


    def import_observed_hash(import_entry):
        payload = {
            "name": import_entry["name"],
            "registryClientName": import_entry["registryClientRef"]["name"],
            "bucket": import_entry["source"]["bucket"],
            "flowName": import_entry["source"]["flowName"],
            "version": import_entry["source"]["version"],
            "targetRootProcessGroupName": import_entry["target"]["rootProcessGroupName"],
            "syncPolicyMode": import_sync_mode(import_entry),
            "rolloutStrategy": import_rollout_strategy(import_entry),
            "rolloutTimeout": import_rollout_timeout(import_entry),
            "parameterContextRefs": [
                ref.get("name", "")
                for ref in import_entry.get("parameterContextRefs", [])
                if isinstance(ref, dict) and ref.get("name")
            ],
        }
        return hashlib.sha256(json.dumps(payload, sort_keys=True).encode("utf-8")).hexdigest()


    def import_sync_mode(import_entry):
        sync_policy = import_entry.get("syncPolicy", {})
        if not isinstance(sync_policy, dict):
            return "OnChange"
        mode = str(sync_policy.get("mode", "")).strip()
        return mode or "OnChange"


    def import_rollout_strategy(import_entry):
        rollout = import_entry.get("rollout", {})
        if not isinstance(rollout, dict):
            return "Replace"
        strategy = str(rollout.get("strategy", "")).strip()
        return strategy or "Replace"


    def import_rollout_timeout(import_entry):
        rollout = import_entry.get("rollout", {})
        if not isinstance(rollout, dict):
            return ""
        return str(rollout.get("timeout", "")).strip()


    def parse_duration_seconds(raw_value):
        raw_value = str(raw_value or "").strip()
        if not raw_value:
            return 0
        total_seconds = 0.0
        position = 0
        for match in re.finditer(r"([0-9]+(?:\.[0-9]+)?)(ms|s|m|h)", raw_value):
            if match.start() != position:
                raise NiFiAPIError(f"unsupported rollout timeout duration {raw_value!r}")
            value = float(match.group(1))
            unit = match.group(2)
            if unit == "h":
                total_seconds += value * 3600.0
            elif unit == "m":
                total_seconds += value * 60.0
            elif unit == "s":
                total_seconds += value
            elif unit == "ms":
                total_seconds += value / 1000.0
            position = match.end()
        if position != len(raw_value):
            raise NiFiAPIError(f"unsupported rollout timeout duration {raw_value!r}")
        return max(1, int(total_seconds))


    def import_rollout_timeout_seconds(import_entry):
        timeout = import_rollout_timeout(import_entry)
        if not timeout:
            return 20 * 60
        return parse_duration_seconds(timeout)


    def should_skip_version_drift_reconcile(import_entry, previous_entry, ownership_metadata, import_status):
        if import_sync_mode(import_entry) != "Once":
            return False
        observed_hash = import_status["observedHash"]
        if previous_entry.get("status") == "ok" and previous_entry.get("observedHash") == observed_hash:
            return True
        return ownership_metadata.get("observedHash") == observed_hash


