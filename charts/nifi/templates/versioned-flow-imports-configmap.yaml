    def registry_client_properties_equal(actual_component, desired_component):
        actual_properties = actual_component.get("properties") or {}
        desired_properties = desired_component.get("properties") or {}
        actual_url = actual_properties.get("url") or actual_properties.get("URL") or ""
        desired_url = desired_properties.get("url") or desired_properties.get("URL") or ""
        actual_ssl_context_service = (
            actual_properties.get("ssl-context-service")
            or actual_properties.get("SSL Context Service")
            or ""
        )
        desired_ssl_context_service = (
            desired_properties.get("ssl-context-service")
            or desired_properties.get("SSL Context Service")
            or ""
        )
        return (
            (actual_component.get("name") or "") == (desired_component.get("name") or "")
            and (actual_component.get("type") or "") == (desired_component.get("type") or "")
            and (actual_component.get("description") or "") == (desired_component.get("description") or "")
            and actual_url == desired_url
            and actual_ssl_context_service == desired_ssl_context_service
        )


    def ensure_nifi_registry_client(config, opener, base_url, proxied_identity, client_name):
        client = prepared_registry_client(config, client_name)
        if client.get("provider") != "nifiRegistry":
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} is not a supported NiFi Registry client"
            )

        desired_component = desired_nifi_registry_client_component(config, opener, base_url, proxied_identity, client)
        entities_by_name = flow_registry_entities_by_name(opener, base_url, proxied_identity)
        existing = entities_by_name.get(client_name)
        if not existing:
            created = request(
                opener,
                base_url,
                "POST",
                "/controller/registry-clients",
                proxied_identity,
                payload={
                    "revision": {"version": 0},
                    "component": desired_component,
                },
                expect=(200, 201),
            )
            component = created.get("component", {})
            identifier = created.get("id") or component.get("id")
            if not identifier:
                raise NiFiAPIError(
                    f"NiFi created Flow Registry Client {client_name!r} but did not return a usable identifier"
                )
            return identifier, "created", "product-owned"

        component = existing.get("component", {})
        identifier = existing.get("id") or component.get("id")
        if not identifier:
            raise NiFiAPIError(
                f"existing Flow Registry Client {client_name!r} was returned without a usable identifier"
            )

        metadata = managed_registry_client_metadata(config, component.get("description", ""))
        if not metadata:
            return identifier, "reused", "operator-owned"

        details = request(opener, base_url, "GET", f"/controller/registry-clients/{identifier}", proxied_identity)
        detail_component = details.get("component", {}) or details.get("registry", {}) or {}
        revision = details.get("revision", {}) or {}
        if registry_client_properties_equal(detail_component, desired_component):
            return identifier, "unchanged", "product-owned"

        updated = request(
            opener,
            base_url,
            "PUT",
            f"/controller/registry-clients/{identifier}",
            proxied_identity,
            payload={
                "revision": {
                    "clientId": config["management"]["clientId"],
                    "version": int(revision.get("version", 0)),
                },
                "component": dict(desired_component, id=identifier),
            },
            expect=(200, 201),
        )
        updated_component = updated.get("component", {})
        updated_identifier = updated.get("id") or updated_component.get("id") or identifier
        return updated_identifier, "reconciled", "product-owned"


    def resolve_registry_client(opener, base_url, proxied_identity, config, import_entry):
        registry_name = import_entry["registryClientRef"]["name"]
        client = prepared_registry_client(config, registry_name)
        provider = client.get("provider")
        if provider == "nifiRegistry":
            registry_id, action, ownership_state = ensure_nifi_registry_client(
                config,
                opener,
                base_url,
                proxied_identity,
                registry_name,
            )
            return client, registry_id, action, ownership_state

        registry_id = flow_registry_ids_by_name(opener, base_url, proxied_identity).get(registry_name, "")
        if not registry_id:
            raise NiFiAPIError(
                f"selected Flow Registry Client {registry_name!r} does not exist in NiFi; create it first from the prepared catalog or another operator-managed path"
            )
        return client, registry_id, "reused", "operator-owned"


