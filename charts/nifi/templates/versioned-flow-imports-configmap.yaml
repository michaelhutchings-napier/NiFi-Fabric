    def component_run_state(source):
        if not isinstance(source, dict):
            return ""
        for key in ("state", "runStatus", "scheduledState", "physicalState"):
            value = source.get(key)
            if value is None:
                continue
            return str(value).upper()
        return ""


    def running_components_in_flow(flow_source):
        if not isinstance(flow_source, dict):
            return 0

        total = 0
        for collection_name in ("processors", "inputPorts", "outputPorts"):
            for entry in flow_source.get(collection_name) or []:
                if not isinstance(entry, dict):
                    continue
                component = entry.get("component", {}) if isinstance(entry.get("component"), dict) else {}
                aggregate_snapshot = (
                    entry.get("status", {}).get("aggregateSnapshot", {})
                    if isinstance(entry.get("status"), dict)
                    else {}
                )
                if component_run_state(component) == "RUNNING" or component_run_state(aggregate_snapshot) == "RUNNING":
                    total += 1

        for entry in flow_source.get("processGroups") or []:
            if not isinstance(entry, dict):
                continue
            component = entry.get("component", {}) if isinstance(entry.get("component"), dict) else {}
            try:
                running_count = int(component.get("runningCount") or 0)
            except Exception:
                running_count = 0
            if running_count > total:
                total = running_count

        return total


    def process_group_running_count(component_payload, component, process_group_flow=None, flow_payload=None):
        direct_running_count = 0
        for source in (component_payload, component):
            if not isinstance(source, dict):
                continue
            value = source.get("runningCount")
            if value is None:
                continue
            try:
                direct_running_count = max(direct_running_count, int(value))
            except Exception:
                continue

        descendant_running_count = 0
        for source in (flow_payload, process_group_flow, process_group_flow.get("flow", {}) if isinstance(process_group_flow, dict) else {}):
            descendant_running_count = max(descendant_running_count, running_components_in_flow(source))
        return max(direct_running_count, descendant_running_count)


    def process_group_active_thread_count(status_snapshot):
