{{- if .Values.versionedFlowImports.enabled }}
{{- $statusFile := "/opt/nifi/nifi-current/logs/versioned-flow-imports-bootstrap-status.json" -}}
{{- $descriptionMarker := "Managed by NiFi-Fabric versionedFlowImports" -}}
{{- $authMode := include "nifi.authMode" . -}}
{{- $proxiedIdentity := include "nifi.effectiveAuthzBootstrapInitialAdminIdentity" . -}}
{{- if eq $authMode "singleUser" -}}
{{- $proxiedIdentity = "__SINGLE_USER_IDENTITY__" -}}
{{- end -}}
{{- $ownership := dict
  "createsImportedProcessGroupsInNiFi" true
  "reconcilesDeclaredImportsInNiFi" true
  "deletesRemovedImportedProcessGroupsInNiFi" false
  "createsFlowRegistryClientsInNiFi" false
  "attachesDirectParameterContexts" true
  "commentsMarker" $descriptionMarker
  "manualNiFiDrift" "bounded-live-reconcile-or-blocked"
  "undeclaredProcessGroups" "operator-owned"
-}}
{{- $catalog := dict
  "catalogMode" "runtime-managed"
  "ownership" $ownership
  "runtimeContract" (dict
    "authMode" $authMode
    "proxiedIdentity" $proxiedIdentity
    "requiresLiveRegistryClient" true
    "requiresPreparedGithubClientForSnapshotFallback" false
    "reconcilePodOrdinal" 0
    "statusFile" $statusFile
    "pollIntervalSeconds" 10
    "parameterContextRefs" "0-or-1 direct attachment"
    "versionSync" "declared-version-only-no-ongoing-sync"
    "latestVersionPolicy" "resolve-on-create-or-declared-change-then-pin"
    "ownershipMarker" "root-child-process-group-comments"
    "snapshotSource" "nifi-flow-registry-api"
  )
  "imports" (list)
-}}
{{- $runtimeConfig := dict
  "management" (dict
    "authMode" $authMode
    "caCertPath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.caCertKey)
    "keystorePath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.keystoreKey)
    "keystorePasswordEnv" "KEYSTORE_PASSWORD"
    "statusFile" $statusFile
    "pollIntervalSeconds" 10
    "reconcilePodOrdinal" 0
    "proxiedIdentity" $proxiedIdentity
    "clientId" "fabric-versioned-flow-import-reconciler"
    "externalImportsPath" (ternary (printf "%s/imports.json" .Values.versionedFlowImports.controllerBridge.mountPath) "" .Values.versionedFlowImports.controllerBridge.enabled)
    "statusConfigMapName" (ternary (include "nifi.nifidataflowBridgeStatusConfigName" .) "" .Values.versionedFlowImports.controllerBridge.enabled)
  )
  "ownership" $ownership
  "preparedRegistryClients" (list)
  "imports" (list)
-}}
{{- $preparedClientProviders := dict -}}
{{- range $clientIndex, $client := default (list) .Values.flowRegistryClients.clients }}
{{- $clientEntry := dict
  "name" $client.name
  "provider" $client.provider
-}}
{{- $_ := set $preparedClientProviders $client.name $client.provider -}}
{{- if eq $client.provider "github" }}
{{- $authType := default "personalAccessToken" $client.github.auth.type -}}
{{- $github := dict
  "apiUrl" (default "https://api.github.com" $client.github.apiUrl)
  "owner" $client.repository.owner
  "repository" $client.repository.name
  "path" (default "" $client.repository.path)
  "branch" (default "main" $client.repository.branch)
  "authType" $authType
-}}
{{- if or (not $client.github.auth.type) (eq $client.github.auth.type "personalAccessToken") }}
{{- $_ := set $github "tokenEnvVar" (printf "FLOW_REGISTRY_CLIENT_GITHUB_PAT_%d" $clientIndex) -}}
{{- end -}}
{{- $_ := set $clientEntry "github" $github -}}
{{- end -}}
{{- if eq $client.provider "nifiRegistry" }}
{{- $_ := set $clientEntry "nifiRegistry" (dict
  "url" $client.nifiRegistry.url
  "sslContextServiceName" (default "" $client.sslContextServiceName)
  "description" (default "" $client.description)
) -}}
{{- end -}}
{{- $_ := set $runtimeConfig "preparedRegistryClients" (append (get $runtimeConfig "preparedRegistryClients") $clientEntry) -}}
{{- end }}
{{- range $import := .Values.versionedFlowImports.imports }}
{{- $parameterContextRefs := list -}}
{{- range $ref := default (list) $import.parameterContextRefs }}
{{- $parameterContextRefs = append $parameterContextRefs (dict "name" $ref.name) -}}
{{- end }}
{{- $entry := dict
  "name" $import.name
  "bootstrapMode" "runtime-managed"
  "driftPolicy" (dict
    "createdByProduct" true
    "reconciledByProduct" true
    "deletedWhenRemovedFromValues" false
    "manualNiFiDrift" "bounded-live-reconcile-or-blocked"
  )
  "registryClientRef" (dict "name" $import.registryClientName)
  "source" (dict
    "bucket" $import.bucket
    "flowName" $import.flowName
    "version" (printf "%v" $import.version)
  )
  "target" (dict
    "rootProcessGroupName" $import.target.rootProcessGroupName
  )
  "parameterContextRefs" $parameterContextRefs
-}}
{{- if hasKey $import "description" -}}
{{- $_ := set $entry "description" $import.description -}}
{{- end -}}
{{- $provider := get $preparedClientProviders $import.registryClientName | default "" -}}
{{- if eq $provider "github" -}}
{{- $_ := set (get $catalog "runtimeContract") "requiresPreparedGithubClientForSnapshotFallback" true -}}
{{- if get $ownership "createsFlowRegistryClientsInNiFi" -}}
{{- $_ := set (get $catalog "runtimeContract") "snapshotSource" "nifi-flow-registry-api-with-bounded-runtime-managed-nifi-registry-client-and-prepared-github-fallback" -}}
{{- else -}}
{{- $_ := set (get $catalog "runtimeContract") "snapshotSource" "nifi-flow-registry-api-with-prepared-github-fallback" -}}
{{- end -}}
{{- else if eq $provider "nifiRegistry" -}}
{{- $_ := set $ownership "createsFlowRegistryClientsInNiFi" true -}}
{{- $_ := set (get $catalog "runtimeContract") "requiresLiveRegistryClient" false -}}
{{- if get (get $catalog "runtimeContract") "requiresPreparedGithubClientForSnapshotFallback" -}}
{{- $_ := set (get $catalog "runtimeContract") "snapshotSource" "nifi-flow-registry-api-with-bounded-runtime-managed-nifi-registry-client-and-prepared-github-fallback" -}}
{{- else -}}
{{- $_ := set (get $catalog "runtimeContract") "snapshotSource" "nifi-flow-registry-api-with-bounded-runtime-managed-nifi-registry-client" -}}
{{- end -}}
{{- end -}}
{{- $_ := set $catalog "imports" (append (get $catalog "imports") $entry) -}}
{{- $_ := set $runtimeConfig "imports" (append (get $runtimeConfig "imports") $entry) -}}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nifi.versionedFlowImportsConfigName" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
    app.kubernetes.io/component: versioned-flow-imports
data:
  config.json: |
{{ $runtimeConfig | toPrettyJson | indent 4 }}
  imports.yaml: |
{{ $catalog | toYaml | indent 4 }}
  imports.json: |
{{ $catalog | toPrettyJson | indent 4 }}
  bootstrap.py: |
    import base64
    import fcntl
    import hashlib
    import json
    import os
    import re
    import ssl
    import subprocess
    import sys
    import tempfile
    import time
    import urllib.error
    import urllib.parse
    import urllib.request

    CONFIG_PATH = "/opt/nifi/fabric/versioned-flow-imports/config.json"
    LOCK_PATH = "/opt/nifi/nifi-current/logs/versioned-flow-imports-bootstrap.lock"


    class NiFiAPIError(RuntimeError):
        pass


    def load_external_imports(config):
        path = config.get("management", {}).get("externalImportsPath", "")
        if not path or not os.path.exists(path):
            return []
        with open(path, "r", encoding="utf-8") as handle:
            payload = json.load(handle)
        if isinstance(payload, dict):
            payload = payload.get("imports", [])
        if not isinstance(payload, list):
            raise NiFiAPIError("external NiFiDataflow bridge imports payload must be a list or an object with an imports list")
        imports = []
        for entry in payload:
            if not isinstance(entry, dict):
                raise NiFiAPIError("external NiFiDataflow bridge imports payload must contain only object entries")
            imports.append(entry)
        return imports


    def validate_merged_imports(imports):
        import_names = set()
        target_names = set()
        for entry in imports:
            name = str(entry.get("name", "")).strip()
            if not name:
                raise NiFiAPIError("merged versioned flow imports require every import to have a non-empty name")
            if name in import_names:
                raise NiFiAPIError(f"merged versioned flow imports contain duplicate import name {name!r}")
            import_names.add(name)

            target = entry.get("target", {})
            target_name = str(target.get("rootProcessGroupName", "")).strip()
            if not target_name:
                raise NiFiAPIError(f"merged versioned flow imports require import {name!r} to declare target.rootProcessGroupName")
            if target_name in target_names:
                raise NiFiAPIError(
                    f"merged versioned flow imports contain duplicate target root process group name {target_name!r}"
                )
            target_names.add(target_name)


    def load_config():
        with open(CONFIG_PATH, "r", encoding="utf-8") as handle:
            config = json.load(handle)
        imports = list(config.get("imports", []))
        imports.extend(load_external_imports(config))
        validate_merged_imports(imports)
        config["imports"] = imports
        return config


    def load_previous_status(config):
        path = config["management"]["statusFile"]
        if not os.path.exists(path):
            return {}
        try:
            with open(path, "r", encoding="utf-8") as handle:
                return json.load(handle)
        except Exception:
            return {}


    def write_status(config, payload):
        path = config["management"]["statusFile"]
        directory = os.path.dirname(path)
        if directory:
            os.makedirs(directory, exist_ok=True)
        payload["timestamp"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
        with open(path, "w", encoding="utf-8") as handle:
            json.dump(payload, handle, indent=2, sort_keys=True)
            handle.write("\n")
        publish_status_configmap(config, payload)


    def base_status(config):
        return {
            "podName": os.environ.get("POD_NAME", ""),
            "podNamespace": os.environ.get("POD_NAMESPACE", ""),
            "authMode": config["management"].get("authMode", ""),
            "status": "running",
            "imports": [],
            "retainedOwnedImports": [],
        }


    def kubernetes_api_base_url():
        host = os.environ.get("KUBERNETES_SERVICE_HOST", "")
        port = os.environ.get("KUBERNETES_SERVICE_PORT_HTTPS") or os.environ.get("KUBERNETES_SERVICE_PORT", "443")
        if not host:
            raise NiFiAPIError("KUBERNETES_SERVICE_HOST is not available for runtime status publication")
        return f"https://{host}:{port}"


    def kubernetes_request(method, path, payload=None, expect=(200,)):
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        if not os.path.exists(token_path):
            raise NiFiAPIError("service account token path is not available for runtime status publication")
        with open(token_path, "r", encoding="utf-8") as handle:
            token = handle.read().strip()
        if not token:
            raise NiFiAPIError("service account token is empty for runtime status publication")

        headers = {
            "Authorization": "Bearer " + token,
        }
        body = None
        if payload is not None:
            body = json.dumps(payload).encode("utf-8")
            headers["Content-Type"] = "application/merge-patch+json" if method == "PATCH" else "application/json"

        req = urllib.request.Request(kubernetes_api_base_url() + path, data=body, headers=headers, method=method)
        context = ssl.create_default_context(cafile=ca_path)
        try:
            with urllib.request.urlopen(req, timeout=10, context=context) as response:
                data = response.read()
                if response.status not in expect:
                    raise NiFiAPIError(
                        f"{method} {path} returned unexpected status {response.status}: {data[:4096].decode('utf-8', 'ignore')}"
                    )
                if not data:
                    return None
                return json.loads(data.decode("utf-8"))
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"{method} {path} failed with status {exc.code}: {body_text[:4096]}") from exc
        except urllib.error.URLError as exc:
            raise NiFiAPIError(f"{method} {path} failed: {exc}") from exc


    def publish_status_configmap(config, payload):
        configmap_name = config["management"].get("statusConfigMapName", "")
        namespace = os.environ.get("POD_NAMESPACE", "")
        if not configmap_name or not namespace:
            return
        if payload.get("status") == "skipped":
            return

        status_json = json.dumps(payload, indent=2, sort_keys=True) + "\n"
        path = f"/api/v1/namespaces/{urllib.parse.quote(namespace, safe='')}/configmaps/{urllib.parse.quote(configmap_name, safe='')}"
        patch_payload = {
            "data": {
                "status.json": status_json,
            }
        }
        try:
            kubernetes_request("PATCH", path, patch_payload, expect=(200,))
            return
        except Exception:
            create_payload = {
                "apiVersion": "v1",
                "kind": "ConfigMap",
                "metadata": {
                    "name": configmap_name,
                    "namespace": namespace,
                    "labels": {
                        "app.kubernetes.io/component": "nifidataflow-bridge-status",
                    },
                },
                "data": {
                    "status.json": status_json,
                },
            }
            kubernetes_request("POST", f"/api/v1/namespaces/{urllib.parse.quote(namespace, safe='')}/configmaps", create_payload, expect=(201,))


    def should_manage(config, status):
        pod_name = status["podName"]
        suffix = f"-{config['management']['reconcilePodOrdinal']}"
        return not pod_name or pod_name.endswith(suffix)


    def resolve_proxied_identity(config):
        identity = config["management"].get("proxiedIdentity", "")
        if identity == "__SINGLE_USER_IDENTITY__":
            identity = os.environ.get("SINGLE_USER_CREDENTIALS_USERNAME", "")
        identity = identity.strip()
        if not identity:
            raise NiFiAPIError("bounded versioned flow import reconciliation requires a proxied management identity")
        return identity


    def ensure_client_certificate_files(config):
        keystore_path = config["management"]["keystorePath"]
        password_env = config["management"].get("keystorePasswordEnv", "KEYSTORE_PASSWORD")
        keystore_password = os.environ.get(password_env, "")
        if not keystore_password:
            raise NiFiAPIError(f"missing workload keystore password in environment variable {password_env!r}")
        if not os.path.exists(keystore_path):
            raise NiFiAPIError(f"workload keystore path {keystore_path!r} does not exist")

        workdir = tempfile.mkdtemp(prefix="nifi-fabric-versioned-flow-imports-")
        cert_path = os.path.join(workdir, "client.crt.pem")
        key_path = os.path.join(workdir, "client.key.pem")

        subprocess.run(
            [
                "openssl",
                "pkcs12",
                "-in",
                keystore_path,
                "-clcerts",
                "-nokeys",
                "-passin",
                f"pass:{keystore_password}",
                "-out",
                cert_path,
            ],
            check=True,
            capture_output=True,
            text=True,
        )
        subprocess.run(
            [
                "openssl",
                "pkcs12",
                "-in",
                keystore_path,
                "-nocerts",
                "-nodes",
                "-passin",
                f"pass:{keystore_password}",
                "-out",
                key_path,
            ],
            check=True,
            capture_output=True,
            text=True,
        )
        return cert_path, key_path


    def build_http_client(config):
        ca_cert_path = config["management"]["caCertPath"]
        cert_path, key_path = ensure_client_certificate_files(config)
        context = ssl.create_default_context(cafile=ca_cert_path)
        context.load_cert_chain(certfile=cert_path, keyfile=key_path)
        return urllib.request.build_opener(urllib.request.HTTPSHandler(context=context))


    def request(opener, base_url, method, path, proxied_identity, payload=None, expect=(200,)):
        body = None
        headers = {
            "X-ProxiedEntitiesChain": f"<{proxied_identity}>",
        }
        if payload is not None:
            body = json.dumps(payload).encode("utf-8")
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(base_url + path, data=body, headers=headers, method=method)
        try:
            with opener.open(req, timeout=20) as response:
                data = response.read()
                if response.status not in expect:
                    raise NiFiAPIError(
                        f"{method} {path} returned unexpected status {response.status}: {data[:4096].decode('utf-8', 'ignore')}"
                    )
                if not data:
                    return None
                content_type = response.headers.get("Content-Type", "")
                if "application/json" in content_type:
                    return json.loads(data.decode("utf-8"))
                return data.decode("utf-8")
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"{method} {path} failed with status {exc.code}: {body_text[:4096]}") from exc


    def wait_for_cluster_summary(opener, base_url, proxied_identity):
        last_error = None
        for _ in range(90):
            try:
                payload = request(opener, base_url, "GET", "/flow/cluster/summary", proxied_identity)
                summary = payload.get("clusterSummary", {})
                if (
                    summary.get("clustered") is True
                    and summary.get("connectedToCluster") is True
                    and int(summary.get("connectedNodeCount", 0)) >= 1
                    and int(summary.get("totalNodeCount", 0)) >= 1
                    and int(summary.get("connectedNodeCount", 0)) == int(summary.get("totalNodeCount", 0))
                ):
                    return summary
                last_error = NiFiAPIError(f"cluster summary not yet stable: {summary}")
            except Exception as exc:
                last_error = exc
            time.sleep(2)
        raise last_error or NiFiAPIError("timed out waiting for stable cluster summary")


    def prepared_registry_clients_by_name(config):
        mapping = {}
        for entry in config.get("preparedRegistryClients", []):
            if not isinstance(entry, dict):
                continue
            name = entry.get("name")
            if name:
                mapping[name] = entry
        return mapping


    def prepared_registry_client(config, client_name):
        client = prepared_registry_clients_by_name(config).get(client_name)
        if not client:
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} was not found in the chart-rendered config"
            )
        return client


    def github_api_request(url, headers):
        req = urllib.request.Request(url, headers=headers, method="GET")
        try:
            with urllib.request.urlopen(req, timeout=20) as response:
                data = response.read()
                if response.status not in (200, 201):
                    raise NiFiAPIError(
                        f"GET {url} returned unexpected status {response.status}: {data[:4096].decode('utf-8', 'ignore')}"
                    )
                if not data:
                    raise NiFiAPIError(f"GET {url} returned an empty response")
                return json.loads(data.decode("utf-8"))
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"GET {url} failed with status {exc.code}: {body_text[:4096]}") from exc
        except urllib.error.URLError as exc:
            raise NiFiAPIError(f"GET {url} failed: {exc}") from exc


    def github_snapshot_path(client, bucket_name, flow_id):
        segments = []
        base_path = client.get("github", {}).get("path", "")
        if base_path:
            segments.extend(part for part in base_path.split("/") if part)
        segments.extend([bucket_name, f"{flow_id}.json"])
        return "/".join(urllib.parse.quote(segment, safe="") for segment in segments)


    def fetch_github_snapshot(config, client_name, bucket_name, flow_id, resolved_version):
        client = prepared_registry_client(config, client_name)
        if client.get("provider") != "github":
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} is not a supported GitHub client for bounded runtime-managed import"
            )

        github = client.get("github", {})
        api_url = (github.get("apiUrl") or "https://api.github.com").rstrip("/")
        owner = github.get("owner")
        repository = github.get("repository")
        if not owner or not repository:
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} is missing GitHub repository coordinates"
            )

        headers = {
            "Accept": "application/vnd.github+json",
            "User-Agent": "nifi-fabric-versioned-flow-import-reconciler",
        }
        auth_type = github.get("authType") or "personalAccessToken"
        if auth_type == "personalAccessToken":
            token_env_var = github.get("tokenEnvVar")
            token_value = os.environ.get(token_env_var or "", "")
            if not token_env_var or not token_value:
                raise NiFiAPIError(
                    f"selected prepared Flow Registry Client definition {client_name!r} requires token env {token_env_var!r}, but it was not present"
                )
            headers["Authorization"] = "Bearer " + token_value
        elif auth_type != "none":
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} uses unsupported github auth type {auth_type!r}"
            )

        path = github_snapshot_path(client, bucket_name, flow_id)
        query = urllib.parse.urlencode({"ref": resolved_version})
        url = f"{api_url}/repos/{urllib.parse.quote(owner, safe='')}/{urllib.parse.quote(repository, safe='')}/contents/{path}?{query}"
        payload = github_api_request(url, headers)
        content = payload.get("content", "")
        encoding = payload.get("encoding", "")
        if encoding != "base64" or not content:
            raise NiFiAPIError(
                f"GitHub contents response for Flow Registry Client {client_name!r} did not include base64-encoded flow content"
            )
        try:
            decoded = base64.b64decode(content.encode("utf-8"), validate=True).decode("utf-8")
            snapshot = json.loads(decoded)
        except Exception as exc:
            raise NiFiAPIError(
                f"GitHub contents response for Flow Registry Client {client_name!r} did not contain valid JSON flow content"
            ) from exc
        if not isinstance(snapshot, dict):
            raise NiFiAPIError(
                f"GitHub contents response for Flow Registry Client {client_name!r} did not contain a JSON object"
            )
        return snapshot


    def nifi_registry_api_base_url(url):
        base = (url or "").rstrip("/")
        if not base:
            raise NiFiAPIError("selected NiFi Registry client is missing a usable url")
        if base.endswith("/nifi-registry-api"):
            return base
        if base.endswith("/nifi-registry"):
            return base[: -len("/nifi-registry")] + "/nifi-registry-api"
        return base + "/nifi-registry-api"


    def fetch_nifi_registry_snapshot(config, client_name, bucket_id, flow_id, resolved_version):
        client = prepared_registry_client(config, client_name)
        if client.get("provider") != "nifiRegistry":
            raise NiFiAPIError(
                f"selected prepared Flow Registry Client definition {client_name!r} is not a supported NiFi Registry client for bounded runtime-managed import"
            )

        registry = client.get("nifiRegistry", {})
        api_base_url = nifi_registry_api_base_url(registry.get("url", ""))
        bucket = urllib.parse.quote(str(bucket_id), safe="")
        flow = urllib.parse.quote(str(flow_id), safe="")
        version = urllib.parse.quote(str(resolved_version), safe="")
        url = f"{api_base_url}/buckets/{bucket}/flows/{flow}/versions/{version}"
        req = urllib.request.Request(url, headers={"Accept": "application/json"}, method="GET")
        try:
            with urllib.request.urlopen(req, timeout=20) as response:
                body = response.read()
                if response.status != 200:
                    raise NiFiAPIError(
                        f"GET {url} returned unexpected status {response.status}: {body[:4096].decode('utf-8', 'ignore')}"
                    )
                if not body:
                    raise NiFiAPIError(f"GET {url} returned an empty response")
                try:
                    snapshot = json.loads(body.decode("utf-8"))
                except Exception as exc:
                    raise NiFiAPIError(f"GET {url} did not return valid JSON snapshot content") from exc
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"GET {url} failed with status {exc.code}: {body_text[:4096]}") from exc
        except urllib.error.URLError as exc:
            raise NiFiAPIError(f"GET {url} failed: {exc}") from exc
        if not isinstance(snapshot, dict):
            raise NiFiAPIError(f"GET {url} did not return a JSON object snapshot")
        return snapshot


    def enrich_snapshot_metadata(snapshot, registry_name, registry_id, bucket_name, flow_name, flow_id, version_entry, selected_version):
        enriched = json.loads(json.dumps(snapshot))
        metadata = enriched.get("snapshotMetadata")
        if not isinstance(metadata, dict):
            metadata = enriched.get("versionedFlowSnapshotMetadata")
        if not isinstance(metadata, dict):
            metadata = {}

        version_metadata = version_entry.get("metadata", {})
        if isinstance(version_metadata, dict):
            for key in ("author", "comments", "timestamp", "branch"):
                if key in version_metadata and key not in metadata:
                    metadata[key] = version_metadata[key]

        metadata["version"] = str(version_entry["version"])
        metadata["bucketIdentifier"] = metadata.get("bucketIdentifier") or bucket_name
        metadata["flowIdentifier"] = metadata.get("flowIdentifier") or flow_id
        metadata["flowName"] = metadata.get("flowName") or flow_name
        metadata["registryIdentifier"] = metadata.get("registryIdentifier") or registry_id
        metadata["registryName"] = metadata.get("registryName") or registry_name
        if version_metadata.get("timestamp") is not None:
            metadata["timestamp"] = version_metadata["timestamp"]

        enriched["snapshotMetadata"] = metadata
        if isinstance(enriched.get("versionedFlowSnapshotMetadata"), dict):
            enriched["versionedFlowSnapshotMetadata"] = metadata
        bucket = enriched.get("bucket")
        if not isinstance(bucket, dict):
            bucket = {}
        bucket["identifier"] = bucket.get("identifier") or bucket_name
        bucket["name"] = bucket.get("name") or bucket_name
        enriched["bucket"] = bucket

        flow = enriched.get("flow")
        if not isinstance(flow, dict):
            flow = {}
        flow["identifier"] = flow.get("identifier") or flow_id
        flow["name"] = flow.get("name") or flow_name
        enriched["flow"] = flow
        enriched["latest"] = str(selected_version) == "latest"
        return enriched


    def selected_snapshot(config, registry_name, registry_id, bucket_name, bucket_id, flow_name, flow_id, version_entry, selected_version):
        snapshot = version_entry.get("snapshot")
        if snapshot is None:
            client = prepared_registry_client(config, registry_name)
            if client.get("provider") == "github":
                snapshot = fetch_github_snapshot(
                    config,
                    registry_name,
                    bucket_name,
                    flow_id,
                    version_entry["version"],
                )
            elif client.get("provider") == "nifiRegistry":
                snapshot = fetch_nifi_registry_snapshot(
                    config,
                    registry_name,
                    bucket_id,
                    flow_id,
                    version_entry["version"],
                )
            else:
                raise NiFiAPIError(
                    f"selected Flow Registry Client {registry_name!r} did not expose inline snapshot content for version {version_entry['version']!r}; only prepared GitHub and NiFi Registry fallback are supported for non-inline snapshot retrieval in this slice"
                )
        return enrich_snapshot_metadata(
            snapshot,
            registry_name,
            registry_id,
            bucket_name,
            flow_name,
            flow_id,
            version_entry,
            selected_version,
        )


    def ownership_metadata_from_comments(config, comments):
        comments = comments or ""
        prefix = config["ownership"]["commentsMarker"] + ": "
        start = comments.rfind("\n\n" + prefix)
        if start != -1:
            payload = comments[start + len("\n\n" + prefix) :]
        elif comments.startswith(prefix):
            payload = comments[len(prefix) :]
        else:
            return {}
        try:
            metadata = json.loads(payload)
        except Exception:
            return {}
        return metadata if isinstance(metadata, dict) else {}


    def strip_ownership_marker(config, comments):
        comments = comments or ""
        prefix = config["ownership"]["commentsMarker"] + ": "
        start = comments.rfind("\n\n" + prefix)
        if start != -1:
            return comments[:start]
        if comments.startswith(prefix):
