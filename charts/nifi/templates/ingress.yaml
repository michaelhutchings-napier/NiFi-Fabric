{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nifi.fullname" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
  {{- range $host := .Values.ingress.hosts }}
  {{- $hostName := $host -}}
  {{- $paths := list (dict "path" "/" "pathType" "Prefix") -}}
  {{- if kindIs "map" $host }}
  {{- $hostName = default $host.host $host -}}
  {{- if $host.paths }}
  {{- $paths = $host.paths -}}
  {{- end }}
  {{- end }}
  - host: {{ $hostName }}
    http:
      paths:
      {{- range $paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            name: {{ include "nifi.fullname" $ }}
            port:
              number: {{ $.Values.ports.https }}
      {{- end }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
