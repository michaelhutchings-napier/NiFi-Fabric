{{- if .Values.observability.siteToSiteProvenance.enabled }}
{{- $siteToSiteProvenance := default (dict) .Values.observability.siteToSiteProvenance -}}
{{- $auth := default (dict) $siteToSiteProvenance.auth -}}
{{- $secretRef := default (dict) $auth.secretRef -}}
{{- $serviceHost := printf "%s.%s.svc.cluster.local" (include "nifi.fullname" .) .Release.Namespace -}}
{{- $instanceURL := default (printf "https://%s:%v/nifi" $serviceHost .Values.ports.https) $siteToSiteProvenance.source.instanceUrl -}}
{{- $authorizedIdentity := trim (default "" $auth.authorizedIdentity) -}}
{{- $startPosition := default "endOfStream" $siteToSiteProvenance.provenance.startPosition -}}
{{- $sslConfig := dict -}}
{{- $materialContract := dict "mode" $auth.type -}}
{{- if eq $auth.type "workloadTLS" -}}
{{- $sslConfig = dict
  "enabled" true
  "keystorePath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.keystoreKey)
  "keystorePasswordEnv" "KEYSTORE_PASSWORD"
  "truststorePath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.truststoreKey)
  "truststorePasswordEnv" "TRUSTSTORE_PASSWORD"
-}}
{{- $materialContract = dict
  "mode" "workloadTLS"
  "keystorePath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.keystoreKey)
  "truststorePath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.truststoreKey)
  "authorizedIdentitySource" "main workload certificate subject"
-}}
{{- else if eq $auth.type "secretRef" -}}
{{- $sslConfig = dict
  "enabled" true
  "keystorePath" (printf "/opt/nifi/fabric/site-to-site-provenance-ssl/%s" (default "keystore.p12" $secretRef.keystoreKey))
  "keystorePasswordEnv" "SITE_TO_SITE_PROVENANCE_KEYSTORE_PASSWORD"
  "truststorePath" (printf "/opt/nifi/fabric/site-to-site-provenance-ssl/%s" (default "truststore.p12" $secretRef.truststoreKey))
  "truststorePasswordEnv" "SITE_TO_SITE_PROVENANCE_TRUSTSTORE_PASSWORD"
-}}
{{- $materialContract = dict
  "mode" "secretRef"
  "secretName" $secretRef.name
  "keystoreKey" (default "keystore.p12" $secretRef.keystoreKey)
  "keystorePasswordKey" (default "keystorePassword" $secretRef.keystorePasswordKey)
  "truststoreKey" (default "truststore.p12" $secretRef.truststoreKey)
  "truststorePasswordKey" (default "truststorePassword" $secretRef.truststorePasswordKey)
  "mountPath" "/opt/nifi/fabric/site-to-site-provenance-ssl"
  "authorizedIdentitySource" "client certificate subject in the referenced Secret"
-}}
{{- else -}}
{{- $sslConfig = dict "enabled" false -}}
{{- $materialContract = dict
  "mode" "none"
  "authorizedIdentitySource" "none"
-}}
{{- end -}}
{{- $config := dict
  "taskName" "fabric-site-to-site-provenance-export"
  "taskType" "org.apache.nifi.reporting.SiteToSiteProvenanceReportingTask"
  "sslServiceName" "fabric-site-to-site-provenance-ssl"
  "sslServiceType" "org.apache.nifi.ssl.StandardRestrictedSSLContextService"
  "schedule" (dict "strategy" "TIMER_DRIVEN" "period" "1 min")
  "management" (dict "caCertPath" (printf "%s/%s" .Values.tls.mountPath .Values.tls.caCertKey))
  "destination" (dict
    "url" $siteToSiteProvenance.destination.url
    "inputPortName" $siteToSiteProvenance.destination.inputPortName
  )
  "auth" (dict
    "type" $auth.type
    "authorizedIdentity" $authorizedIdentity
    "material" $materialContract
  )
  "source" (dict
    "instanceUrl" $instanceURL
    "platform" "nifi"
  )
  "transport" (dict
    "protocol" (default "HTTP" $siteToSiteProvenance.transport.protocol)
    "communicationsTimeout" $siteToSiteProvenance.transport.communicationsTimeout
    "compressEvents" (ternary "true" "false" $siteToSiteProvenance.transport.compressEvents)
  )
  "provenance" (dict
    "startPosition" $startPosition
  )
  "reporting" (dict
    "batchSize" "1000"
  )
  "receiverRequirements" (dict
    "requiredPolicies" (list
      (dict "resource" "/controller" "action" "R")
      (dict "resource" "/site-to-site" "action" "R")
      (dict "resource" "destination-input-port" "action" "W" "inputPortName" $siteToSiteProvenance.destination.inputPortName)
    )
  )
  "ssl" $sslConfig
-}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nifi.siteToSiteProvenanceConfigName" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
    app.kubernetes.io/component: site-to-site-provenance
data:
  config.json: |
{{ $config | toPrettyJson | indent 4 }}
  bootstrap.py: |
    import json
    import os
    import ssl
    import sys
    import time
    import urllib.error
    import urllib.parse
    import urllib.request

    CONFIG_PATH = "/opt/nifi/fabric/site-to-site-provenance/config.json"


    class NiFiAPIError(RuntimeError):
        pass


    def load_config():
        with open(CONFIG_PATH, "r", encoding="utf-8") as handle:
            return json.load(handle)


    def build_http_client(ca_cert_path):
        context = ssl.create_default_context(cafile=ca_cert_path)
        return urllib.request.build_opener(urllib.request.HTTPSHandler(context=context))


    def request(opener, base_url, method, path, token=None, payload=None, expect=(200,)):
        body = None
        headers = {}
        if payload is not None:
            body = json.dumps(payload).encode("utf-8")
            headers["Content-Type"] = "application/json"
        if token:
            headers["Authorization"] = "Bearer " + token
        req = urllib.request.Request(base_url + path, data=body, headers=headers, method=method)
        try:
            with opener.open(req, timeout=15) as response:
                data = response.read()
                if response.status not in expect:
                    raise NiFiAPIError(f"{method} {path} returned unexpected status {response.status}: {data[:4096].decode('utf-8', 'ignore')}")
                if not data:
                    return None
                content_type = response.headers.get("Content-Type", "")
                if "application/json" in content_type:
                    return json.loads(data.decode("utf-8"))
                return data.decode("utf-8")
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"{method} {path} failed with status {exc.code}: {body_text[:4096]}") from exc


    def request_token(opener, base_url):
        username = os.environ.get("SINGLE_USER_CREDENTIALS_USERNAME", "")
        password = os.environ.get("SINGLE_USER_CREDENTIALS_PASSWORD", "")
        if not username or not password:
            raise NiFiAPIError("single-user credentials are required for site-to-site provenance bootstrap")
        form = urllib.parse.urlencode({"username": username, "password": password}).encode("utf-8")
        req = urllib.request.Request(
            base_url + "/access/token",
            data=form,
            headers={"Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"},
            method="POST",
        )
        try:
            with opener.open(req, timeout=15) as response:
                token = response.read().decode("utf-8").strip()
                if response.status not in (200, 201) or not token:
                    raise NiFiAPIError(f"token request returned {response.status} with empty token")
                return token
        except urllib.error.HTTPError as exc:
            body_text = exc.read().decode("utf-8", "ignore")
            raise NiFiAPIError(f"POST /access/token failed with status {exc.code}: {body_text[:4096]}") from exc


    def wait_for_token(opener, base_url):
        last_error = None
        for _ in range(90):
            try:
                return request_token(opener, base_url)
            except Exception as exc:
                last_error = exc
                time.sleep(2)
        raise last_error or NiFiAPIError("timed out waiting for NiFi API token")


    def wait_for_get(opener, base_url, path, token):
        last_error = None
        for _ in range(60):
            try:
                return request(opener, base_url, "GET", path, token=token)
            except Exception as exc:
                last_error = exc
                time.sleep(2)
        raise last_error or NiFiAPIError(f"timed out waiting for {path}")


    def wait_for_cluster_summary(opener, base_url, token):
        last_error = None
        for _ in range(90):
            try:
                payload = request(opener, base_url, "GET", "/flow/cluster/summary", token=token)
                summary = payload.get("clusterSummary", {})
                if (
                    summary.get("clustered") is True
                    and summary.get("connectedToCluster") is True
                    and int(summary.get("connectedNodeCount", 0)) >= 1
                    and int(summary.get("totalNodeCount", 0)) >= 1
                    and int(summary.get("connectedNodeCount", 0)) == int(summary.get("totalNodeCount", 0))
                ):
                    return summary
                last_error = NiFiAPIError(f"cluster summary not yet stable: {summary}")
            except Exception as exc:
                last_error = exc
            time.sleep(2)
        raise last_error or NiFiAPIError("timed out waiting for stable cluster summary")


    def find_bundle(payload, key, type_name):
        for entry in payload.get(key, []):
            if entry.get("type") == type_name:
                return entry["bundle"]
        raise NiFiAPIError(f"NiFi runtime does not expose {type_name}")


    def stop_component(opener, base_url, token, kind, component_id, state):
        entity = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
        version = entity["revision"]["version"]
        request(
            opener,
            base_url,
            "PUT",
            f"/{kind}/{component_id}/run-status",
            token=token,
            payload={
                "revision": {"version": version},
                "disconnectedNodeAcknowledged": False,
                "state": state,
            },
        )
        for _ in range(30):
            current = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
            component = current.get("component", {})
            if component.get("state") == state:
                return current
            time.sleep(1)
        return request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)


    def delete_component(opener, base_url, token, kind, component_id):
        current = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
        version = current["revision"]["version"]
        request(
            opener,
            base_url,
            "DELETE",
            f"/{kind}/{component_id}?version={version}&disconnectedNodeAcknowledged=false",
            token=token,
            expect=(200, 202),
        )


    def enable_component(opener, base_url, token, kind, component_id, state):
        entity = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
        version = entity["revision"]["version"]
        request(
            opener,
            base_url,
            "PUT",
            f"/{kind}/{component_id}/run-status",
            token=token,
            payload={
                "revision": {"version": version},
                "disconnectedNodeAcknowledged": False,
                "state": state,
            },
        )
        for _ in range(30):
            current = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
            component = current.get("component", {})
            if component.get("state") == state:
                return current
            time.sleep(1)
        return request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)


    def existing_controller_service_id(opener, base_url, token, name):
        payload = request(opener, base_url, "GET", "/flow/controller/controller-services", token=token)
        for service in payload.get("controllerServices", []):
            component = service.get("component", {})
            if component.get("name") == name:
                return service["id"]
        return ""


    def existing_reporting_task_id(opener, base_url, token, name):
        payload = request(opener, base_url, "GET", "/flow/reporting-tasks", token=token)
        for task in payload.get("reportingTasks", []):
            component = task.get("component", {})
            if component.get("name") == name:
                return task["id"]
        return ""


    def ensure_absent(opener, base_url, token, kind, name, running_state, disabled_state, finder):
        component_id = finder(opener, base_url, token, name)
        if not component_id:
            return
        entity = request(opener, base_url, "GET", f"/{kind}/{component_id}", token=token)
        state = entity.get("component", {}).get("state", "")
        if state == running_state:
            stop_component(opener, base_url, token, kind, component_id, disabled_state)
        delete_component(opener, base_url, token, kind, component_id)


    def require_env(name):
        value = os.environ.get(name, "")
        if not value:
            raise NiFiAPIError(f"required environment variable {name} is empty")
        return value


    def normalized(value):
        if value is None:
            return ""
        if isinstance(value, bool):
            return "true" if value else "false"
        return str(value)


    def resolve_start_position(start_position):
        mapping = {
            "beginningOfStream": "beginning-of-stream",
            "endOfStream": "end-of-stream",
        }
        if start_position not in mapping:
            raise NiFiAPIError(f"unsupported provenance.startPosition {start_position!r}")
        return mapping[start_position]


    def expected_ssl_properties(config):
        return {
            "Keystore Filename": config["ssl"]["keystorePath"],
            "Keystore Password": require_env(config["ssl"]["keystorePasswordEnv"]),
            "Keystore Type": "PKCS12",
            "Truststore Filename": config["ssl"]["truststorePath"],
            "Truststore Password": require_env(config["ssl"]["truststorePasswordEnv"]),
            "Truststore Type": "PKCS12",
        }


    def expected_task_properties(config, ssl_service_id):
        properties = {
            "Destination URL": config["destination"]["url"],
            "Input Port Name": config["destination"]["inputPortName"],
            "s2s-transport-protocol": config["transport"]["protocol"],
            "Communications Timeout": config["transport"]["communicationsTimeout"],
            "Compress Events": config["transport"]["compressEvents"],
            "Batch Size": config["reporting"]["batchSize"],
            "start-position": resolve_start_position(config["provenance"]["startPosition"]),
            "Instance URL": config["source"]["instanceUrl"],
            "Platform": config["source"]["platform"],
        }
        if ssl_service_id:
            properties["SSL Context Service"] = ssl_service_id
        return properties


    def properties_match(actual_properties, expected_properties):
        for key, expected in expected_properties.items():
            if normalized(actual_properties.get(key)) != normalized(expected):
                return False
        return True


    def controller_service_matches(entity, config):
        component = entity.get("component", {})
        if component.get("name") != config["sslServiceName"]:
            return False
        if component.get("type") != config["sslServiceType"]:
            return False
        return properties_match(component.get("properties", {}), expected_ssl_properties(config))


    def reporting_task_matches(entity, config, ssl_service_id):
        component = entity.get("component", {})
        if component.get("name") != config["taskName"]:
            return False
        if component.get("type") != config["taskType"]:
            return False
        if component.get("schedulingStrategy") != config["schedule"]["strategy"]:
            return False
        if component.get("schedulingPeriod") != config["schedule"]["period"]:
            return False
        properties = component.get("properties", {})
        if not properties_match(properties, expected_task_properties(config, ssl_service_id)):
            return False
        if not ssl_service_id and normalized(properties.get("SSL Context Service")):
            return False
        return True


    def bootstrap():
        if not os.environ.get("POD_NAME", "").endswith("-0"):
            print("site-to-site provenance bootstrap is pod-0 only; skipping on", os.environ.get("POD_NAME", "unknown"))
            return

        config = load_config()
        base_url = f"https://{require_env('NIFI_POD_FQDN')}:8443/nifi-api"
        opener = build_http_client(config["management"]["caCertPath"])
        token = wait_for_token(opener, base_url)
        wait_for_get(opener, base_url, "/flow/reporting-task-types", token)
        wait_for_cluster_summary(opener, base_url, token)

        existing_task_id = existing_reporting_task_id(opener, base_url, token, config["taskName"])
        existing_ssl_service_id = existing_controller_service_id(opener, base_url, token, config["sslServiceName"])
        ssl_service_id = ""

        if config["ssl"]["enabled"]:
            if existing_ssl_service_id:
                existing_ssl = request(opener, base_url, "GET", f"/controller-services/{existing_ssl_service_id}", token=token)
                if controller_service_matches(existing_ssl, config):
                    if existing_ssl.get("component", {}).get("state") != "ENABLED":
                        existing_ssl = enable_component(opener, base_url, token, "controller-services", existing_ssl_service_id, "ENABLED")
                    ssl_service_id = existing_ssl_service_id
                else:
                    if existing_task_id:
                        ensure_absent(
                            opener,
                            base_url,
                            token,
                            "reporting-tasks",
                            config["taskName"],
                            "RUNNING",
                            "STOPPED",
                            existing_reporting_task_id,
                        )
                        existing_task_id = ""
                    ensure_absent(
                        opener,
                        base_url,
                        token,
                        "controller-services",
                        config["sslServiceName"],
                        "ENABLED",
                        "DISABLED",
                        existing_controller_service_id,
                    )
                    existing_ssl_service_id = ""

            if not ssl_service_id:
                controller_types = request(opener, base_url, "GET", "/flow/controller-service-types", token=token)
                ssl_bundle = find_bundle(controller_types, "controllerServiceTypes", config["sslServiceType"])
                ssl_payload = {
                    "revision": {"version": 0},
                    "disconnectedNodeAcknowledged": False,
                    "component": {
                        "name": config["sslServiceName"],
                        "type": config["sslServiceType"],
                        "bundle": ssl_bundle,
                        "properties": expected_ssl_properties(config),
                    },
                }
                created_ssl = request(opener, base_url, "POST", "/controller/controller-services", token=token, payload=ssl_payload, expect=(200, 201))
                ssl_service_id = created_ssl["id"]
                enable_component(opener, base_url, token, "controller-services", ssl_service_id, "ENABLED")
        else:
            if existing_task_id:
                existing_task = request(opener, base_url, "GET", f"/reporting-tasks/{existing_task_id}", token=token)
                if normalized(existing_task.get("component", {}).get("properties", {}).get("SSL Context Service")):
                    ensure_absent(
                        opener,
                        base_url,
                        token,
                        "reporting-tasks",
                        config["taskName"],
                        "RUNNING",
                        "STOPPED",
                        existing_reporting_task_id,
                    )
                    existing_task_id = ""
            if existing_ssl_service_id:
                ensure_absent(
                    opener,
                    base_url,
                    token,
                    "controller-services",
                    config["sslServiceName"],
                    "ENABLED",
                    "DISABLED",
                    existing_controller_service_id,
                )

        if existing_task_id:
            existing_task = request(opener, base_url, "GET", f"/reporting-tasks/{existing_task_id}", token=token)
            if reporting_task_matches(existing_task, config, ssl_service_id):
                if existing_task.get("component", {}).get("state") != "RUNNING":
                    existing_task = enable_component(opener, base_url, token, "reporting-tasks", existing_task_id, "RUNNING")
                validation_errors = existing_task.get("component", {}).get("validationErrors", []) or []
                if validation_errors:
                    raise NiFiAPIError("site-to-site provenance reporting task has validation errors: " + "; ".join(validation_errors))
                print(f"site-to-site provenance bootstrap ready: task={existing_task_id} sslService={ssl_service_id or 'none'}")
                return

            ensure_absent(
                opener,
                base_url,
                token,
                "reporting-tasks",
                config["taskName"],
                "RUNNING",
                "STOPPED",
                existing_reporting_task_id,
            )

        reporting_types = request(opener, base_url, "GET", "/flow/reporting-task-types", token=token)
        reporting_bundle = find_bundle(reporting_types, "reportingTaskTypes", config["taskType"])
        task_payload = {
            "revision": {"version": 0},
            "disconnectedNodeAcknowledged": False,
            "component": {
                "name": config["taskName"],
                "type": config["taskType"],
                "bundle": reporting_bundle,
                "schedulingStrategy": config["schedule"]["strategy"],
                "schedulingPeriod": config["schedule"]["period"],
                "properties": expected_task_properties(config, ssl_service_id),
            },
        }
        created_task = request(opener, base_url, "POST", "/controller/reporting-tasks", token=token, payload=task_payload, expect=(200, 201))
        task_id = created_task["id"]
        task_entity = enable_component(opener, base_url, token, "reporting-tasks", task_id, "RUNNING")
        validation_errors = task_entity.get("component", {}).get("validationErrors", []) or []
        if validation_errors:
            raise NiFiAPIError("site-to-site provenance reporting task has validation errors: " + "; ".join(validation_errors))

        print(f"site-to-site provenance bootstrap ready: task={task_id} sslService={ssl_service_id or 'none'}")


    if __name__ == "__main__":
        try:
            bootstrap()
        except Exception as exc:
            print(f"site-to-site provenance bootstrap failed: {exc}", file=sys.stderr)
            sys.exit(1)
{{- end }}
