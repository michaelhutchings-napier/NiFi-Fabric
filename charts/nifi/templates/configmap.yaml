apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nifi.fullname" . }}-config
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
data:
  nifi.properties: |
    # Minimal scaffold only. This file is intentionally small until full chart work begins.
    nifi.cluster.is.node=true
    nifi.cluster.node.protocol.port={{ .Values.ports.cluster }}
    nifi.web.https.port={{ .Values.ports.https }}
    nifi.web.proxy.host=
    nifi.sensitive.props.key=changeit-change-me
    nifi.security.autoreload.enabled=true
    {{- range $key, $value := .Values.config.extraProperties }}
    {{ $key }}={{ $value }}
    {{- end }}

