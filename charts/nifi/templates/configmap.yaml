{{- include "nifi.authValidation" . }}
{{- include "nifi.flowRegistryValidation" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nifi.fullname" . }}-config
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
data:
  nifi.properties.overrides: |
    nifi.cluster.node.protocol.port={{ .Values.ports.cluster }}
    nifi.cluster.node.protocol.max.threads={{ .Values.nifi.cluster.nodeProtocolMaxThreads }}
    nifi.cluster.node.connection.timeout={{ .Values.nifi.cluster.nodeConnectionTimeout }}
    nifi.cluster.node.read.timeout={{ .Values.nifi.cluster.nodeReadTimeout }}
    nifi.cluster.load.balance.port={{ .Values.ports.loadBalance }}
    nifi.cluster.load.balance.connections.per.node={{ .Values.nifi.cluster.loadBalanceConnectionsPerNode }}
    nifi.cluster.load.balance.max.thread.count={{ .Values.nifi.cluster.loadBalanceMaxThreadCount }}
    nifi.cluster.load.balance.comms.timeout={{ .Values.nifi.cluster.loadBalanceCommsTimeout }}
    nifi.cluster.flow.election.max.wait.time={{ .Values.nifi.cluster.flowElectionMaxWait }}
    nifi.cluster.flow.election.max.candidates={{ default (printf "%v" .Values.replicaCount) .Values.nifi.cluster.flowElectionMaxCandidates }}
    nifi.cluster.is.node=true
    nifi.cluster.leader.election.implementation=KubernetesLeaderElectionManager
    nifi.cluster.leader.election.kubernetes.lease.prefix={{ include "nifi.fullname" . }}
    nifi.state.management.provider.cluster=kubernetes-provider
    nifi.security.autoreload.enabled={{ ternary "true" "false" .Values.tls.autoReload.enabled }}
    nifi.security.autoreload.interval={{ .Values.tls.autoReload.interval }}
    nifi.security.user.authorizer=managed-authorizer
    {{- if eq (include "nifi.authMode" .) "singleUser" }}
    nifi.security.user.login.identity.provider=single-user-provider
    {{- end }}
    {{- if eq (include "nifi.authMode" .) "ldap" }}
    nifi.security.user.login.identity.provider=ldap-provider
    {{- end }}
    {{- if eq (include "nifi.authMode" .) "oidc" }}
    nifi.security.user.login.identity.provider=
    nifi.security.user.oidc.discovery.url={{ required "auth.oidc.discoveryUrl is required when auth.mode=oidc" .Values.auth.oidc.discoveryUrl }}
    nifi.security.user.oidc.client.id={{ required "auth.oidc.clientId is required when auth.mode=oidc" .Values.auth.oidc.clientId }}
    nifi.security.user.oidc.client.secret=__OIDC_CLIENT_SECRET__
    nifi.security.user.oidc.claim.identifying.user={{ .Values.auth.oidc.claims.identifyingUser }}
    nifi.security.user.oidc.claim.groups={{ .Values.auth.oidc.claims.groups }}
    nifi.security.user.oidc.additional.scopes={{ join "," .Values.auth.oidc.additionalScopes }}
    {{- if .Values.auth.oidc.preferredJwsAlgorithm }}
    nifi.security.user.oidc.preferred.jwsalgorithm={{ .Values.auth.oidc.preferredJwsAlgorithm }}
    {{- end }}
    {{- range $key, $value := .Values.auth.oidc.extraProperties }}
    {{ $key }}={{ $value }}
    {{- end }}
    {{- end }}
    nifi.flowfile.repository.directory=./flowfile_repository
    nifi.content.repository.directory.default=./content_repository
    nifi.provenance.repository.directory.default=./provenance_repository
    {{- range $key, $value := .Values.config.extraProperties }}
    {{ $key }}={{ $value }}
    {{- end }}
  authorizers.xml: |
{{ include "nifi.authorizersXml" . | indent 4 }}
  login-identity-providers.xml: |
{{ include "nifi.loginIdentityProvidersXml" . | indent 4 }}
  users.xml: |
{{ include "nifi.usersXml" . | indent 4 }}
  authorizations.xml: |
{{ include "nifi.authorizationsXml" . | indent 4 }}
