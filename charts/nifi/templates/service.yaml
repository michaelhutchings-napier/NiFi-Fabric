apiVersion: v1
kind: Service
metadata:
  name: {{ include "nifi.fullname" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nifi.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: {{ .Values.ports.https }}
    protocol: TCP
    targetPort: https

