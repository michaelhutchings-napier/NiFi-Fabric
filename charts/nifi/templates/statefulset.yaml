apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nifi.fullname" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nifi.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: {{ ternary "OnDelete" "RollingUpdate" .Values.controllerManaged.enabled }}
  selector:
    matchLabels:
      {{- include "nifi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nifi.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        platform.nifi.io/controller-managed: {{ ternary "true" "false" .Values.controllerManaged.enabled | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "nifi.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: init-conf
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NIFI_POD_FQDN
          value: "$(POD_NAME).{{ include "nifi.fullname" . }}-headless.$(POD_NAMESPACE).svc.cluster.local"
        - name: KEYSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.keystorePasswordKey | quote }}
          {{- end }}
        - name: TRUSTSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.truststorePasswordKey | quote }}
          {{- end }}
        - name: NIFI_SENSITIVE_PROPS_KEY
          {{- if .Values.tls.sensitiveProps.value }}
          value: {{ .Values.tls.sensitiveProps.value | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.sensitivePropsSecretName" . | quote }}
              key: {{ include "nifi.sensitivePropsSecretKey" . | quote }}
          {{- end }}
        - name: AUTH_MODE
          value: {{ include "nifi.authMode" . | quote }}
        - name: AUTHZ_MODE
          value: {{ include "nifi.authzMode" . | quote }}
        {{- if eq (include "nifi.authMode" .) "singleUser" }}
        - name: SINGLE_USER_CREDENTIALS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.usernameKey | quote }}
        {{- end }}
        {{- if eq (include "nifi.authMode" .) "oidc" }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.oidcClientSecretName" . | quote }}
              key: {{ include "nifi.oidcClientSecretKey" . | quote }}
        {{- end }}
        {{- if eq (include "nifi.authMode" .) "ldap" }}
        - name: LDAP_MANAGER_DN
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.ldapManagerSecretName" . | quote }}
              key: {{ .Values.auth.ldap.managerSecret.dnKey | quote }}
        - name: LDAP_MANAGER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.ldapManagerSecretName" . | quote }}
              key: {{ .Values.auth.ldap.managerSecret.passwordKey | quote }}
        {{- end }}
        command:
        - /bin/sh
        - -ec
        - |
          stable_id() {
            printf '%s' "$1" | sha256sum | awk '{print $1}' | sed 's/^\(........\)\(....\)\(....\)\(....\)\(............\).*/\1-\2-\3-\4-\5/'
          }

          xml_escape() {
            printf '%s' "$1" \
              | sed -e 's/&/\&amp;/g' \
                    -e 's/</\&lt;/g' \
                    -e 's/>/\&gt;/g' \
                    -e 's/"/\&quot;/g' \
                    -e "s/'/\&apos;/g"
          }

          replace_token() {
            file="$1"
            token="$2"
            value="$3"
            escaped_value="$(printf '%s' "${value}" | sed -e 's/[\\&|]/\\&/g')"
            sed -i "s|${token}|${escaped_value}|g" "${file}"
          }

          replace_property() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" /work-conf/nifi.properties; then
              sed -i "s|^${key}=.*$|${key}=${value}|" /work-conf/nifi.properties
            else
              echo "${key}=${value}" >> /work-conf/nifi.properties
            fi
          }

          cp -R /opt/nifi/nifi-current/conf/* /work-conf/
          cp /config/authorizers.xml /work-conf/authorizers.xml
          cp /config/login-identity-providers.xml /work-conf/login-identity-providers.xml
          cp /config/users.xml /work-conf/users.xml
          if [ "${AUTHZ_MODE}" = "ldapSync" ] || { [ "${AUTHZ_MODE}" = "externalClaimGroups" ] && [ "{{ len .Values.authz.policies }}" = "0" ]; }; then
            rm -f /work-conf/authorizations.xml
          else
            cp /config/authorizations.xml /work-conf/authorizations.xml
          fi
          sed -i "s|^java.arg.2=.*$|java.arg.2=-Xms{{ .Values.nifi.jvmHeapInit }}|" /work-conf/bootstrap.conf
          sed -i "s|^java.arg.3=.*$|java.arg.3=-Xmx{{ .Values.nifi.jvmHeapMax }}|" /work-conf/bootstrap.conf
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            case "${line}" in
              \#*) continue ;;
            esac
            key="${line%%=*}"
            value="${line#*=}"
            replace_property "${key}" "${value}"
          done < /config/nifi.properties.overrides
          replace_property "nifi.security.keystore" "{{ .Values.tls.mountPath }}/{{ .Values.tls.keystoreKey }}"
          replace_property "nifi.security.keystoreType" "PKCS12"
          replace_property "nifi.security.keystorePasswd" "${KEYSTORE_PASSWORD}"
          replace_property "nifi.security.keyPasswd" "${KEYSTORE_PASSWORD}"
          replace_property "nifi.security.truststore" "{{ .Values.tls.mountPath }}/{{ .Values.tls.truststoreKey }}"
          replace_property "nifi.security.truststoreType" "PKCS12"
          replace_property "nifi.security.truststorePasswd" "${TRUSTSTORE_PASSWORD}"
          NODE_IDENTITY="$(openssl pkcs12 -in {{ .Values.tls.mountPath }}/{{ .Values.tls.keystoreKey }} -passin pass:${KEYSTORE_PASSWORD} -clcerts -nokeys | openssl x509 -noout -subject -nameopt RFC2253 | sed 's/^subject=//' | sed 's/,/, /g')"
          NODE_IDENTITY_ESCAPED="$(xml_escape "${NODE_IDENTITY}")"
          NODE_IDENTITY_ID="$(stable_id "${NODE_IDENTITY}")"
          if [ -f /work-conf/users.xml ]; then
            replace_token /work-conf/users.xml "__NODE_IDENTITY__" "${NODE_IDENTITY_ESCAPED}"
            replace_token /work-conf/users.xml "__NODE_IDENTITY_ID__" "${NODE_IDENTITY_ID}"
          fi
          if [ -f /work-conf/authorizations.xml ]; then
            replace_token /work-conf/authorizations.xml "__NODE_IDENTITY_ID__" "${NODE_IDENTITY_ID}"
          fi
          replace_token /work-conf/authorizers.xml "__NODE_IDENTITY__" "${NODE_IDENTITY_ESCAPED}"

          if [ "${AUTH_MODE}" = "singleUser" ]; then
            SINGLE_USER_IDENTITY_ESCAPED="$(xml_escape "${SINGLE_USER_CREDENTIALS_USERNAME}")"
            SINGLE_USER_IDENTITY_ID="$(stable_id "${SINGLE_USER_CREDENTIALS_USERNAME}")"
            if [ -f /work-conf/users.xml ]; then
              replace_token /work-conf/users.xml "__SINGLE_USER_IDENTITY__" "${SINGLE_USER_IDENTITY_ESCAPED}"
              replace_token /work-conf/users.xml "__ADMIN_IDENTITY_ID__" "${SINGLE_USER_IDENTITY_ID}"
            fi
            if [ -f /work-conf/authorizations.xml ]; then
              replace_token /work-conf/authorizations.xml "__ADMIN_IDENTITY_ID__" "${SINGLE_USER_IDENTITY_ID}"
            fi
            replace_token /work-conf/authorizers.xml "__SINGLE_USER_IDENTITY__" "${SINGLE_USER_IDENTITY_ESCAPED}"
          else
            if [ -f /work-conf/users.xml ]; then
              replace_token /work-conf/users.xml "__SINGLE_USER_IDENTITY__" ""
            fi
            replace_token /work-conf/authorizers.xml "__SINGLE_USER_IDENTITY__" ""
          fi

          if [ -f /work-conf/users.xml ] && grep -q "__ADMIN_IDENTITY_ID__" /work-conf/users.xml; then
            if grep -q '__ADMIN_IDENTITY_ID__' /work-conf/users.xml; then
              admin_identity="$(xmlstarlet sel -t -v "/tenants/users/user[@identifier='__ADMIN_IDENTITY_ID__']/@identity" /work-conf/users.xml 2>/dev/null || true)"
              if [ -n "${admin_identity}" ] && [ "${admin_identity}" != "__SINGLE_USER_IDENTITY__" ]; then
                replace_token /work-conf/users.xml "__ADMIN_IDENTITY_ID__" "$(stable_id "${admin_identity}")"
                if [ -f /work-conf/authorizations.xml ]; then
                  replace_token /work-conf/authorizations.xml "__ADMIN_IDENTITY_ID__" "$(stable_id "${admin_identity}")"
                fi
                replace_token /work-conf/authorizers.xml "__INITIAL_ADMIN_IDENTITY__" "${admin_identity}"
              fi
            fi
          fi

          if [ "${AUTH_MODE}" = "oidc" ]; then
            replace_property "nifi.security.user.oidc.client.secret" "${OIDC_CLIENT_SECRET}"
          fi

          if [ "${AUTH_MODE}" = "ldap" ]; then
            LDAP_MANAGER_DN_ESCAPED="$(xml_escape "${LDAP_MANAGER_DN}")"
            LDAP_MANAGER_PASSWORD_ESCAPED="$(xml_escape "${LDAP_MANAGER_PASSWORD}")"
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_DN__" "${LDAP_MANAGER_DN_ESCAPED}"
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_PASSWORD__" "${LDAP_MANAGER_PASSWORD_ESCAPED}"
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_DN__" "${LDAP_MANAGER_DN_ESCAPED}"
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_PASSWORD__" "${LDAP_MANAGER_PASSWORD_ESCAPED}"
          else
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_DN__" ""
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_PASSWORD__" ""
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_DN__" ""
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_PASSWORD__" ""
          fi

          replace_token /work-conf/authorizers.xml "__KEYSTORE_PASSWORD__" "$(xml_escape "${KEYSTORE_PASSWORD}")"
          replace_token /work-conf/authorizers.xml "__TRUSTSTORE_PASSWORD__" "$(xml_escape "${TRUSTSTORE_PASSWORD}")"
          replace_token /work-conf/login-identity-providers.xml "__KEYSTORE_PASSWORD__" "$(xml_escape "${KEYSTORE_PASSWORD}")"
          replace_token /work-conf/login-identity-providers.xml "__TRUSTSTORE_PASSWORD__" "$(xml_escape "${TRUSTSTORE_PASSWORD}")"
          replace_property "nifi.sensitive.props.key" "${NIFI_SENSITIVE_PROPS_KEY}"
          replace_property "nifi.web.http.host" ""
          replace_property "nifi.web.http.port" ""
          replace_property "nifi.web.https.host" "${NIFI_POD_FQDN}"
          replace_property "nifi.web.https.port" "{{ .Values.ports.https }}"
          replace_property "nifi.web.proxy.host" "{{ include "nifi.proxyHosts" . }}"
          replace_property "nifi.remote.input.host" "${NIFI_POD_FQDN}"
          replace_property "nifi.remote.input.secure" "true"
          replace_property "nifi.cluster.protocol.is.secure" "true"
          replace_property "nifi.cluster.node.address" "${NIFI_POD_FQDN}"
          replace_property "nifi.cluster.load.balance.host" "${NIFI_POD_FQDN}"
          xmlstarlet ed --inplace -u "/stateManagement/cluster-provider/property[@name='ConfigMap Name Prefix']" -v "{{ include "nifi.fullname" . }}" /work-conf/state-management.xml
          awk -F= '
            NR == FNR {
              if ($0 !~ /^#/ && index($0, "=") > 0) {
                last[$1] = NR
              }
              next
            }
            {
              if ($0 ~ /^#/ || index($0, "=") == 0) {
                print
                next
              }
              if (last[$1] == FNR) {
                print
              }
            }
          ' /work-conf/nifi.properties /work-conf/nifi.properties > /work-conf/nifi.properties.rendered
          mv /work-conf/nifi.properties.rendered /work-conf/nifi.properties
        volumeMounts:
        - name: config-template
          mountPath: /config
        - name: writable-conf
          mountPath: /work-conf
        - name: tls
          mountPath: {{ .Values.tls.mountPath }}
          readOnly: true
      containers:
      - name: nifi
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/sh
        - -ec
        - |
          {{- if eq (include "nifi.authMode" .) "singleUser" }}
          /opt/nifi/nifi-current/bin/nifi.sh set-single-user-credentials "${SINGLE_USER_CREDENTIALS_USERNAME}" "${SINGLE_USER_CREDENTIALS_PASSWORD}"
          {{- end }}
          /opt/nifi/nifi-current/bin/nifi.sh run &
          nifi_pid="$!"
          tail -F --pid="${nifi_pid}" /opt/nifi/nifi-current/logs/nifi-app.log &
          wait "${nifi_pid}"
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        env:
        - name: AUTH_MODE
          value: {{ include "nifi.authMode" . | quote }}
        {{- if eq (include "nifi.authMode" .) "singleUser" }}
        - name: SINGLE_USER_CREDENTIALS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.usernameKey | quote }}
        - name: SINGLE_USER_CREDENTIALS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.passwordKey | quote }}
        {{- end }}
        ports:
        - name: https
          containerPort: {{ .Values.ports.https }}
        - name: cluster
          containerPort: {{ .Values.ports.cluster }}
        - name: load-balance
          containerPort: {{ .Values.ports.loadBalance }}
        startupProbe:
          tcpSocket:
            port: https
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        readinessProbe:
          tcpSocket:
            port: https
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        livenessProbe:
          tcpSocket:
            port: https
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: writable-conf
          mountPath: /opt/nifi/nifi-current/conf
        - name: database-repository
          mountPath: /opt/nifi/nifi-current/database_repository
        - name: flowfile-repository
          mountPath: /opt/nifi/nifi-current/flowfile_repository
        - name: content-repository
          mountPath: /opt/nifi/nifi-current/content_repository
        - name: provenance-repository
          mountPath: /opt/nifi/nifi-current/provenance_repository
        - name: logs
          mountPath: /opt/nifi/nifi-current/logs
        - name: tls
          mountPath: {{ .Values.tls.mountPath }}
          readOnly: true
      volumes:
      - name: config-template
        configMap:
          name: {{ include "nifi.fullname" . }}-config
      - name: writable-conf
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: tls
        secret:
          secretName: {{ include "nifi.tlsSecretName" . }}
      {{- if not .Values.persistence.enabled }}
      - name: database-repository
        emptyDir: {}
      - name: flowfile-repository
        emptyDir: {}
      - name: content-repository
        emptyDir: {}
      - name: provenance-repository
        emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: database-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.databaseRepository.size }}
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
  - metadata:
      name: flowfile-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.flowfileRepository.size }}
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
  - metadata:
      name: content-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.contentRepository.size }}
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
  - metadata:
      name: provenance-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.provenanceRepository.size }}
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
  {{- end }}
