{{- $observability := default (dict) .Values.observability -}}
{{- $audit := default (dict) $observability.audit -}}
{{- $flowActionAudit := default (dict) $audit.flowActions -}}
{{- $flowActionAuditExport := default (dict) $flowActionAudit.export -}}
{{- $flowActionAuditExportLog := default (dict) $flowActionAuditExport.log -}}
{{- $flowActionAuditExportLogInstallation := default (dict) $flowActionAuditExportLog.installation -}}
{{- $flowActionAuditExportLogImage := default (dict) $flowActionAuditExportLogInstallation.image -}}
{{- $flowActionAuditReporterMountPath := "/opt/nifi/fabric/extensions/flow-action-audit" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nifi.fullname" . }}
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nifi.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: {{ ternary "OnDelete" "RollingUpdate" (eq (include "nifi.controllerManagedEnabled" .) "true") }}
  selector:
    matchLabels:
      {{- include "nifi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- $podLabels := merge (dict) (include "nifi.ambientPodLabels" . | fromYaml) }}
      {{- $podLabels = merge $podLabels (default (dict) .Values.podLabels) }}
      labels:
        {{- include "nifi.selectorLabels" . | nindent 8 }}
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $podAnnotations := merge (dict) (include "nifi.linkerdPodAnnotations" . | fromYaml) }}
      {{- $podAnnotations = merge $podAnnotations (include "nifi.istioPodAnnotations" . | fromYaml) }}
      {{- $podAnnotations = merge $podAnnotations (dict "checksum/config" (include (print $.Template.BasePath "/configmap.yaml") . | sha256sum)) }}
      {{- if .Values.observability.siteToSiteStatus.enabled }}
      {{- $podAnnotations = merge $podAnnotations (dict "checksum/site-to-site-status-config" (include (print $.Template.BasePath "/site-to-site-status-configmap.yaml") . | sha256sum)) }}
      {{- end }}
      {{- if .Values.observability.siteToSiteProvenance.enabled }}
      {{- $podAnnotations = merge $podAnnotations (dict "checksum/site-to-site-provenance-config" (include (print $.Template.BasePath "/site-to-site-provenance-configmap.yaml") . | sha256sum)) }}
      {{- end }}
      {{- $podAnnotations = merge $podAnnotations (dict "platform.nifi.io/controller-managed" (ternary "true" "false" (eq (include "nifi.controllerManagedEnabled" .) "true"))) }}
      {{- $podAnnotations = merge $podAnnotations (default (dict) .Values.podAnnotations) }}
      annotations:
        {{- toYaml $podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nifi.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: init-conf
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NIFI_POD_FQDN
          value: "$(POD_NAME).{{ include "nifi.fullname" . }}-headless.$(POD_NAMESPACE).svc.cluster.local"
        - name: KEYSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.keystorePasswordKey | quote }}
          {{- end }}
        - name: TRUSTSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.truststorePasswordKey | quote }}
          {{- end }}
        - name: NIFI_SENSITIVE_PROPS_KEY
          {{- if .Values.tls.sensitiveProps.value }}
          value: {{ .Values.tls.sensitiveProps.value | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.sensitivePropsSecretName" . | quote }}
              key: {{ include "nifi.sensitivePropsSecretKey" . | quote }}
          {{- end }}
        {{- if .Values.repositoryEncryption.enabled }}
        - name: REPOSITORY_ENCRYPTION_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.repositoryEncryption.secretRef.name | quote }}
              key: {{ .Values.repositoryEncryption.secretRef.passwordKey | quote }}
        {{- end }}
        - name: AUTH_MODE
          value: {{ include "nifi.authMode" . | quote }}
        - name: AUTHZ_MODE
          value: {{ include "nifi.authzMode" . | quote }}
        {{- if eq (include "nifi.authMode" .) "singleUser" }}
        - name: SINGLE_USER_CREDENTIALS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.usernameKey | quote }}
        {{- end }}
        {{- if eq (include "nifi.authMode" .) "oidc" }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.oidcClientSecretName" . | quote }}
              key: {{ include "nifi.oidcClientSecretKey" . | quote }}
        {{- end }}
        {{- if eq (include "nifi.authMode" .) "ldap" }}
        - name: LDAP_MANAGER_DN
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.ldapManagerSecretName" . | quote }}
              key: {{ .Values.auth.ldap.managerSecret.dnKey | quote }}
        - name: LDAP_MANAGER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.ldapManagerSecretName" . | quote }}
              key: {{ .Values.auth.ldap.managerSecret.passwordKey | quote }}
        {{- end }}
        command:
        - /bin/sh
        - -ec
        - |
          stable_id() {
            printf '%s' "$1" | sha256sum | awk '{print $1}' | sed 's/^\(........\)\(....\)\(....\)\(....\)\(............\).*/\1-\2-\3-\4-\5/'
          }

          xml_escape() {
            printf '%s' "$1" \
              | sed -e 's/&/\&amp;/g' \
                    -e 's/</\&lt;/g' \
                    -e 's/>/\&gt;/g' \
                    -e 's/"/\&quot;/g' \
                    -e "s/'/\&apos;/g"
          }

          replace_token() {
            file="$1"
            token="$2"
            value="$3"
            escaped_value="$(printf '%s' "${value}" | sed -e 's/[\\&|]/\\&/g')"
            sed -i "s|${token}|${escaped_value}|g" "${file}"
          }

          replace_property() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" /work-conf/nifi.properties; then
              sed -i "s|^${key}=.*$|${key}=${value}|" /work-conf/nifi.properties
            else
              echo "${key}=${value}" >> /work-conf/nifi.properties
            fi
          }

          apply_property_file() {
            file="$1"
            source_name="$2"
            if [ ! -f "${file}" ]; then
              return 0
            fi
            while IFS= read -r line || [ -n "${line}" ]; do
              [ -z "${line}" ] && continue
              case "${line}" in
                \#*) continue ;;
              esac
              if ! printf '%s' "${line}" | grep -q '='; then
                echo "invalid property line in ${source_name}: ${line}" >&2
                exit 1
              fi
              key="${line%%=*}"
              value="${line#*=}"
              if [ -z "${key}" ]; then
                echo "invalid property line in ${source_name}: ${line}" >&2
                exit 1
              fi
              replace_property "${key}" "${value}"
            done < "${file}"
          }

          apply_logging_levels() {
            file="$1"
            logback_path="$2"
            if [ ! -f "${file}" ]; then
              return 0
            fi
            if [ ! -f "${logback_path}" ]; then
              echo "logback.xml not found at ${logback_path}" >&2
              exit 1
            fi
            python_script="/tmp/apply-logging-levels.py"
            printf '%s\n' \
              'import sys' \
              'import xml.etree.ElementTree as ET' \
              '' \
              'levels_path, logback_path = sys.argv[1], sys.argv[2]' \
              'levels = {}' \
              'with open(levels_path, encoding="utf-8") as handle:' \
              '    for raw_line in handle:' \
              '        line = raw_line.strip()' \
              '        if not line or line.startswith("#"):' \
              '            continue' \
              '        if "=" not in raw_line:' \
              '            raise SystemExit(f"invalid logging level line in {levels_path}: {raw_line.rstrip()}")' \
              '        name, level = raw_line.split("=", 1)' \
              '        name = name.strip()' \
              '        level = level.strip().upper()' \
              '        if not name:' \
              '            raise SystemExit(f"invalid logging level line in {levels_path}: {raw_line.rstrip()}")' \
              '        levels[name] = level' \
              '' \
              'tree = ET.parse(logback_path)' \
              'root = tree.getroot()' \
              'children = list(root)' \
              'loggers_by_name = {}' \
              'insert_index = len(children)' \
              '' \
              'for index, child in enumerate(children):' \
              '    if child.tag == "root" and insert_index == len(children):' \
              '        insert_index = index' \
              '    if child.tag == "logger":' \
              '        logger_name = child.attrib.get("name")' \
              '        if logger_name:' \
              '            loggers_by_name[logger_name] = child' \
              '' \
              'for name, level in levels.items():' \
              '    logger = loggers_by_name.get(name)' \
              '    if logger is None:' \
              '        logger = ET.Element("logger", {"name": name, "level": level})' \
              '        root.insert(insert_index, logger)' \
              '        insert_index += 1' \
              '    else:' \
              '        logger.set("level", level)' \
              '' \
              'try:' \
              '    ET.indent(tree, space="  ")' \
              'except AttributeError:' \
              '    pass' \
              '' \
              'tree.write(logback_path, encoding="UTF-8", xml_declaration=True)' \
              > "${python_script}"
            python3 "${python_script}" "${file}" "${logback_path}"
            rm -f "${python_script}"
          }

          cp -R /opt/nifi/nifi-current/conf/* /work-conf/
          cp /config/authorizers.xml /work-conf/authorizers.xml
          cp /config/login-identity-providers.xml /work-conf/login-identity-providers.xml
          cp /config/users.xml /work-conf/users.xml
          if [ "${AUTHZ_MODE}" = "ldapSync" ] || { [ "${AUTHZ_MODE}" = "externalClaimGroups" ] && [ "{{ len .Values.authz.policies }}" = "0" ] && [ "{{ ternary "true" "false" .Values.authz.capabilities.mutableFlow.enabled }}" != "true" ] && [ "{{ include "nifi.namedPolicyBundlesEnabled" . }}" != "true" ]; }; then
            rm -f /work-conf/authorizations.xml
            rm -f /work-conf/authorizations.template.xml
          elif grep -q "__ROOT_PROCESS_GROUP_ID__" /config/authorizations.xml; then
            cp /config/authorizations.xml /work-conf/authorizations.template.xml
            rm -f /work-conf/authorizations.xml
          else
            cp /config/authorizations.xml /work-conf/authorizations.xml
            rm -f /work-conf/authorizations.template.xml
          fi
          sed -i "s|^java.arg.2=.*$|java.arg.2=-Xms{{ .Values.nifi.jvmHeapInit }}|" /work-conf/bootstrap.conf
          sed -i "s|^java.arg.3=.*$|java.arg.3=-Xmx{{ .Values.nifi.jvmHeapMax }}|" /work-conf/bootstrap.conf
          apply_property_file /config/nifi.properties.overrides "config-template nifi.properties.overrides"
          apply_logging_levels /config/logging-levels.properties /work-conf/logback.xml
          {{- range $index, $entry := default (list) .Values.config.propertyConfigMaps }}
          apply_property_file {{ printf "/external-property-configs/property-configmap-%03d.properties" $index | quote }} {{ printf "%s/%s" $entry.name $entry.key | quote }}
          {{- end }}
          replace_property "nifi.security.keystore" "{{ .Values.tls.mountPath }}/{{ .Values.tls.keystoreKey }}"
          replace_property "nifi.security.keystoreType" "PKCS12"
          replace_property "nifi.security.keystorePasswd" "${KEYSTORE_PASSWORD}"
          replace_property "nifi.security.keyPasswd" "${KEYSTORE_PASSWORD}"
          TRUSTSTORE_PATH="{{ .Values.tls.mountPath }}/{{ .Values.tls.truststoreKey }}"
          {{- if .Values.tls.additionalTrustBundle.enabled }}
          GENERATED_TRUSTSTORE_PATH="/opt/nifi/nifi-current/conf/truststore-with-extra-cas.p12"
          EXTRA_TRUST_BUNDLE_FILE="{{ .Values.tls.additionalTrustBundle.mountPath }}/{{ include "nifi.additionalTrustBundleRefKey" . }}"
          if [ -s "${EXTRA_TRUST_BUNDLE_FILE}" ]; then
            cp "{{ .Values.tls.mountPath }}/{{ .Values.tls.truststoreKey }}" /work-conf/truststore-with-extra-cas.p12
            rm -f /tmp/extra-trust-cert-*.pem
            awk '
              /-----BEGIN CERTIFICATE-----/ {
                cert_count++
                cert_path=sprintf("/tmp/extra-trust-cert-%03d.pem", cert_count)
              }
              cert_count > 0 {
                print >> cert_path
              }
              /-----END CERTIFICATE-----/ && cert_count > 0 {
                close(cert_path)
              }
            ' "${EXTRA_TRUST_BUNDLE_FILE}"
            cert_index=0
            for cert in /tmp/extra-trust-cert-*.pem; do
              [ -s "${cert}" ] || continue
              keytool -importcert -noprompt \
                -storetype PKCS12 \
                -keystore /work-conf/truststore-with-extra-cas.p12 \
                -storepass "${TRUSTSTORE_PASSWORD}" \
                -alias "extra-ca-${cert_index}" \
                -file "${cert}" >/dev/null
              cert_index=$((cert_index + 1))
            done
            if [ "${cert_index}" -gt 0 ]; then
              TRUSTSTORE_PATH="${GENERATED_TRUSTSTORE_PATH}"
            fi
          fi
          {{- end }}
          replace_property "nifi.security.truststore" "${TRUSTSTORE_PATH}"
          replace_property "nifi.security.truststoreType" "PKCS12"
          replace_property "nifi.security.truststorePasswd" "${TRUSTSTORE_PASSWORD}"
          NODE_IDENTITY="$(openssl pkcs12 -in {{ .Values.tls.mountPath }}/{{ .Values.tls.keystoreKey }} -passin pass:${KEYSTORE_PASSWORD} -clcerts -nokeys | openssl x509 -noout -subject -nameopt RFC2253 | sed 's/^subject=//' | sed 's/,/, /g')"
          NODE_IDENTITY_ESCAPED="$(xml_escape "${NODE_IDENTITY}")"
          NODE_IDENTITY_ID="$(stable_id "${NODE_IDENTITY}")"
          if [ -f /work-conf/users.xml ]; then
            replace_token /work-conf/users.xml "__NODE_IDENTITY__" "${NODE_IDENTITY_ESCAPED}"
            replace_token /work-conf/users.xml "__NODE_IDENTITY_ID__" "${NODE_IDENTITY_ID}"
          fi
          for authz_file in /work-conf/authorizations.xml /work-conf/authorizations.template.xml; do
            if [ -f "${authz_file}" ]; then
              replace_token "${authz_file}" "__NODE_IDENTITY_ID__" "${NODE_IDENTITY_ID}"
            fi
          done
          replace_token /work-conf/authorizers.xml "__NODE_IDENTITY__" "${NODE_IDENTITY_ESCAPED}"

          if [ "${AUTH_MODE}" = "singleUser" ]; then
            SINGLE_USER_IDENTITY_ESCAPED="$(xml_escape "${SINGLE_USER_CREDENTIALS_USERNAME}")"
            SINGLE_USER_IDENTITY_ID="$(stable_id "${SINGLE_USER_CREDENTIALS_USERNAME}")"
            if [ -f /work-conf/users.xml ]; then
              replace_token /work-conf/users.xml "__SINGLE_USER_IDENTITY__" "${SINGLE_USER_IDENTITY_ESCAPED}"
              replace_token /work-conf/users.xml "__ADMIN_IDENTITY_ID__" "${SINGLE_USER_IDENTITY_ID}"
            fi
            for authz_file in /work-conf/authorizations.xml /work-conf/authorizations.template.xml; do
              if [ -f "${authz_file}" ]; then
                replace_token "${authz_file}" "__ADMIN_IDENTITY_ID__" "${SINGLE_USER_IDENTITY_ID}"
              fi
            done
            replace_token /work-conf/authorizers.xml "__SINGLE_USER_IDENTITY__" "${SINGLE_USER_IDENTITY_ESCAPED}"
          else
            if [ -f /work-conf/users.xml ]; then
              replace_token /work-conf/users.xml "__SINGLE_USER_IDENTITY__" ""
            fi
            replace_token /work-conf/authorizers.xml "__SINGLE_USER_IDENTITY__" ""
          fi

          if [ -f /work-conf/users.xml ] && grep -q "__ADMIN_IDENTITY_ID__" /work-conf/users.xml; then
            if grep -q '__ADMIN_IDENTITY_ID__' /work-conf/users.xml; then
              admin_identity="$(xmlstarlet sel -t -v "/tenants/users/user[@identifier='__ADMIN_IDENTITY_ID__']/@identity" /work-conf/users.xml 2>/dev/null || true)"
              if [ -n "${admin_identity}" ] && [ "${admin_identity}" != "__SINGLE_USER_IDENTITY__" ]; then
                replace_token /work-conf/users.xml "__ADMIN_IDENTITY_ID__" "$(stable_id "${admin_identity}")"
                for authz_file in /work-conf/authorizations.xml /work-conf/authorizations.template.xml; do
                  if [ -f "${authz_file}" ]; then
                    replace_token "${authz_file}" "__ADMIN_IDENTITY_ID__" "$(stable_id "${admin_identity}")"
                  fi
                done
                replace_token /work-conf/authorizers.xml "__INITIAL_ADMIN_IDENTITY__" "${admin_identity}"
              fi
            fi
          fi

          if [ "${AUTH_MODE}" = "oidc" ]; then
            replace_property "nifi.security.user.oidc.client.secret" "${OIDC_CLIENT_SECRET}"
          fi

          if [ "${AUTH_MODE}" = "ldap" ]; then
            LDAP_MANAGER_DN_ESCAPED="$(xml_escape "${LDAP_MANAGER_DN}")"
            LDAP_MANAGER_PASSWORD_ESCAPED="$(xml_escape "${LDAP_MANAGER_PASSWORD}")"
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_DN__" "${LDAP_MANAGER_DN_ESCAPED}"
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_PASSWORD__" "${LDAP_MANAGER_PASSWORD_ESCAPED}"
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_DN__" "${LDAP_MANAGER_DN_ESCAPED}"
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_PASSWORD__" "${LDAP_MANAGER_PASSWORD_ESCAPED}"
          else
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_DN__" ""
            replace_token /work-conf/authorizers.xml "__LDAP_MANAGER_PASSWORD__" ""
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_DN__" ""
            replace_token /work-conf/login-identity-providers.xml "__LDAP_MANAGER_PASSWORD__" ""
          fi

          replace_token /work-conf/authorizers.xml "__KEYSTORE_PASSWORD__" "$(xml_escape "${KEYSTORE_PASSWORD}")"
          replace_token /work-conf/authorizers.xml "__TRUSTSTORE_PATH__" "$(xml_escape "${TRUSTSTORE_PATH}")"
          replace_token /work-conf/authorizers.xml "__TRUSTSTORE_PASSWORD__" "$(xml_escape "${TRUSTSTORE_PASSWORD}")"
          replace_token /work-conf/login-identity-providers.xml "__KEYSTORE_PASSWORD__" "$(xml_escape "${KEYSTORE_PASSWORD}")"
          replace_token /work-conf/login-identity-providers.xml "__TRUSTSTORE_PATH__" "$(xml_escape "${TRUSTSTORE_PATH}")"
          replace_token /work-conf/login-identity-providers.xml "__TRUSTSTORE_PASSWORD__" "$(xml_escape "${TRUSTSTORE_PASSWORD}")"
          replace_property "nifi.sensitive.props.key" "${NIFI_SENSITIVE_PROPS_KEY}"
          {{- if .Values.repositoryEncryption.enabled }}
          replace_property "nifi.repository.encryption.key.provider.keystore.password" "${REPOSITORY_ENCRYPTION_KEYSTORE_PASSWORD}"
          {{- end }}
          replace_property "nifi.web.http.host" ""
          replace_property "nifi.web.http.port" ""
          replace_property "nifi.web.https.host" "${NIFI_POD_FQDN}"
          replace_property "nifi.web.https.port" "{{ .Values.ports.https }}"
          replace_property "nifi.web.proxy.host" "{{ include "nifi.proxyHosts" . }}"
          replace_property "nifi.remote.input.host" "${NIFI_POD_FQDN}"
          replace_property "nifi.remote.input.secure" "true"
          replace_property "nifi.cluster.protocol.is.secure" "true"
          replace_property "nifi.cluster.node.address" "${NIFI_POD_FQDN}"
          replace_property "nifi.cluster.load.balance.host" "${NIFI_POD_FQDN}"
          xmlstarlet ed --inplace -u "/stateManagement/cluster-provider/property[@name='ConfigMap Name Prefix']" -v "{{ include "nifi.fullname" . }}" /work-conf/state-management.xml
          awk -F= '
            NR == FNR {
              if ($0 !~ /^#/ && index($0, "=") > 0) {
                last[$1] = NR
              }
              next
            }
            {
              if ($0 ~ /^#/ || index($0, "=") == 0) {
                print
                next
              }
              if (last[$1] == FNR) {
                print
              }
            }
          ' /work-conf/nifi.properties /work-conf/nifi.properties > /work-conf/nifi.properties.rendered
          mv /work-conf/nifi.properties.rendered /work-conf/nifi.properties
        volumeMounts:
        - name: config-template
          mountPath: /config
        - name: writable-conf
          mountPath: /work-conf
        - name: tls
          mountPath: {{ .Values.tls.mountPath }}
          readOnly: true
        {{- if .Values.repositoryEncryption.enabled }}
        - name: repository-encryption
          mountPath: {{ .Values.repositoryEncryption.mountPath }}
          readOnly: true
        {{- end }}
        {{- if .Values.tls.additionalTrustBundle.enabled }}
        - name: additional-trust-bundle
          mountPath: {{ .Values.tls.additionalTrustBundle.mountPath }}
          readOnly: true
        {{- end }}
        {{- if .Values.config.propertyConfigMaps }}
        - name: external-property-configs
          mountPath: /external-property-configs
          readOnly: true
        {{- end }}
      {{- if and $flowActionAudit.enabled (eq $flowActionAuditExport.type "log") }}
      - name: install-flow-action-audit-reporter
        image: "{{ $flowActionAuditExportLogImage.repository }}:{{ $flowActionAuditExportLogImage.tag }}"
        imagePullPolicy: {{ $flowActionAuditExportLogImage.pullPolicy }}
        command:
        - /bin/sh
        - -ec
        - |
          if [ ! -f "{{ $flowActionAuditExportLogImage.narPath }}" ]; then
            echo "flow-action audit reporter NAR not found at {{ $flowActionAuditExportLogImage.narPath }}" >&2
            exit 1
          fi
          cp "{{ $flowActionAuditExportLogImage.narPath }}" "{{ $flowActionAuditReporterMountPath }}/"
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        volumeMounts:
        - name: flow-action-audit-reporter
          mountPath: {{ $flowActionAuditReporterMountPath }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      {{- range . }}
        {{- $container := deepCopy . }}
        {{- $securityContext := mergeOverwrite (deepCopy $.Values.securityContext) (deepCopy $.Values.extraInitContainersSecurityContext) (default (dict) .securityContext) }}
        {{- $_ := set $container "securityContext" $securityContext }}
        {{- toYaml (list $container) | nindent 6 }}
      {{- end }}
      {{- end }}
      containers:
      - name: nifi
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /bin/sh
        - -ec
        - |
          nifi_pid=""
          tail_pid=""

          stop_nifi() {
            if [ -n "${nifi_pid}" ] && kill -0 "${nifi_pid}" 2>/dev/null; then
              /opt/nifi/nifi-current/bin/nifi.sh stop >/dev/null 2>&1 || true
            fi
            if [ -n "${tail_pid}" ] && kill -0 "${tail_pid}" 2>/dev/null; then
              kill "${tail_pid}" >/dev/null 2>&1 || true
            fi
          }

          trap 'stop_nifi; wait "${nifi_pid}" 2>/dev/null || true; wait "${tail_pid}" 2>/dev/null || true; exit 0' TERM INT

          bootstrap_root_process_group_authorizations() {
            if [ ! -f /opt/nifi/nifi-current/conf/authorizations.template.xml ]; then
              return 0
            fi

            echo "Bootstrapping mutable flow authorizations from the discovered root process group id"
            /opt/nifi/nifi-current/bin/nifi.sh start

            root_group_id=""
            for _ in $(seq 1 90); do
              if root_group_id="$(
                python3 -c 'import gzip, json, os, sys; path="/opt/nifi/nifi-current/conf/flow.json.gz"; payload=json.load(gzip.open(path, "rt")) if os.path.exists(path) else {}; root_group=payload.get("rootGroup", {}) or {}; candidates=[root_group.get("instanceIdentifier"), payload.get("rootGroupIdentifier"), payload.get("rootGroupId"), root_group.get("identifier"), root_group.get("id")]; value=next((candidate for candidate in candidates if candidate), ""); print(value) if value else sys.exit(1)' 2>/dev/null
              )" && [ -n "${root_group_id}" ]; then
                break
              fi
              sleep 2
            done

            /opt/nifi/nifi-current/bin/nifi.sh stop >/dev/null 2>&1 || true

            if [ -z "${root_group_id}" ]; then
              echo "failed to discover the NiFi root process group id for mutable flow authz bootstrap" >&2
              exit 1
            fi

            cp /opt/nifi/nifi-current/conf/authorizations.template.xml /opt/nifi/nifi-current/conf/authorizations.xml
            sed -i "s|__ROOT_PROCESS_GROUP_ID__|${root_group_id}|g" /opt/nifi/nifi-current/conf/authorizations.xml
            rm -f /opt/nifi/nifi-current/conf/authorizations.template.xml
          }

          {{- if eq (include "nifi.authMode" .) "singleUser" }}
          /opt/nifi/nifi-current/bin/nifi.sh set-single-user-credentials "${SINGLE_USER_CREDENTIALS_USERNAME}" "${SINGLE_USER_CREDENTIALS_PASSWORD}"
          {{- end }}
          bootstrap_root_process_group_authorizations
          /opt/nifi/nifi-current/bin/nifi.sh run &
          nifi_pid="$!"
          tail -F --pid="${nifi_pid}" /opt/nifi/nifi-current/logs/nifi-app.log &
          tail_pid="$!"
          {{- if eq (include "nifi.metricsMode" .) "siteToSite" }}
          python3 /opt/nifi/fabric/site-to-site-metrics/bootstrap.py
          {{- end }}
          {{- if .Values.observability.siteToSiteStatus.enabled }}
          python3 /opt/nifi/fabric/site-to-site-status/bootstrap.py
          {{- end }}
          {{- if .Values.observability.siteToSiteProvenance.enabled }}
          python3 /opt/nifi/fabric/site-to-site-provenance/bootstrap.py
          {{- end }}
          {{- if .Values.parameterContexts.enabled }}
          python3 /opt/nifi/fabric/parameter-contexts/bootstrap.py --once >>/opt/nifi/nifi-current/logs/parameter-contexts-bootstrap.log 2>&1 || true
          python3 /opt/nifi/fabric/parameter-contexts/bootstrap.py >>/opt/nifi/nifi-current/logs/parameter-contexts-bootstrap.log 2>&1 &
          {{- end }}
          {{- if .Values.versionedFlowImports.enabled }}
          python3 /opt/nifi/fabric/versioned-flow-imports/bootstrap.py --once >>/opt/nifi/nifi-current/logs/versioned-flow-imports-bootstrap.log 2>&1 || true
          python3 /opt/nifi/fabric/versioned-flow-imports/bootstrap.py >>/opt/nifi/nifi-current/logs/versioned-flow-imports-bootstrap.log 2>&1 &
          {{- end }}
          wait "${nifi_pid}"
          wait "${tail_pid}" 2>/dev/null || true
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NIFI_POD_FQDN
          value: "$(POD_NAME).{{ include "nifi.fullname" . }}-headless.$(POD_NAMESPACE).svc.cluster.local"
        - name: AUTH_MODE
          value: {{ include "nifi.authMode" . | quote }}
        {{- if or (eq (include "nifi.metricsMode" .) "siteToSite") .Values.observability.siteToSiteStatus.enabled .Values.observability.siteToSiteProvenance.enabled .Values.parameterContexts.enabled .Values.versionedFlowImports.enabled }}
        - name: KEYSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.keystorePasswordKey | quote }}
          {{- end }}
        - name: TRUSTSTORE_PASSWORD
          {{- if eq (include "nifi.tlsMode" .) "certManager" }}
          {{- if .Values.tls.certManager.pkcs12.password }}
          value: {{ .Values.tls.certManager.pkcs12.password | quote }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.certManagerPKCS12PasswordSecretName" . | quote }}
              key: {{ include "nifi.certManagerPKCS12PasswordSecretKey" . | quote }}
          {{- end }}
          {{- else }}
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.tlsSecretName" . | quote }}
              key: {{ .Values.tls.truststorePasswordKey | quote }}
          {{- end }}
        {{- if eq .Values.observability.metrics.siteToSite.auth.type "secretRef" }}
        - name: SITE_TO_SITE_METRICS_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.metrics.siteToSite.auth.secretRef.name | quote }}
              key: {{ default "keystorePassword" .Values.observability.metrics.siteToSite.auth.secretRef.keystorePasswordKey | quote }}
        - name: SITE_TO_SITE_METRICS_TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.metrics.siteToSite.auth.secretRef.name | quote }}
              key: {{ default "truststorePassword" .Values.observability.metrics.siteToSite.auth.secretRef.truststorePasswordKey | quote }}
        {{- end }}
        {{- if and .Values.observability.siteToSiteStatus.enabled (eq .Values.observability.siteToSiteStatus.auth.type "secretRef") }}
        - name: SITE_TO_SITE_STATUS_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.siteToSiteStatus.auth.secretRef.name | quote }}
              key: {{ default "keystorePassword" .Values.observability.siteToSiteStatus.auth.secretRef.keystorePasswordKey | quote }}
        - name: SITE_TO_SITE_STATUS_TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.siteToSiteStatus.auth.secretRef.name | quote }}
              key: {{ default "truststorePassword" .Values.observability.siteToSiteStatus.auth.secretRef.truststorePasswordKey | quote }}
        {{- end }}
        {{- if and .Values.observability.siteToSiteProvenance.enabled (eq .Values.observability.siteToSiteProvenance.auth.type "secretRef") }}
        - name: SITE_TO_SITE_PROVENANCE_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.siteToSiteProvenance.auth.secretRef.name | quote }}
              key: {{ default "keystorePassword" .Values.observability.siteToSiteProvenance.auth.secretRef.keystorePasswordKey | quote }}
        - name: SITE_TO_SITE_PROVENANCE_TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.observability.siteToSiteProvenance.auth.secretRef.name | quote }}
              key: {{ default "truststorePassword" .Values.observability.siteToSiteProvenance.auth.secretRef.truststorePasswordKey | quote }}
        {{- end }}
        {{- end }}
        {{- if eq (include "nifi.authMode" .) "singleUser" }}
        - name: SINGLE_USER_CREDENTIALS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.usernameKey | quote }}
        - name: SINGLE_USER_CREDENTIALS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "nifi.singleUserUsernameSecretName" . | quote }}
              key: {{ .Values.auth.singleUser.passwordKey | quote }}
        {{- end }}
        {{- if and .Values.versionedFlowImports.enabled .Values.flowRegistryClients.enabled }}
        {{- range $clientIndex, $client := default (list) .Values.flowRegistryClients.clients }}
        {{- if and (eq $client.provider "github") (or (not $client.github.auth.type) (eq $client.github.auth.type "personalAccessToken")) }}
        - name: {{ printf "FLOW_REGISTRY_CLIENT_GITHUB_PAT_%d" $clientIndex }}
          valueFrom:
            secretKeyRef:
              name: {{ $client.github.auth.personalAccessTokenSecret.name | quote }}
              key: {{ $client.github.auth.personalAccessTokenSecret.key | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - name: https
          containerPort: {{ .Values.ports.https }}
        - name: cluster
          containerPort: {{ .Values.ports.cluster }}
        - name: load-balance
          containerPort: {{ .Values.ports.loadBalance }}
        {{- if .Values.probes.startup.enabled }}
        startupProbe:
          tcpSocket:
            port: https
          {{- with .Values.probes.startup.initialDelaySeconds }}
          initialDelaySeconds: {{ . }}
          {{- end }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        {{- end }}
        {{- if .Values.probes.readiness.enabled }}
        readinessProbe:
          tcpSocket:
            port: https
          {{- with .Values.probes.readiness.initialDelaySeconds }}
          initialDelaySeconds: {{ . }}
          {{- end }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        {{- end }}
        {{- if .Values.probes.liveness.enabled }}
        livenessProbe:
          tcpSocket:
            port: https
          {{- with .Values.probes.liveness.initialDelaySeconds }}
          initialDelaySeconds: {{ . }}
          {{- end }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: writable-conf
          mountPath: /opt/nifi/nifi-current/conf
        - name: database-repository
          mountPath: /opt/nifi/nifi-current/database_repository
        - name: flowfile-repository
          mountPath: /opt/nifi/nifi-current/flowfile_repository
        - name: content-repository
          mountPath: /opt/nifi/nifi-current/content_repository
        - name: provenance-repository
          mountPath: /opt/nifi/nifi-current/provenance_repository
        - name: logs
          mountPath: /opt/nifi/nifi-current/logs
        - name: tls
          mountPath: {{ .Values.tls.mountPath }}
          readOnly: true
        {{- if .Values.repositoryEncryption.enabled }}
        - name: repository-encryption
          mountPath: {{ .Values.repositoryEncryption.mountPath }}
          readOnly: true
        {{- end }}
        {{- if eq (include "nifi.metricsMode" .) "siteToSite" }}
        - name: site-to-site-metrics-config
          mountPath: /opt/nifi/fabric/site-to-site-metrics
          readOnly: true
        {{- if eq .Values.observability.metrics.siteToSite.auth.type "secretRef" }}
        - name: site-to-site-metrics-ssl
          mountPath: /opt/nifi/fabric/site-to-site-metrics-ssl
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.observability.siteToSiteStatus.enabled }}
        - name: site-to-site-status-config
          mountPath: /opt/nifi/fabric/site-to-site-status
          readOnly: true
        {{- if eq .Values.observability.siteToSiteStatus.auth.type "secretRef" }}
        - name: site-to-site-status-ssl
          mountPath: /opt/nifi/fabric/site-to-site-status-ssl
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.observability.siteToSiteProvenance.enabled }}
        - name: site-to-site-provenance-config
          mountPath: /opt/nifi/fabric/site-to-site-provenance
          readOnly: true
        {{- if eq .Values.observability.siteToSiteProvenance.auth.type "secretRef" }}
        - name: site-to-site-provenance-ssl
          mountPath: /opt/nifi/fabric/site-to-site-provenance-ssl
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.flowRegistryClients.enabled }}
        - name: flow-registry-clients
          mountPath: {{ .Values.flowRegistryClients.mountPath }}
          readOnly: true
        {{- end }}
        {{- if .Values.parameterContexts.enabled }}
        - name: parameter-contexts
          mountPath: {{ .Values.parameterContexts.mountPath }}
          readOnly: true
        {{- $parameterContextSecretRefs := dict -}}
        {{- range $context := .Values.parameterContexts.contexts }}
        {{- range $parameter := default (list) $context.parameters }}
        {{- if default false $parameter.sensitive }}
        {{- $secretName := $parameter.secretRef.name -}}
        {{- $existing := get $parameterContextSecretRefs $secretName | default (list) -}}
        {{- if not (has $parameter.secretRef.key $existing) }}
        {{- $_ := set $parameterContextSecretRefs $secretName (append $existing $parameter.secretRef.key) -}}
        {{- end -}}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if gt (len (keys $parameterContextSecretRefs)) 0 }}
        - name: parameter-context-secrets
          mountPath: /opt/nifi/fabric/parameter-context-secrets
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.versionedFlowImports.enabled }}
        - name: versioned-flow-imports
          mountPath: {{ .Values.versionedFlowImports.mountPath }}
          readOnly: true
        {{- if .Values.versionedFlowImports.controllerBridge.enabled }}
        - name: nifidataflow-bridge
          mountPath: {{ .Values.versionedFlowImports.controllerBridge.mountPath }}
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if and $flowActionAudit.enabled (eq $flowActionAuditExport.type "log") }}
        - name: flow-action-audit-reporter
          mountPath: {{ $flowActionAuditReporterMountPath }}
          readOnly: true
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.sidecars }}
      {{- range . }}
        {{- $container := deepCopy . }}
        {{- $securityContext := mergeOverwrite (deepCopy $.Values.securityContext) (deepCopy $.Values.sidecarsSecurityContext) (default (dict) .securityContext) }}
        {{- $_ := set $container "securityContext" $securityContext }}
        {{- toYaml (list $container) | nindent 6 }}
      {{- end }}
      {{- end }}
      volumes:
      - name: config-template
        configMap:
          name: {{ include "nifi.fullname" . }}-config
      - name: writable-conf
        emptyDir: {}
      - name: logs
        emptyDir: {}
      - name: tls
        secret:
          secretName: {{ include "nifi.tlsSecretName" . }}
      {{- if .Values.repositoryEncryption.enabled }}
      - name: repository-encryption
        secret:
          secretName: {{ .Values.repositoryEncryption.secretRef.name }}
      {{- end }}
      {{- if eq (include "nifi.metricsMode" .) "siteToSite" }}
      - name: site-to-site-metrics-config
        configMap:
          name: {{ include "nifi.siteToSiteMetricsConfigName" . }}
      {{- if eq .Values.observability.metrics.siteToSite.auth.type "secretRef" }}
      - name: site-to-site-metrics-ssl
        secret:
          secretName: {{ .Values.observability.metrics.siteToSite.auth.secretRef.name }}
      {{- end }}
      {{- end }}
      {{- if .Values.observability.siteToSiteStatus.enabled }}
      - name: site-to-site-status-config
        configMap:
          name: {{ include "nifi.siteToSiteStatusConfigName" . }}
      {{- if eq .Values.observability.siteToSiteStatus.auth.type "secretRef" }}
      - name: site-to-site-status-ssl
        secret:
          secretName: {{ .Values.observability.siteToSiteStatus.auth.secretRef.name }}
      {{- end }}
      {{- end }}
      {{- if .Values.observability.siteToSiteProvenance.enabled }}
      - name: site-to-site-provenance-config
        configMap:
          name: {{ include "nifi.siteToSiteProvenanceConfigName" . }}
      {{- if eq .Values.observability.siteToSiteProvenance.auth.type "secretRef" }}
      - name: site-to-site-provenance-ssl
        secret:
          secretName: {{ .Values.observability.siteToSiteProvenance.auth.secretRef.name }}
      {{- end }}
      {{- end }}
      {{- if and .Values.tls.additionalTrustBundle.enabled (eq (include "nifi.additionalTrustBundleRefType" .) "configMap") }}
      - name: additional-trust-bundle
        configMap:
          name: {{ include "nifi.additionalTrustBundleRefName" . }}
      {{- end }}
      {{- if and .Values.tls.additionalTrustBundle.enabled (eq (include "nifi.additionalTrustBundleRefType" .) "secret") }}
      - name: additional-trust-bundle
        secret:
          secretName: {{ include "nifi.additionalTrustBundleRefName" . }}
      {{- end }}
      {{- if .Values.flowRegistryClients.enabled }}
      - name: flow-registry-clients
        configMap:
          name: {{ include "nifi.fullname" . }}-flow-registry-clients
      {{- end }}
      {{- if .Values.parameterContexts.enabled }}
      - name: parameter-contexts
        configMap:
          name: {{ include "nifi.parameterContextsConfigName" . }}
      {{- $parameterContextSecretRefs := dict -}}
      {{- range $context := .Values.parameterContexts.contexts }}
      {{- range $parameter := default (list) $context.parameters }}
      {{- if default false $parameter.sensitive }}
      {{- $secretName := $parameter.secretRef.name -}}
      {{- $existing := get $parameterContextSecretRefs $secretName | default (list) -}}
      {{- if not (has $parameter.secretRef.key $existing) }}
      {{- $_ := set $parameterContextSecretRefs $secretName (append $existing $parameter.secretRef.key) -}}
      {{- end -}}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if gt (len (keys $parameterContextSecretRefs)) 0 }}
      - name: parameter-context-secrets
        projected:
          sources:
          {{- range $secretName := keys $parameterContextSecretRefs | sortAlpha }}
          - secret:
              name: {{ $secretName | quote }}
              optional: true
              items:
              {{- range $secretKey := get $parameterContextSecretRefs $secretName }}
              - key: {{ $secretKey | quote }}
                path: {{ printf "%s/%s" $secretName $secretKey | quote }}
              {{- end }}
          {{- end }}
      {{- end }}
      {{- end }}
      {{- if .Values.versionedFlowImports.enabled }}
      - name: versioned-flow-imports
        configMap:
          name: {{ include "nifi.versionedFlowImportsConfigName" . }}
      {{- if .Values.versionedFlowImports.controllerBridge.enabled }}
      - name: nifidataflow-bridge
        configMap:
          name: {{ include "nifi.nifidataflowBridgeConfigName" . }}
          optional: true
      {{- end }}
      {{- end }}
      {{- if and $flowActionAudit.enabled (eq $flowActionAuditExport.type "log") }}
      - name: flow-action-audit-reporter
        emptyDir: {}
      {{- end }}
      {{- if .Values.config.propertyConfigMaps }}
      - name: external-property-configs
        projected:
          sources:
          {{- range $index, $entry := .Values.config.propertyConfigMaps }}
          - configMap:
              name: {{ $entry.name | quote }}
              items:
              - key: {{ $entry.key | quote }}
                path: {{ printf "property-configmap-%03d.properties" $index | quote }}
          {{- end }}
      {{- end }}
      {{- with .Values.extraVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if not .Values.persistence.enabled }}
      - name: database-repository
        emptyDir: {}
      - name: flowfile-repository
        emptyDir: {}
      - name: content-repository
        emptyDir: {}
      - name: provenance-repository
        emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  {{- $databaseRepositoryStorageClassName := default .Values.persistence.storageClassName .Values.persistence.databaseRepository.storageClassName }}
  {{- $flowfileRepositoryStorageClassName := default .Values.persistence.storageClassName .Values.persistence.flowfileRepository.storageClassName }}
  {{- $contentRepositoryStorageClassName := default .Values.persistence.storageClassName .Values.persistence.contentRepository.storageClassName }}
  {{- $provenanceRepositoryStorageClassName := default .Values.persistence.storageClassName .Values.persistence.provenanceRepository.storageClassName }}
  volumeClaimTemplates:
  - metadata:
      name: database-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.databaseRepository.size }}
      {{- if $databaseRepositoryStorageClassName }}
      storageClassName: {{ $databaseRepositoryStorageClassName }}
      {{- end }}
  - metadata:
      name: flowfile-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.flowfileRepository.size }}
      {{- if $flowfileRepositoryStorageClassName }}
      storageClassName: {{ $flowfileRepositoryStorageClassName }}
      {{- end }}
  - metadata:
      name: content-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.contentRepository.size }}
      {{- if $contentRepositoryStorageClassName }}
      storageClassName: {{ $contentRepositoryStorageClassName }}
      {{- end }}
  - metadata:
      name: provenance-repository
      labels:
        {{- include "nifi.labels" . | nindent 8 }}
    spec:
      accessModes:
      {{- toYaml .Values.persistence.accessModes | nindent 6 }}
      resources:
        requests:
          storage: {{ .Values.persistence.provenanceRepository.size }}
      {{- if $provenanceRepositoryStorageClassName }}
      storageClassName: {{ $provenanceRepositoryStorageClassName }}
      {{- end }}
  {{- end }}
