apiVersion: v1
kind: Service
metadata:
  name: {{ include "nifi.fullname" . }}-headless
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "nifi.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: {{ .Values.ports.https }}
    protocol: TCP
    targetPort: https
  - name: cluster
    port: {{ .Values.ports.cluster }}
    protocol: TCP
    targetPort: cluster

