apiVersion: v1
kind: Service
metadata:
  name: {{ include "nifi.fullname" . }}-headless
  labels:
    {{- include "nifi.labels" . | nindent 4 }}
  {{- $annotations := merge (dict) (include "nifi.linkerdServiceAnnotations" (dict "root" . "servicePorts" (list .Values.ports.https .Values.ports.cluster .Values.ports.loadBalance)) | fromYaml) }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "nifi.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: {{ .Values.ports.https }}
    protocol: TCP
    targetPort: https
  - name: cluster
    port: {{ .Values.ports.cluster }}
    protocol: TCP
    targetPort: cluster
  - name: load-balance
    port: {{ .Values.ports.loadBalance }}
    protocol: TCP
    targetPort: load-balance
