# NiFi-Fabric platform chart values
#
# This is the standard one-release customer install surface. It can install the
# standalone app chart directly or the managed platform path with the controller
# and `NiFiCluster`.
#
# Start here:
# - Install guide: ../../docs/install/helm.md
# - Platform chart values reference: ../../docs/reference/nifi-platform-values.md
# - App chart values reference for `nifi.*`: ../../docs/reference/app-chart-values.md

# ------------------------------------------------------------------------------
# Install Mode
# Docs: ../../docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Install mode for this release.
# Use `standalone` for Helm-only NiFi.
# Use `managed` for the standard platform path with the controller and `NiFiCluster`.
# @default -- "standalone"
mode: standalone

# ------------------------------------------------------------------------------
# Controller Settings
# Docs: ../../docs/architecture.md
# ------------------------------------------------------------------------------

# -- Controller namespace, image, arguments, and resources.
# These settings apply only to the managed platform path.
controller:
  namespace:
    name: nifi-system
    create: true
  serviceAccount:
    name: ""
  image:
    repository: nifi-fabric-controller
    tag: dev
    pullPolicy: IfNotPresent
  args:
  - --leader-elect
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ------------------------------------------------------------------------------
# Managed NiFiCluster Settings
# Docs: ../../docs/reference/nificluster.md
# Docs: ../../docs/manage/hibernation-and-restore.md
# Docs: ../../docs/manage/autoscaling.md
# ------------------------------------------------------------------------------

# -- Managed-mode `NiFiCluster` settings rendered by the platform chart.
# These values are ignored when `mode=standalone`.
cluster:
  create: true
  name: ""
  targetRef:
    name: ""
  desiredState: Running
  suspend: false
  restartTriggers:
    configMaps: []
    secrets: []
  restartPolicy:
    tlsDrift: AutoreloadThenRestartOnFailure
  rollout:
    minReadySeconds: 30
    podReadyTimeout: 10m
    clusterHealthTimeout: 15m
  hibernation:
    offloadTimeout: 5m
  autoscaling:
    mode: Disabled
    scaleUp:
      enabled: false
      cooldown: 5m
    scaleDown:
      enabled: false
      cooldown: 10m
      stabilizationWindow: 5m
      maxSequentialSteps: 1
    external:
      # -- Controller-owned external autoscaling intent surface.
      # Used by the experimental KEDA integration when enabled.
      # Leave requestedReplicas at 0 in declarative values when KEDA is enabled;
      # KEDA and the controller manage it at runtime through NiFiCluster /scale.
      enabled: false
      source: ""
      scaleDownEnabled: false
      requestedReplicas: 0
    minReplicas: 0
    maxReplicas: 0
    signals: []
  safety:
    requireClusterHealthy: true

# ------------------------------------------------------------------------------
# Optional trust-manager Integration
# Docs: ../../docs/manage/tls-and-cert-manager.md
# Docs: ../../docs/manage/observability-metrics.md
# ------------------------------------------------------------------------------

# -- Optional trust-manager integration for distributing a shared CA bundle into the
# NiFi namespace. trust-manager remains a cluster prerequisite and is not installed
# by this chart.
trustManager:
  enabled: false
  sources:
    # -- Include the trust-manager default/public CA bundle.
    useDefaultCAs: false
    # -- Source ConfigMaps and Secrets must already exist in trust-manager's configured
    # trust namespace unless `mirrorTLSSecret.enabled=true`.
    configMaps: []
    secrets: []
    inline: []
  target:
    # -- Bundle target type. `configMap` is the default path. `secret` requires an
    # upstream trust-manager installation with secret targets enabled and authorized.
    type: configMap
    key: ca.crt
    additionalFormats:
      pkcs12:
        enabled: false
        key: truststore.p12
        password: ""
        profile: ""
      jks:
        enabled: false
        key: truststore.jks
        password: changeit
    labels: {}
    annotations: {}
  mirrorTLSSecret:
    # -- Optionally mirror the workload TLS Secret's `ca.crt` into trust-manager's
    # trust namespace so Bundle sources do not have to be created manually.
    enabled: false
    trustNamespace: cert-manager
    sourceSecretName: ""
    sourceKey: ca.crt
    targetSecretName: ""
    targetKey: ca.crt
    schedule: "*/1 * * * *"
    image:
      repository: bitnami/kubectl
      tag: ""
      digest: "sha256:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ------------------------------------------------------------------------------
# Experimental KEDA Integration
# Docs: ../../docs/keda.md
# ------------------------------------------------------------------------------

# -- Optional experimental KEDA integration for managed mode.
# KEDA targets `NiFiCluster`, not the NiFi StatefulSet.
# The controller remains the only executor of actual scale actions.
# KEDA min/max counts must stay within the controller-owned autoscaling min/max bounds.
# @default -- {"enabled":false,"pollingInterval":30,"cooldownPeriod":300,"minReplicaCount":1,"maxReplicaCount":3,"triggers":[]}
keda:
  enabled: false
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers: []

# ------------------------------------------------------------------------------
# Nested App Chart Values
# Docs: ../../docs/reference/app-chart-values.md
# Docs: ../../docs/manage/tls-and-cert-manager.md
# Docs: ../../docs/manage/authentication.md
# Docs: ../../docs/manage/observability-metrics.md
# ------------------------------------------------------------------------------

# -- Nested `charts/nifi` values passed through by the platform chart.
# This is where customers set NiFi version, TLS, auth, ingress, storage, metrics,
# and other workload-level settings for the standard one-release install path.
#
# Common starting points:
# - `nifi.replicaCount`
# - `nifi.image.tag`
# - `nifi.tls.*`
# - `nifi.tls.additionalTrustBundle.*` when using the optional trust-manager bundle
# - `nifi.trustManagerBundleRef.*` when the platform trust-manager target type or key differs from the default ConfigMap/`ca.crt` path
# - `nifi.auth.*`
# - `nifi.authz.*`
# - `nifi.parameterContexts.*` for prepared Parameter Context catalogs
# - `nifi.versionedFlowImports.*` for bounded runtime-managed versioned-flow import and version selection
# - `nifi.ingress.*` or `nifi.openshift.route.*`
# - `nifi.observability.metrics.*` with `mode=nativeApi` for the recommended metrics path
# - `nifi.observability.metrics.*.tlsConfig.ca.useTrustManagerBundle=true` when using the optional trust-manager bundle
nifi:
  observability:
    metrics:
      mode: disabled
