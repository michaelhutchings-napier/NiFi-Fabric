# NiFi-Fabric platform chart values
#
# This is the standard one-release customer install surface. It can install the
# standalone app chart directly or the managed platform path with the controller
# and `NiFiCluster`.
#
# Start here:
# - Install guide: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# - Platform chart values reference: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/nifi-platform-values.md
# - App chart values reference for `nifi.*`: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md

# ------------------------------------------------------------------------------
# Shared Install Profile
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Shared install-profile preset used by the platform chart and its nested app chart.
# Supported values are:
# - `explicit`: preserve the normal chart values surface
# - `quickstart-cert-manager`: standard managed quickstart with cert-manager
# - `quickstart-self-signed`: secondary managed quickstart with self-signed TLS
global:
  nifiFabric:
    installProfile: explicit

# ------------------------------------------------------------------------------
# Install Mode
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# ------------------------------------------------------------------------------

# -- Install mode for this release.
# Use `standalone` for Helm-only NiFi.
# Use `managed` for the standard platform path with the controller and `NiFiCluster`.
# Use `managed-cert-manager` for the cert-manager-first managed platform path.
# @default -- "standalone"
mode: standalone

# ------------------------------------------------------------------------------
# Controller Settings
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/architecture.md
# ------------------------------------------------------------------------------

# -- Controller namespace, image, arguments, and resources.
# These settings apply only to the managed platform path.
controller:
  namespace:
    name: nifi-system
    create: true
  serviceAccount:
    name: ""
  image:
    repository: nifi-fabric-controller
    tag: dev
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  automountServiceAccountToken: true
  enableServiceLinks: false
  podSecurityContext:
    fsGroup: 65532
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  args:
  - --leader-elect
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ------------------------------------------------------------------------------
# Managed NiFiCluster Settings
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/nificluster.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/hibernation-and-restore.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/autoscaling.md
# ------------------------------------------------------------------------------

# -- Managed-mode `NiFiCluster` settings rendered by the platform chart.
# These values are ignored when `mode=standalone`.
cluster:
  create: true
  name: ""
  targetRef:
    name: ""
  desiredState: Running
  suspend: false
  restartTriggers:
    configMaps: []
    secrets: []
  restartPolicy:
    tlsDrift: AutoreloadThenRestartOnFailure
  rollout:
    minReadySeconds: 30
    podReadyTimeout: 10m
    clusterHealthTimeout: 15m
  hibernation:
    offloadTimeout: 5m
  autoscaling:
    mode: Disabled
    scaleUp:
      enabled: false
      cooldown: 5m
    scaleDown:
      enabled: false
      cooldown: 10m
      stabilizationWindow: 5m
      maxSequentialSteps: 1
    external:
      # -- Controller-owned external autoscaling intent surface.
      # Used by the optional KEDA integration when enabled.
      # Leave requestedReplicas at 0 in declarative values when KEDA is enabled;
      # KEDA and the controller manage it at runtime through NiFiCluster /scale.
      enabled: false
      source: ""
      scaleDownEnabled: false
      requestedReplicas: 0
    minReplicas: 0
    maxReplicas: 0
    signals: []
  safety:
    requireClusterHealthy: true

# ------------------------------------------------------------------------------
# Optional Quickstart Bootstrap
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/install/helm.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/authentication.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/tls-and-cert-manager.md
# ------------------------------------------------------------------------------

# -- Optional quickstart bootstrap for the managed platform path.
# This is intended for single-user managed bootstrap only.
# It can generate:
# - a stable single-user auth Secret
# - stable cert-manager parameter Secrets for the standard managed cert-manager-first path
# - a stable self-signed TLS Secret for the optional `externalSecret` quickstart path
# Richer auth modes such as OIDC and LDAP stay on the explicit operator-provided Secret path.
quickstart:
  enabled: false
  singleUser:
    username: admin
    passwordLength: 24
  tls:
    validityDays: 365
    passwordLength: 24
    sensitivePropsKeyLength: 32
    kubectlImage:
      repository: bitnami/kubectl
      tag: ""
      digest: "sha256:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ------------------------------------------------------------------------------
# Optional trust-manager Integration
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/tls-and-cert-manager.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/observability-metrics.md
# ------------------------------------------------------------------------------

# -- Optional trust-manager integration for distributing a shared CA bundle into the
# NiFi namespace. trust-manager remains a cluster prerequisite and is not installed
# by this chart.
trustManager:
  enabled: false
  sources:
    # -- Include the trust-manager default/public CA bundle.
    useDefaultCAs: false
    # -- Source ConfigMaps and Secrets must already exist in trust-manager's configured
    # trust namespace unless `mirrorTLSSecret.enabled=true`.
    configMaps: []
    secrets: []
    inline: []
  target:
    # -- Bundle target type. `configMap` is the default path. `secret` requires an
    # upstream trust-manager installation with secret targets enabled and authorized.
    type: configMap
    key: ca.crt
    additionalFormats:
      pkcs12:
        enabled: false
        key: truststore.p12
        password: ""
        profile: ""
      jks:
        enabled: false
        key: truststore.jks
        password: changeit
    labels: {}
    annotations: {}
  mirrorTLSSecret:
    # -- Optionally mirror the workload TLS Secret's `ca.crt` into trust-manager's
    # trust namespace so Bundle sources do not have to be created manually.
    enabled: false
    trustNamespace: cert-manager
    sourceSecretName: ""
    sourceKey: ca.crt
    targetSecretName: ""
    targetKey: ca.crt
    schedule: "*/1 * * * *"
    image:
      repository: bitnami/kubectl
      tag: ""
      digest: "sha256:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ------------------------------------------------------------------------------
# Optional KEDA Integration
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/keda.md
# ------------------------------------------------------------------------------

# -- Optional supported KEDA integration for managed mode.
# KEDA targets `NiFiCluster`, not the NiFi StatefulSet.
# The controller remains the only executor of actual scale actions.
# KEDA min/max counts must stay within the controller-owned autoscaling min/max bounds.
# @default -- {"enabled":false,"pollingInterval":30,"cooldownPeriod":300,"minReplicaCount":1,"maxReplicaCount":3,"triggers":[]}
keda:
  enabled: false
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers: []

# ------------------------------------------------------------------------------
# Nested App Chart Values
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/reference/app-chart-values.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/tls-and-cert-manager.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/authentication.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/observability-metrics.md
# Docs: https://github.com/michaelhutchings-napier/NiFi-Fabric/blob/master/docs/manage/observability-audit.md
# ------------------------------------------------------------------------------

# -- Nested `charts/nifi` values passed through by the platform chart.
# This is where customers set NiFi version, TLS, auth, ingress, storage, metrics,
# and other workload-level settings for the standard one-release install path.
#
# Common starting points:
# - `nifi.replicaCount`
# - `nifi.image.tag`
# - `nifi.tls.*`
# - `nifi.tls.additionalTrustBundle.*` when using the optional trust-manager bundle
# - `nifi.trustManagerBundleRef.*` when the platform trust-manager target type or key differs from the default ConfigMap/`ca.crt` path
# - `nifi.auth.*`
# - `nifi.authz.*`
# - `nifi.parameterContexts.*` for prepared Parameter Context catalogs
# - `nifi.versionedFlowImports.*` for runtime-managed versioned-flow import and version selection
# - `nifi.ingress.*` or `nifi.openshift.route.*`
# - `nifi.observability.metrics.*`; the default managed recommendation here is native API metrics without a reverse-proxy sidecar
# - `nifi.observability.metrics.*.tlsConfig.ca.useTrustManagerBundle=true` when using the optional trust-manager bundle
# - `nifi.observability.audit.flowActions.*` for durable local audit and the bounded advanced log-export path
nifi:
  observability:
    metrics:
      mode: nativeApi
      nativeApi:
        serviceMonitor:
          enabled: false
