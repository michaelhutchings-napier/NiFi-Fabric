mode: standalone

controller:
  namespace:
    name: nifi-system
    create: true
  serviceAccount:
    name: ""
  image:
    repository: nifi-fabric-controller
    tag: dev
    pullPolicy: IfNotPresent
  args:
    - --leader-elect
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

cluster:
  create: true
  name: ""
  targetRef:
    name: ""
  desiredState: Running
  suspend: false
  restartTriggers:
    configMaps: []
    secrets: []
  restartPolicy:
    tlsDrift: AutoreloadThenRestartOnFailure
  rollout:
    minReadySeconds: 30
    podReadyTimeout: 10m
    clusterHealthTimeout: 15m
  hibernation:
    offloadTimeout: 5m
  autoscaling:
    mode: Disabled
    scaleUp:
      enabled: false
      cooldown: 5m
    scaleDown:
      enabled: false
      cooldown: 10m
      stabilizationWindow: 5m
    external:
      enabled: false
      source: ""
      scaleDownEnabled: false
      requestedReplicas: 0
    minReplicas: 0
    maxReplicas: 0
    signals: []
  safety:
    requireClusterHealthy: true

keda:
  enabled: false
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers: []

nifi: {}
