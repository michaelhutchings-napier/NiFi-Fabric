{{- if and (eq (include "nifi-platform.managedMode" .) "true") .Values.cluster.create }}
apiVersion: platform.nifi.io/v1alpha1
kind: NiFiCluster
metadata:
  name: {{ include "nifi-platform.clusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
spec:
  targetRef:
    name: {{ include "nifi-platform.targetRefName" . }}
  desiredState: {{ .Values.cluster.desiredState }}
  suspend: {{ ternary "true" "false" .Values.cluster.suspend }}
  {{- $restartTriggerConfigMaps := list }}
  {{- if .Values.cluster.restartTriggers.configMaps }}
  {{- range .Values.cluster.restartTriggers.configMaps }}
  {{- if and .name (not (has .name $restartTriggerConfigMaps)) }}
  {{- $restartTriggerConfigMaps = append $restartTriggerConfigMaps .name }}
  {{- end }}
  {{- end }}
  {{- else }}
  {{- $restartTriggerConfigMaps = append $restartTriggerConfigMaps (printf "%s-config" (include "nifi-platform.nifiFullname" .)) }}
  {{- if and .Values.trustManager.enabled (eq (include "nifi-platform.trustManagerTargetType" .) "configMap") (dig "tls" "additionalTrustBundle" "enabled" false .Values.nifi) (dig "tls" "additionalTrustBundle" "useTrustManagerBundle" false .Values.nifi) }}
  {{- $restartTriggerConfigMaps = append $restartTriggerConfigMaps (include "nifi-platform.trustManagerBundleName" .) }}
  {{- end }}
  {{- end }}
  {{- if dig "config" "propertyConfigMapsRestartOnChange" false .Values.nifi }}
  {{- range $entry := default (list) (dig "config" "propertyConfigMaps" (list) .Values.nifi) }}
  {{- if and $entry.name (not (has $entry.name $restartTriggerConfigMaps)) }}
  {{- $restartTriggerConfigMaps = append $restartTriggerConfigMaps $entry.name }}
  {{- end }}
  {{- end }}
  {{- end }}
  restartTriggers:
    configMaps:
      {{- range $name := $restartTriggerConfigMaps }}
      - name: {{ $name | quote }}
      {{- end }}
    secrets:
      {{- if .Values.cluster.restartTriggers.secrets }}
      {{- range .Values.cluster.restartTriggers.secrets }}
      - name: {{ .name | quote }}
      {{- end }}
      {{- else }}
      - name: {{ include "nifi-platform.tlsSecretName" . | quote }}
      {{- if and .Values.trustManager.enabled (eq (include "nifi-platform.trustManagerTargetType" .) "secret") (dig "tls" "additionalTrustBundle" "enabled" false .Values.nifi) (dig "tls" "additionalTrustBundle" "useTrustManagerBundle" false .Values.nifi) }}
      - name: {{ include "nifi-platform.trustManagerBundleName" . | quote }}
      {{- end }}
      {{- end }}
  restartPolicy:
    tlsDrift: {{ .Values.cluster.restartPolicy.tlsDrift }}
  rollout:
    minReadySeconds: {{ .Values.cluster.rollout.minReadySeconds }}
    podReadyTimeout: {{ .Values.cluster.rollout.podReadyTimeout | quote }}
    clusterHealthTimeout: {{ .Values.cluster.rollout.clusterHealthTimeout | quote }}
  hibernation:
    offloadTimeout: {{ .Values.cluster.hibernation.offloadTimeout | quote }}
  autoscaling:
    mode: {{ .Values.cluster.autoscaling.mode }}
    scaleUp:
      enabled: {{ ternary "true" "false" .Values.cluster.autoscaling.scaleUp.enabled }}
      cooldown: {{ .Values.cluster.autoscaling.scaleUp.cooldown | quote }}
    scaleDown:
      enabled: {{ ternary "true" "false" .Values.cluster.autoscaling.scaleDown.enabled }}
      cooldown: {{ .Values.cluster.autoscaling.scaleDown.cooldown | quote }}
      stabilizationWindow: {{ .Values.cluster.autoscaling.scaleDown.stabilizationWindow | quote }}
      maxSequentialSteps: {{ .Values.cluster.autoscaling.scaleDown.maxSequentialSteps }}
    external:
      enabled: {{ ternary "true" "false" .Values.cluster.autoscaling.external.enabled }}
      {{- if .Values.cluster.autoscaling.external.source }}
      source: {{ .Values.cluster.autoscaling.external.source }}
      {{- end }}
      scaleDownEnabled: {{ ternary "true" "false" .Values.cluster.autoscaling.external.scaleDownEnabled }}
      requestedReplicas: {{ .Values.cluster.autoscaling.external.requestedReplicas }}
    minReplicas: {{ .Values.cluster.autoscaling.minReplicas }}
    maxReplicas: {{ .Values.cluster.autoscaling.maxReplicas }}
    {{- if .Values.cluster.autoscaling.signals }}
    signals:
      {{- range .Values.cluster.autoscaling.signals }}
      - {{ . | quote }}
      {{- end }}
    {{- else }}
    signals: []
    {{- end }}
  safety:
    requireClusterHealthy: {{ ternary "true" "false" .Values.cluster.safety.requireClusterHealthy }}
{{- end }}
