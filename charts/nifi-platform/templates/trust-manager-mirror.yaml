{{- if and .Values.trustManager.enabled .Values.trustManager.mirrorTLSSecret.enabled }}
{{- $mirrorName := include "nifi-platform.trustManagerMirrorName" . -}}
{{- $sourceNamespace := .Release.Namespace -}}
{{- $targetNamespace := include "nifi-platform.trustManagerMirrorTrustNamespace" . -}}
{{- $sourceSecretName := include "nifi-platform.trustManagerMirrorSourceSecretName" . -}}
{{- $targetSecretName := include "nifi-platform.trustManagerMirrorTargetSecretName" . -}}
{{- $sourceSecretKey := default "ca.crt" .Values.trustManager.mirrorTLSSecret.sourceKey -}}
{{- $targetSecretKey := include "nifi-platform.trustManagerMirrorSecretKey" . -}}
{{- $image := .Values.trustManager.mirrorTLSSecret.image -}}
{{- $imageRef := $image.repository -}}
{{- if $image.digest -}}
{{- $imageRef = printf "%s@%s" $image.repository $image.digest -}}
{{- else if $image.tag -}}
{{- $imageRef = printf "%s:%s" $image.repository $image.tag -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $mirrorName }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-source-read" $mirrorName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $sourceNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: [{{ $sourceSecretName | quote }}]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-source-read" $mirrorName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $sourceNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
subjects:
- kind: ServiceAccount
  name: {{ $mirrorName }}
  namespace: {{ $targetNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-source-read" $mirrorName | trunc 63 | trimSuffix "-" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-target-write" $mirrorName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get","create","update","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-target-write" $mirrorName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
subjects:
- kind: ServiceAccount
  name: {{ $mirrorName }}
  namespace: {{ $targetNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-target-write" $mirrorName | trunc 63 | trimSuffix "-" }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $mirrorName }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
spec:
  schedule: {{ .Values.trustManager.mirrorTLSSecret.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "nifi-platform.labels" . | nindent 12 }}
            app.kubernetes.io/component: trust
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ $mirrorName }}
          containers:
          - name: mirror
            image: {{ $imageRef | quote }}
            imagePullPolicy: {{ $image.pullPolicy }}
            command:
            - /bin/sh
            - -ec
            - |
              source_b64=""
              for _ in $(seq 1 60); do
                source_b64="$(kubectl -n "${SOURCE_NAMESPACE}" get secret "${SOURCE_SECRET_NAME}" -o json 2>/dev/null | jq -r --arg key "${SOURCE_SECRET_KEY}" '.data[$key] // empty')"
                if [ -n "${source_b64}" ]; then
                  break
                fi
                echo "waiting for ${SOURCE_SECRET_KEY} in secret/${SOURCE_SECRET_NAME}" >&2
                sleep 2
              done
              if [ -z "${source_b64}" ]; then
                echo "missing ${SOURCE_SECRET_KEY} in secret/${SOURCE_SECRET_NAME}" >&2
                exit 1
              fi
              tmp_file="$(mktemp)"
              printf '%s' "${source_b64}" | base64 -d > "${tmp_file}"
              kubectl -n "${TARGET_NAMESPACE}" create secret generic "${TARGET_SECRET_NAME}" \
                --from-file="${TARGET_SECRET_KEY}=${tmp_file}" \
                --dry-run=client \
                -o yaml | kubectl apply -f -
              rm -f "${tmp_file}"
            env:
            - name: SOURCE_NAMESPACE
              value: {{ $sourceNamespace | quote }}
            - name: SOURCE_SECRET_NAME
              value: {{ $sourceSecretName | quote }}
            - name: SOURCE_SECRET_KEY
              value: {{ $sourceSecretKey | quote }}
            - name: TARGET_NAMESPACE
              value: {{ $targetNamespace | quote }}
            - name: TARGET_SECRET_NAME
              value: {{ $targetSecretName | quote }}
            - name: TARGET_SECRET_KEY
              value: {{ $targetSecretKey | quote }}
            resources:
              {{- toYaml .Values.trustManager.mirrorTLSSecret.resources | nindent 14 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-bootstrap" $mirrorName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $targetNamespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: trust
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "nifi-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: trust
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $mirrorName }}
      containers:
      - name: mirror
        image: {{ $imageRef | quote }}
        imagePullPolicy: {{ $image.pullPolicy }}
        command:
        - /bin/sh
        - -ec
        - |
          source_b64=""
          for _ in $(seq 1 60); do
            source_b64="$(kubectl -n "${SOURCE_NAMESPACE}" get secret "${SOURCE_SECRET_NAME}" -o json 2>/dev/null | jq -r --arg key "${SOURCE_SECRET_KEY}" '.data[$key] // empty')"
            if [ -n "${source_b64}" ]; then
              break
            fi
            echo "waiting for ${SOURCE_SECRET_KEY} in secret/${SOURCE_SECRET_NAME}" >&2
            sleep 2
          done
          if [ -z "${source_b64}" ]; then
            echo "missing ${SOURCE_SECRET_KEY} in secret/${SOURCE_SECRET_NAME}" >&2
            exit 1
          fi
          tmp_file="$(mktemp)"
          printf '%s' "${source_b64}" | base64 -d > "${tmp_file}"
          kubectl -n "${TARGET_NAMESPACE}" create secret generic "${TARGET_SECRET_NAME}" \
            --from-file="${TARGET_SECRET_KEY}=${tmp_file}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -
          rm -f "${tmp_file}"
        env:
        - name: SOURCE_NAMESPACE
          value: {{ $sourceNamespace | quote }}
        - name: SOURCE_SECRET_NAME
          value: {{ $sourceSecretName | quote }}
        - name: SOURCE_SECRET_KEY
          value: {{ $sourceSecretKey | quote }}
        - name: TARGET_NAMESPACE
          value: {{ $targetNamespace | quote }}
        - name: TARGET_SECRET_NAME
          value: {{ $targetSecretName | quote }}
        - name: TARGET_SECRET_KEY
          value: {{ $targetSecretKey | quote }}
        resources:
          {{- toYaml .Values.trustManager.mirrorTLSSecret.resources | nindent 10 }}
{{- end }}
