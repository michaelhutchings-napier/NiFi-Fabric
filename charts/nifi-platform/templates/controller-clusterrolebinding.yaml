{{- if eq (include "nifi-platform.managedMode" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nifi-platform.controllerName" . }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nifi-platform.controllerName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "nifi-platform.controllerServiceAccountName" . }}
    namespace: {{ include "nifi-platform.controllerNamespace" . }}
{{- end }}
