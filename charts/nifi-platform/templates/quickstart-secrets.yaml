{{- if and (eq (include "nifi-platform.managedMode" .) "true") .Values.quickstart.enabled }}
{{- $authMode := dig "auth" "mode" "singleUser" .Values.nifi -}}
{{- $tlsMode := dig "tls" "mode" "externalSecret" .Values.nifi -}}
{{- if eq $authMode "singleUser" }}
{{- $authSecretName := dig "auth" "singleUser" "existingSecret" "nifi-auth" .Values.nifi -}}
{{- $authUsernameKey := dig "auth" "singleUser" "usernameKey" "username" .Values.nifi -}}
{{- $authPasswordKey := dig "auth" "singleUser" "passwordKey" "password" .Values.nifi -}}
{{- $authExisting := lookup "v1" "Secret" .Release.Namespace $authSecretName -}}
{{- $authExistingData := dict -}}
{{- if $authExisting -}}
{{- $authExistingData = default (dict) $authExisting.data -}}
{{- end -}}
{{- $authPasswordLength := int (default 24 .Values.quickstart.singleUser.passwordLength) -}}
{{- $authGeneratedPassword := printf "Nifi1!%s" (randAlphaNum (int (sub $authPasswordLength 6))) | b64enc -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $authSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: quickstart
type: Opaque
data:
  {{ $authUsernameKey }}: {{ default ((default "admin" .Values.quickstart.singleUser.username) | b64enc) (get $authExistingData $authUsernameKey) | quote }}
  {{ $authPasswordKey }}: {{ default $authGeneratedPassword (get $authExistingData $authPasswordKey) | quote }}
{{ end }}
{{- if eq $tlsMode "certManager" }}
{{- $pkcsPassword := dig "tls" "certManager" "pkcs12" "password" "" .Values.nifi -}}
{{- $pkcsSecretName := dig "tls" "certManager" "pkcs12" "passwordSecretRef" "name" "" .Values.nifi -}}
{{- $pkcsSecretKey := dig "tls" "certManager" "pkcs12" "passwordSecretRef" "key" "pkcs12Password" .Values.nifi -}}
{{- $sensitivePropsValue := dig "tls" "sensitiveProps" "value" "" .Values.nifi -}}
{{- $sensitiveSecretName := dig "tls" "sensitiveProps" "secretRef" "name" "" .Values.nifi -}}
{{- $sensitiveSecretKey := default (dig "tls" "sensitivePropsKeyKey" "sensitivePropsKey" .Values.nifi) (dig "tls" "sensitiveProps" "secretRef" "key" "" .Values.nifi) -}}
{{- $tlsPasswordLength := int (default 24 .Values.quickstart.tls.passwordLength) -}}
{{- $tlsGeneratedPassword := printf "Nifi1!%s" (randAlphaNum (int (sub $tlsPasswordLength 6))) | b64enc -}}
{{- $sensitiveLength := int (default 32 .Values.quickstart.tls.sensitivePropsKeyLength) -}}
{{- $generatedSensitive := randAlphaNum $sensitiveLength | b64enc -}}
{{- if and $pkcsSecretName (eq $pkcsPassword "") (eq $pkcsSecretName $sensitiveSecretName) (eq $sensitivePropsValue "") }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $pkcsSecretName -}}
{{- $existingData := dict -}}
{{- if $existing -}}
{{- $existingData = default (dict) $existing.data -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pkcsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: quickstart
type: Opaque
data:
  {{ $pkcsSecretKey }}: {{ default $tlsGeneratedPassword (get $existingData $pkcsSecretKey) | quote }}
  {{ $sensitiveSecretKey }}: {{ default $generatedSensitive (get $existingData $sensitiveSecretKey) | quote }}
{{- else }}
{{- if and $pkcsSecretName (eq $pkcsPassword "") }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $pkcsSecretName -}}
{{- $existingData := dict -}}
{{- if $existing -}}
{{- $existingData = default (dict) $existing.data -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pkcsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: quickstart
type: Opaque
data:
  {{ $pkcsSecretKey }}: {{ default $tlsGeneratedPassword (get $existingData $pkcsSecretKey) | quote }}
{{- end }}
{{- if and $sensitiveSecretName (eq $sensitivePropsValue "") }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $sensitiveSecretName -}}
{{- $existingData := dict -}}
{{- if $existing -}}
{{- $existingData = default (dict) $existing.data -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $sensitiveSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nifi-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: quickstart
type: Opaque
data:
  {{ $sensitiveSecretKey }}: {{ default $generatedSensitive (get $existingData $sensitiveSecretKey) | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
